          def parse_datetime(value):
              if not value:
                  return None
              try:
                  return datetime.fromisoformat(
                      value.replace("Z", "+00:00")
                  )
              except (TypeError, ValueError):
                  return None

          def age_days(value):
              parsed = parse_datetime(value)

              if not parsed:
                  return None

              return max(
                  0.0,
                  (NOW - parsed).total_seconds() / 86400,
              )

          def api_get(
              url,
              accept="application/vnd.github+json",
              retries=3,
          ):
              global api_calls, api_rate_limited

              if api_rate_limited:
                  raise RuntimeError(
                      "GitHub API rate limit already reached; "
                      "remaining calls skipped"
                  )

              last_error = None

              for attempt in range(1, retries + 1):
                  request = urllib.request.Request(
                      url,
                      headers={
                          "Authorization": f"Bearer {TOKEN}",
                          "Accept": accept,
                          "X-GitHub-Api-Version": API_VERSION,
                          "User-Agent": (
                              "Atlas-Opportunity-Hunter-V33"
                          ),
                      },
                  )

                  try:
                      api_calls += 1

                      with urllib.request.urlopen(
                          request,
                          timeout=30,
                      ) as response:
                          return json.loads(
                              response.read().decode("utf-8")
                          )

                  except urllib.error.HTTPError as error:
                      body = error.read().decode(
                          "utf-8",
                          errors="replace",
                      )[:300]

                      last_error = (
                          f"HTTP {error.code}: {body}"
                      )

                      if error.code in (403, 429):
                          api_rate_limited = True
                          break

                      if (
                          500 <= error.code < 600
                          and attempt < retries
                      ):
                          time.sleep(attempt * 2)
                          continue

                      break

                  except Exception as error:
                      last_error = str(error)

                      if attempt < retries:
                          time.sleep(attempt * 2)
                          continue

                      break

              raise RuntimeError(
                  last_error
                  or "Unknown GitHub API error"
              )

          def safe_api_get(
              url,
              accept="application/vnd.github+json",
          ):
              try:
                  return api_get(
                      url,
                      accept=accept,
                  )

              except Exception as error:
                  message = str(error)
                  if not (
                      "rate limit already reached" in message
                      and any(
                          "rate limit" in item.get("error", "").lower()
                          for item in api_errors
                      )
                  ):
                      api_errors.append(
                          {
                              "url": url,
                              "error": message,
                          }
                      )

                  return None

          def extract_reward(text):
              patterns = [
                  (
                      r"/bounty\s*\$"
                      r"([0-9][0-9,]*(?:\.\d{1,2})?)"
                  ),
                  (
                      r"\$"
                      r"([0-9][0-9,]*(?:\.\d{1,2})?)"
                      r"\s*(?:usd\s*)?"
                      r"(?:bounty|reward|prize)"
                  ),
                  (
                      r"(?:bounty|reward|prize)"
                      r"\s*(?:of|is|:|=)?\s*\$"
                      r"([0-9][0-9,]*(?:\.\d{1,2})?)"
                  ),
                  (
                      r"(?:pay|payment|paid)"
                      r"\s*(?:of|is|:|=)?\s*\$"
                      r"([0-9][0-9,]*(?:\.\d{1,2})?)"
                  ),
              ]

              rewards = []

              for pattern in patterns:
                  for match in re.finditer(
                      pattern,
                      text,
                      re.I,
                  ):
                      try:
                          rewards.append(
                              float(
                                  match.group(1).replace(
                                      ",",
                                      "",
                                  )
                              )
                          )
                      except ValueError:
                          pass

              return max(
                  rewards,
                  default=0.0,
              )

          def issue_identity(issue):
              repository = (
                  issue.get("repository_url") or ""
              ).split("/repos/")[-1]

              number = int(
                  issue.get("number") or 0
              )

              return repository, number

          def title_repository_mismatch(title, repository):
              title_repositories = re.findall(
                  r"\[([A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+)\]",
                  title or "",
              )
              if not title_repositories:
                  return False, ""

              actual = (repository or "").lower()
              for advertised in title_repositories:
                  if advertised.lower() != actual:
                      return True, advertised

              return False, ""

          def is_aggregator(
              issue,
              title,
              body,
          ):
              repository, _ = issue_identity(issue)
              repository = repository.lower()

              author = (
                  (issue.get("user") or {}).get(
                      "login"
                  )
                  or ""
              ).lower()

              labels = {
                  (label.get("name") or "").lower()
                  for label in issue.get(
                      "labels",
                      [],
                  )
              }

              title_lower = title.lower()
              body_lower = body.lower()

              aggregator_phrases = [
                  "bounty alert",
                  "new opportunities",
                  "new opportunityies",
                  "opportunities found",
                  "opportunityies found",
                  "top opportunities",
                  "new bounties found",
              ]

              if "bountyscout" in repository:
                  return True

              if any(
                  phrase in title_lower
                  for phrase in aggregator_phrases
              ):
                  return True

              if (
                  "bounty-alert" in labels
                  or "bounty alert" in labels
              ):
                  return True

              if (
                  author == "github-actions[bot]"
                  or author.endswith("[bot]")
              ):
                  return True

              linked_issues = re.findall(
                  (
                      r"https://github\.com/"
                      r"[^/\s]+/[^/\s]+/issues/\d+"
                  ),
                  body,
                  re.I,
              )

              if len(set(linked_issues)) >= 3:
                  return True

              if any(
                  phrase in body_lower
                  for phrase in aggregator_phrases
              ):
                  return True

              return False

