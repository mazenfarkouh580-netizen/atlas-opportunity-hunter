name: Atlas + Alex V35 — Active Search Recovery

on:
  workflow_dispatch:
    inputs:
      execution_mode:
        description: "Choose scan only, safe local test, or submit a verified pull request"
        required: true
        type: choice
        default: scan_only
        options:
          - scan_only
          - safe_test
          - submit
  repository_dispatch:
    types: [atlas-scheduled-run, atlas-watchdog-recovery]
  schedule:
    # Main hunt: every 15 minutes.
    - cron: "7,22,37,52 * * * *"
    # Watchdog: five minutes after each main slot.
    - cron: "12,27,42,57 * * * *"

concurrency:
  group: atlas-alex-opportunity-hunter-v35
  cancel-in-progress: false

permissions:
  actions: write
  contents: write
  issues: read
  pull-requests: write

jobs:
  hunt:
    outputs:
      execution_matrix: ${{ steps.atlas.outputs.execution_matrix }}
      pursue_count: ${{ steps.atlas.outputs.pursue_count }}
      system_status: ${{ steps.atlas.outputs.system_status }}
      execution_ready: ${{ steps.atlas.outputs.execution_ready }}
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'repository_dispatch' ||
      github.event.schedule == '7,22,37,52 * * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Download repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Atlas and Alex — discover, select, and dispatch work
        id: atlas
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REQUESTED_EXECUTION_MODE: ${{ github.event.inputs.execution_mode || 'scan_only' }}
        run: |
