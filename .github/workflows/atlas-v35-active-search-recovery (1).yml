              try:
                  data = json.loads(
                      CANDIDATE_LIFECYCLE_FILE.read_text(
                          encoding="utf-8"
                      )
                  )
                  return data if isinstance(data, dict) else {}
              except Exception:
                  return {}

          def collect_issue_comments(
              repository,
              number,
          ):
              encoded_repo = urllib.parse.quote(
                  repository,
                  safe="/",
              )

              url = (
                  "https://api.github.com/repos/"
                  f"{encoded_repo}/issues/"
                  f"{number}/comments?per_page=100"
              )

              data = safe_api_get(url)

              return (
                  data
                  if isinstance(data, list)
                  else []
              )

          def collect_timeline(
              repository,
              number,
          ):
              encoded_repo = urllib.parse.quote(
                  repository,
                  safe="/",
              )

              url = (
                  "https://api.github.com/repos/"
                  f"{encoded_repo}/issues/"
                  f"{number}/timeline?per_page=100"
              )

              data = safe_api_get(
                  url,
                  accept=(
                      "application/vnd.github+json"
                  ),
              )

              return (
                  data
                  if isinstance(data, list)
                  else []
              )

          def search_linked_pull_requests(
              repository,
              number,
              issue_url,
          ):
              queries = [
                  (
                      f'repo:{repository} '
                      f'is:pr is:open "#{number}"'
                  ),
                  (
                      f'repo:{repository} '
                      f'is:pr "{issue_url}"'
                  ),
              ]

              found = {}

              for query in queries:
                  encoded = urllib.parse.quote(query)

                  url = (
                      "https://api.github.com/"
                      "search/issues"
                      f"?q={encoded}"
                      "&sort=updated"
                      "&order=desc"
                      "&per_page=30"
                  )

                  data = safe_api_get(url)

                  if not isinstance(data, dict):
                      continue

                  for item in data.get(
                      "items",
                      [],
                  ):
                      if "pull_request" not in item:
                          continue

                      html_url = (
                          item.get("html_url") or ""
                      )

                      if html_url:
                          found[html_url] = item

              return list(found.values())

          def verify_candidate(issue):
              title = issue.get("title") or ""
              body = issue.get("body") or ""
              issue_url = (
                  issue.get("html_url") or ""
              )

              repository, number = issue_identity(
                  issue
              )

              labels = sorted(
                  {
                      (
                          label.get("name") or ""
                      ).strip()
                      for label in issue.get(
                          "labels",
                          [],
                      )
                      if (
                          label.get("name") or ""
                      ).strip()
                  }
              )

              comments = collect_issue_comments(
                  repository,
                  number,
              )

              timeline = collect_timeline(
                  repository,
                  number,
              )

              linked_prs = (
                  search_linked_pull_requests(
                      repository,
                      number,
                      issue_url,
                  )
              )

              comment_text = "\n".join(
                  comment.get("body") or ""
                  for comment in comments
              )

              combined_text = (
                  f"{title}\n"
                  f"{body}\n"
                  f"{comment_text}"
              )

              lowered = combined_text.lower()

              timeline_pr_urls = set()

              for event in timeline:
                  source_issue = (
                      (
                          event.get("source") or {}
                      ).get("issue")
                      or {}
                  )

                  if "pull_request" in source_issue:
                      url = (
                          source_issue.get(
                              "html_url"
                          )
                          or ""
                      )

                      if url:
                          timeline_pr_urls.add(url)

              linked_pr_map = {
                  pr.get("html_url"): pr
                  for pr in linked_prs
                  if pr.get("html_url")
              }

              for url in timeline_pr_urls:
                  linked_pr_map.setdefault(
                      url,
                      {
                          "html_url": url,
                          "title": (
                              "Pull request linked "
                              "through issue timeline"
                          ),
                          "state": "unknown",
                          "user": {},
                          "created_at": "",
                          "updated_at": "",
                      },
                  )

              pr_summaries = []
              open_pr_count = 0
              merged_pr_count = 0

              for pr in linked_pr_map.values():
                  state = (
                      pr.get("state") or "unknown"
                  ).lower()

                  pull_data = (
                      pr.get("pull_request") or {}
                  )

                  merged_at = pull_data.get(
                      "merged_at"
                  )

                  if merged_at:
                      merged_pr_count += 1

                  elif state == "open":
                      open_pr_count += 1

                  pr_summaries.append(
                      {
                          "title": (
                              pr.get("title")
                              or "Linked pull request"
                          ),
                          "url": (
                              pr.get("html_url")
                              or ""
                          ),
                          "state": (
                              "merged"
                              if merged_at
                              else state
                          ),
                          "author": (
                              (
                                  pr.get("user")
                                  or {}
                              ).get("login")
                              or ""
                          ),
                          "created_at": (
                              pr.get("created_at")
                              or ""
                          ),
                          "updated_at": (
                              pr.get("updated_at")
                              or ""
                          ),
                      }
                  )

              assignees = [
                  person.get("login") or ""
                  for person in issue.get(
                      "assignees",
                      [],
                  )
                  if person.get("login")
              ]

              reward = extract_reward(
                  f"{title}\n{body}"
              )

              created_age = age_days(
                  issue.get("created_at")
              )

              updated_age = age_days(
                  issue.get("updated_at")
              )

              detail = len(body.strip())

              preferred_matches = sorted(
                  {
                      term
                      for term in PREFERRED_TERMS
                      if term in lowered
                  }
              )

              complexity_matches = sorted(
                  {
                      term
                      for term in COMPLEXITY_TERMS
                      if term in lowered
                  }
              )

              payment_signals = sorted(
                  {
                      term
                      for term in PAYMENT_EVIDENCE_TERMS
                      if term in lowered
                  }
              )

              paypal_signals = sorted({term for term in PAYPAL_TERMS if term in lowered})
              fiat_payment_signals = sorted({term for term in FIAT_PAYMENT_TERMS if term in lowered})
              fast_payment_signals = sorted({term for term in FAST_PAYMENT_TERMS if term in lowered})
              ai_allowed_signals = sorted({term for term in AI_ALLOWED_TERMS if term in lowered})
              human_only_signals = sorted({term for term in HUMAN_ONLY_TERMS if term in lowered})
              approval_authority_signals = sorted({term for term in APPROVAL_AUTHORITY_TERMS if term in lowered})

              repository_mismatch, advertised_repository = (
                  title_repository_mismatch(
                      title,
                      repository,
                  )
              )

              platform_signals = sorted({
                  platform
                  for platform, terms in CONDITIONAL_PLATFORM_SIGNALS.items()
                  if any(term in lowered for term in terms)
              })
              trusted_platform = None  # No platform is trusted automatically.

              repository_full_name = (
                  repository.lower()
                  if repository
                  else ""
              )
              trusted_repository = False
              payout_program_repository = False

              crypto_signals = sorted({
                  term for term in CRYPTO_TERMS if term in lowered
              })

              funded_payment_platform = bool(
                  any(term in lowered for term in (
                      "funded bounty",
                      "pre-funded bounty",
                      "prefunded bounty",
                      "funds secured",
                  ))
                  and not crypto_signals
              )

              trusted_payout_source = False

              # Prototype qualification is intentionally strict. A promise such
              # as "PayPal", "paid on merge", or a platform name is never proof.
              # Atlas requires explicit funding/escrow language, a fiat method,
              # and fast-payment timing in the same active issue.
              direct_payment_proof = bool(
                  not crypto_signals
                  and funded_payment_platform
                  and fiat_payment_signals
                  and fast_payment_signals
              )

              instant_payment_verified = bool(direct_payment_proof)

              payout_source = (
                  "Issue-level funded fiat payment evidence"
                  if direct_payment_proof
                  else "Unverified promise or discovery signal"
              )
 
              claimability_signals = sorted({
                  term for term in (
                      "claim this issue",
                      "comment to claim",
                      "open to contributors",
                      "submit a pull request",
                      "first accepted",
                      "available bounty",
                      "unassigned",
                      "ready to claim",
                  )
                  if term in lowered
              })
              blocked_claim_signals = sorted({
                  term for term in (
                      "do not start",
                      "wait for approval",
                      "reserved",
                      "already claimed",
                      "not accepting",
                      "internal only",
                  )
                  if term in lowered
              })
              atlas_capability_signals = sorted({
                  term for term in (
                      "python",
                      "javascript",
                      "typescript",
                      "documentation",
                      "unit test",
                      "parser",
                      "api",
                      "automation",
                      "data",
                      "bug fix",
                      "cli",
                  )
                  if term in lowered
              })
              external_execution_blockers = sorted({
                  term for term in (
                      "app store submission",
                      "google play submission",
                      "hardware required",
                      "physical device required",
                      "paid account required",
                      "identity verification required",
                      "on-site",
                  )
                  if term in lowered
              })

              claimable_now = bool(
                  claimability_signals
                  and not blocked_claim_signals
                  and not assignees
              )
              atlas_can_execute = bool(
                  atlas_capability_signals
                  and not external_execution_blockers
              )

              score = 0
              reasons = []
              risks = []

              if reward >= 1000:
                  score += 25
                  reasons.append(
                      "Very large stated reward"
                  )

              elif reward >= 500:
                  score += 23
                  reasons.append(
                      "Large stated reward"
                  )

              elif reward >= 150:
                  score += 20
                  reasons.append(
                      "Strong stated reward"
                  )

              elif reward >= 50:
                  score += 16
                  reasons.append(
                      "Good stated reward"
                  )

              else:
                  score += 10
                  reasons.append(
                      "Stated paid reward"
                  )

              if detail >= 1200:
                  score += 15
                  reasons.append(
                      "Detailed requirements"
                  )

              elif detail >= 500:
                  score += 11
                  reasons.append(
                      "Useful requirements"
                  )

              elif detail >= 150:
                  score += 6
                  reasons.append(
                      "Basic requirements"
                  )

              else:
                  score -= 8
                  risks.append(
                      "Requirements are too brief"
                  )

              score += min(
                  18,
                  len(preferred_matches) * 3,
              )

              if preferred_matches:
                  reasons.append(
                      "Capability match: "
                      + ", ".join(
                          preferred_matches[:6]
                      )
                  )

              if complexity_matches:
                  score -= min(
                      15,
                      len(complexity_matches) * 4,
                  )

                  risks.append(
                      "Potentially high complexity: "
                      + ", ".join(
                          complexity_matches[:4]
                      )
                  )

              visible_discussion = len(comments)

              if visible_discussion == 0:
                  score += 10
                  reasons.append(
                      "No visible comments"
                  )

              elif visible_discussion <= 3:
                  score += 6
                  reasons.append(
                      "Low visible discussion"
                  )

              elif visible_discussion <= 8:
                  score += 1
                  risks.append(
                      "Moderate visible discussion"
                  )

              else:
                  score -= 8
                  risks.append(
                      "Heavy visible discussion"
                  )

              if created_age is not None:
                  if created_age <= 1:
                      score += 14
                      reasons.append(
                          "Posted within 24 hours"
                      )

                  elif created_age <= 7:
                      score += 10
                      reasons.append(
                          "Posted within 7 days"
                      )

                  elif created_age <= 30:
                      score += 5
                      reasons.append(
                          "Posted within 30 days"
                      )

                  elif created_age > 180:
                      score -= 12
                      risks.append(
                          "Issue may be stale"
                      )

              if (
                  updated_age is not None
                  and updated_age <= 7
              ):
                  score += 4
                  reasons.append(
                      "Recently updated"
                  )

              if "acceptance criteria" in lowered:
                  score += 10
                  reasons.append(
                      "Explicit acceptance criteria"
                  )

              elif (
                  "expected behavior" in lowered
                  or "definition of done" in lowered
              ):
                  score += 7
                  reasons.append(
                      "Expected result is described"
                  )

              elif detail >= 500:
                  score += 3
                  reasons.append(
                      "Review path appears usable"
                  )

              else:
                  risks.append(
                      "Acceptance path requires "
                      "manual confirmation"
                  )

              if assignees:
                  score -= 18
                  risks.append(
                      "Issue already has an assignee"
                  )

              if open_pr_count == 1:
                  score -= 20
                  risks.append(
                      "One competing pull request "
                      "detected"
                  )

              elif open_pr_count >= 2:
                  score -= 30
                  risks.append(
                      f"{open_pr_count} competing "
                      "pull requests detected"
                  )

              if merged_pr_count:
                  score -= 45
                  risks.append(
                      "A linked pull request "
                      "appears merged"
                  )

              if issue.get("locked"):
                  score -= 8
                  risks.append(
                      "Issue discussion is locked"
                  )

              if payment_signals:
                  score += 5
                  reasons.append("Payment-related signal mentioned")

              if paypal_signals:
                  score += 6
                  reasons.append("PayPal payment explicitly mentioned")

              if fast_payment_signals:
                  score += 6
                  reasons.append("Fast-payment timing explicitly mentioned")

              if ai_allowed_signals:
                  score += 5
                  reasons.append("AI/automation participation appears allowed")

              # CEO prototype law: for small rewards, payment-proof risk is accepted.
              # Atlas still requires a real open repository, no crypto, no AI ban,
              # no competing PR, no assignee, matching repository, and executable work.
              quick_win_risk_accepted = bool(
                  0.10 <= reward <= 50
                  and not human_only_signals
                  and not crypto_signals
                  and not repository_mismatch
                  and not assignees
                  and open_pr_count == 0
                  and merged_pr_count == 0
                  and atlas_can_execute
              )

              # CEO law: advertised instant/same-day/within-hours fiat tasks receive
              # EXTRA EXTRA priority. This is a ranking signal, not a payment guarantee.
              instant_payment_priority = bool(
                  0.10 <= reward <= 50
                  and fast_payment_signals
                  and (fiat_payment_signals or paypal_signals)
                  and not human_only_signals
                  and not crypto_signals
                  and not repository_mismatch
                  and not assignees
                  and open_pr_count == 0
                  and merged_pr_count == 0
                  and atlas_can_execute
              )

              if quick_win_risk_accepted:
                  score += 18
                  reasons.append(
                      "Small-reward prototype law accepts unverified-payment risk"
                  )

              if instant_payment_priority:
                  score += 35
                  reasons.append(
                      "EXTRA EXTRA PRIORITY: explicit instant or same-day fiat payment terms"
                  )

              if human_only_signals:
                  score -= 35
                  risks.append("Human-only or AI-prohibited language detected")

              if approval_authority_signals:
                  score += 5
                  reasons.append("Acceptance authority or approval trigger is described")

              if repository_mismatch:
                  score -= 45
                  risks.append(
                      "Advertised repository does not match "
                      "the GitHub issue repository"
                  )

              if not direct_payment_proof and not quick_win_risk_accepted:
                  score -= 18
                  risks.append(
                      "No direct payment proof or funded "
                      "bounty platform detected"
                  )
              elif not direct_payment_proof and quick_win_risk_accepted:
                  risks.append(
                      "Payment unverified; risk accepted under small-reward prototype law"
                  )

              if claimable_now:
                  score += 12
                  reasons.append(
                      "Explicitly claimable with no current assignee"
                  )
              else:
                  score -= 12
                  risks.append(
                      "Claim path is missing, blocked, or ambiguous"
                  )

              if atlas_can_execute:
                  score += 10
                  reasons.append(
                      "Task matches Atlas execution capabilities"
                  )
              else:
                  score -= 20
                  risks.append(
                      "Task is not clearly executable by Atlas"
                  )

              if 0.10 <= reward <= 50:
                  score += 10
                  reasons.append("Highest-priority first-payment reward band")
              elif reward <= 100:
                  score += 7
                  reasons.append("High-priority small reward band")
              elif reward <= 250:
                  score += 4
                  reasons.append("Priority reward band")

              if not assignees and open_pr_count == 0:
                  score += 8
                  reasons.append("No assignee and no competing pull request")

              if updated_age is not None and updated_age <= 3:
                  score += 5
                  reasons.append("Very recent activity")

              score = max(
                  0,
                  min(100, score),
              )

              if human_only_signals:
                  availability = "HUMAN-ONLY OR AI PROHIBITED"
                  decision = "REJECT"

              elif crypto_signals:
                  availability = "CRYPTO OR WALLET PAYMENT - BLOCKED"
                  decision = "REJECT"

              elif merged_pr_count:
                  availability = (
                      "LIKELY CLOSED BY WORK"
                  )
                  decision = "REJECT"

              elif assignees and open_pr_count:
                  availability = (
                      "ASSIGNED AND CONTESTED"
                  )
                  decision = "REJECT"

              elif open_pr_count:
                  availability = "CONTESTED"

                  decision = (
                      "PRIORITY REVIEW"
                      if score >= 62
                      else "WATCHLIST"
                  )

              elif assignees:
                  availability = "ASSIGNED"

                  decision = (
                      "WATCHLIST"
                      if score >= 50
                      else "REJECT"
                  )

              elif repository_mismatch:
                  availability = (
                      "REPOSITORY MISMATCH - MANUAL VERIFY"
                  )
                  decision = "WATCHLIST"

              elif instant_payment_priority and score >= 48:
                  availability = (
                      "INSTANT-PAYMENT EXTRA EXTRA PRIORITY - PROTOTYPE RISK ACCEPTED"
                  )
                  decision = "PURSUE"

              elif quick_win_risk_accepted and score >= 48:
                  availability = (
                      "SMALL REWARD PROTOTYPE - PAYMENT RISK ACCEPTED"
                  )
                  decision = "PURSUE"

              elif quick_win_risk_accepted:
                  availability = (
                      "SMALL REWARD - TECHNICALLY DOABLE, LOW SCORE"
                  )
                  decision = "PRIORITY REVIEW"

              elif not instant_payment_verified:
                  availability = "PAYMENT SPEED OR FUNDING NOT VERIFIED"
                  decision = "WATCHLIST"

              elif not direct_payment_proof:
                  availability = "PAYMENT NOT PROVEN - WATCHLIST"
                  decision = "WATCHLIST"

              elif not claimable_now:
                  availability = "CLAIM PATH NOT CONFIRMED"
                  decision = "PRIORITY REVIEW"

              elif not atlas_can_execute:
                  availability = "NOT EXECUTION-READY FOR ATLAS"
                  decision = "WATCHLIST"

              elif reward > 50:
                  availability = "OVER $50 - SECONDARY QUEUE"
                  decision = "PRIORITY REVIEW"

              elif score >= 62:
                  availability = (
                      "OPEN - READY FOR FINAL CLAIM CHECK"
                  )
                  decision = "PURSUE"

              elif score >= 48:
                  availability = (
                      "OPEN - NEEDS FINAL REVIEW"
                  )
                  decision = "PRIORITY REVIEW"

              elif score >= 36:
                  availability = "UNCERTAIN"
                  decision = "WATCHLIST"

              else:
                  availability = (
                      "LOW VALUE OR HIGH RISK"
                  )
                  decision = "REJECT"

              # CEO reward law: over $250 stays visible but never enters the main pursue queue.
              if reward > 250 and decision not in {"REJECT"}:
                  availability = "OVER $250 - WATCHLIST ONLY"
                  decision = "WATCHLIST"

              payment_verification = (
                  "SMALL-REWARD RISK ACCEPTED - PAYMENT UNVERIFIED"
                  if quick_win_risk_accepted and not instant_payment_verified
                  else "PROTOTYPE-QUALIFIED: FUNDED + FIAT + FAST TERMS"
                  if instant_payment_verified
                  else "FIAT METHOD MENTIONED - FUNDING/TIMING NOT PROVEN"
                  if fiat_payment_signals
                  else "FUNDING WORDING FOUND - FIAT/TIMING NOT PROVEN"
                  if funded_payment_platform
                  else "FAST-PAY WORDING FOUND - FUNDING NOT PROVEN"
                  if fast_payment_signals
                  else "UNVERIFIED"
              )

              ai_eligibility = (
                  "PROHIBITED" if human_only_signals
                  else "EXPLICITLY ALLOWED" if ai_allowed_signals
                  else "UNCLEAR - MANUAL VERIFICATION REQUIRED"
              )

              approval_authority = (
                  "OWNER/MAINTAINER APPROVAL PATH DESCRIBED"
                  if approval_authority_signals
                  else "NOT VERIFIED"
              )

              fast_pay_candidate = bool(
                  0.10 <= reward <= 50
                  and (quick_win_risk_accepted or (fiat_payment_signals and fast_payment_signals))
                  and not human_only_signals
                  and not assignees
                  and open_pr_count == 0
                  and merged_pr_count == 0
              )

              fast_pay_status = (
                  "INSTANT-PAYMENT EXTRA EXTRA PRIORITY"
                  if instant_payment_priority
                  else "FAST-PAY LEAD - PAYMENT NOT GUARANTEED"
                  if fast_pay_candidate
                  else "NOT PROTOTYPE-PAYMENT-QUALIFIED"
              )

              return {
                  "title": title,
                  "url": issue_url,
                  "repository": repository,
                  "issue_number": number,
                  "author": (
                      (
                          issue.get("user") or {}
                      ).get("login")
                      or ""
                  ),
                  "reward": reward,
                  "reward_priority": (
                      "HIGHEST" if 0.10 <= reward <= 50
                      else "HIGH" if reward <= 100
                      else "PRIORITY" if reward <= 250
                      else "WATCHLIST"
                  ),
                  "score": score,
                  "decision": decision,
                  "availability": availability,
                  "created_at": (
                      issue.get("created_at")
                      or ""
                  ),
                  "updated_at": (
                      issue.get("updated_at")
                      or ""
                  ),
                  "comments": visible_discussion,
                  "labels": labels,
                  "assignees": assignees,
                  "open_competing_prs": (
                      open_pr_count
                  ),
                  "merged_linked_prs": (
                      merged_pr_count
                  ),
                  "linked_pull_requests": sorted(
                      pr_summaries,
                      key=lambda pr: (
                          pr.get("updated_at") or ""
                      ),
                      reverse=True,
                  ),
                  "payment_verification": payment_verification,
                  "paypal_signals": paypal_signals,
                  "fiat_payment_signals": fiat_payment_signals,
                  "fast_payment_signals": fast_payment_signals,
                  "ai_eligibility": ai_eligibility,
                  "approval_authority": approval_authority,
                  "direct_payment_proof": direct_payment_proof,
                  "instant_payment_verified": instant_payment_verified,
                  "instant_payment_priority": instant_payment_priority,
                  "funded_payment_platform": funded_payment_platform,
                  "trusted_payout_source": trusted_payout_source,
                  "trusted_platform": trusted_platform,
                  "platform_signals": platform_signals,
                  "trusted_repository": trusted_repository,
                  "payout_program_repository": payout_program_repository,
                  "payout_source": (
                      f"Payout program repository: {repository_full_name}"
                      if payout_program_repository and not trusted_payout_source
                      else payout_source
                  ),
                  "claimable_now": claimable_now,
                  "quick_win_risk_accepted": quick_win_risk_accepted,
                  "claimability_signals": claimability_signals,
                  "atlas_can_execute": atlas_can_execute,
                  "atlas_capability_signals": atlas_capability_signals,
                  "external_execution_blockers": external_execution_blockers,
                  "repository_mismatch": repository_mismatch,
                  "advertised_repository": advertised_repository,
                  "fast_pay_candidate": fast_pay_candidate,
                  "fast_pay_status": fast_pay_status,
                  "manual_verification_required": bool(
                      repository_mismatch
                      or not direct_payment_proof
                      or not claimable_now
                      or not atlas_can_execute
                      or not (
                          fast_pay_candidate
                          and ai_allowed_signals
                          and approval_authority_signals
                      )
                  ),
                  "reasons": reasons,
                  "risks": risks,
              }

          previous_by_url = load_previous()
          discovery_cache = load_json_file(
              DISCOVERY_CACHE_FILE,
              {"issues": {}, "discovered_by": {}},
          )
          cached_issues = discovery_cache.get("issues", {})
          raw_issues = {
              url: issue
              for url, issue in cached_issues.items()
              if isinstance(issue, dict)
          }
          discovered_by = {
              url: set(workers)
              for url, workers in discovery_cache.get("discovered_by", {}).items()
              if isinstance(workers, list)
          }
          worker_fresh_urls = {"Atlas": set(), "Alex": set()}
          worker_searches_completed = {"Atlas": 0, "Alex": 0}
          worker_raw_hits = {"Atlas": 0, "Alex": 0}

          def run_worker_search(worker_name, queries, sort_mode):
              for query in queries:
                  if api_rate_limited:
                      break

                  encoded = urllib.parse.quote(query)
                  url = (
                      "https://api.github.com/search/issues"
                      f"?q={encoded}"
                      f"&sort={sort_mode}"
                      "&order=desc"
                      "&per_page=100"
                  )
                  data = safe_api_get(url)

                  if not isinstance(data, dict):
                      continue

                  worker_searches_completed[worker_name] += 1

                  for issue in data.get("items", []):
                      if "pull_request" in issue:
                          continue

                      issue_url = issue.get("html_url") or ""
                      if not issue_url:
                          continue

                      worker_raw_hits[worker_name] += 1
                      raw_issues[issue_url] = issue
                      worker_fresh_urls[worker_name].add(issue_url)
                      discovered_by.setdefault(issue_url, set()).add(worker_name)

          # Atlas searches the broad universe by recent activity.
          run_worker_search(
              "Atlas",
              ATLAS_SEARCH_QUERIES,
              "updated",
          )

          # Alex independently searches small/fast work by newest creation.
          run_worker_search(
              "Alex",
              ALEX_SEARCH_QUERIES,
              "created",
          )

          # V35 operational guarantee: Alex must perform real searches, not merely
          # appear in telemetry. If the first search pass completes zero queries,
          # immediately retry with a compact fallback universe.
          alex_retry_triggered = False
          alex_search_failure = False
          if worker_searches_completed["Alex"] == 0:
              alex_retry_triggered = True
              alex_fallback_queries = [
                  'is:issue is:open bounty label:"good first issue"',
                  'is:issue is:open reward label:"help wanted"',
                  'is:issue is:open "$50" in:title,body',
                  'is:issue is:open "$25" in:title,body',
                  'is:issue is:open "small bounty" in:title,body',
              ]
              run_worker_search(
                  "Alex",
                  alex_fallback_queries,
                  "updated",
              )

          if worker_searches_completed["Alex"] == 0:
              alex_search_failure = True
              api_errors.append({
                  "worker": "Alex",
                  "stage": "search",
                  "error": "Alex completed zero search queries after automatic retry",
              })

          fresh_discovery_urls = (
              worker_fresh_urls["Atlas"]
              | worker_fresh_urls["Alex"]
          )
          searches_completed = sum(worker_searches_completed.values())

          # Keep the repository lightweight. Search results can contain very
          # large issue bodies, so persist only the 750 most recently updated
          # records. The current run still evaluates the full in-memory result
          # set; this cap only controls what is carried into future runs.
          def cache_sort_key(pair):
              issue = pair[1]
              return str(
                  issue.get("updated_at")
                  or issue.get("created_at")
                  or ""
              )

          cache_items = sorted(
              raw_issues.items(),
              key=cache_sort_key,
              reverse=True,
          )[:750]
          cache_issues = dict(cache_items)
          cache_urls = set(cache_issues)

          DISCOVERY_CACHE_FILE.write_text(
              json.dumps(
                  {
                      "updated_at": GENERATED_AT,
                      "cache_limit": 750,
                      "total_seen_this_run": len(raw_issues),
                      "issues": cache_issues,
                      "fresh_urls": sorted(
                          fresh_discovery_urls & cache_urls
                      ),
                      "discovered_by": {
                          url: sorted(discovered_by.get(url, set()))
                          for url in cache_issues
                      },
                      "worker_stats": {
                          worker: {
                              "queries_completed": worker_searches_completed[worker],
                              "raw_hits": worker_raw_hits[worker],
                              "unique_fresh": len(worker_fresh_urls[worker]),
                          }
                          for worker in ("Atlas", "Alex")
                      },
                  },
                  indent=2,
                  ensure_ascii=False,
              ),
              encoding="utf-8",
          )

          initial_candidates = []
          rejected_aggregators = 0
          rejected_unsafe = 0
          rejected_no_reward = 0

          for issue in raw_issues.values():
              title = issue.get("title") or ""
              body = issue.get("body") or ""
              text = f"{title}\n{body}"
              lowered = text.lower()

              if is_aggregator(
                  issue,
                  title,
                  body,
              ):
                  rejected_aggregators += 1
                  continue

              if any(
                  term in lowered
                  for term in BLOCKED_TERMS
              ):
                  rejected_unsafe += 1
                  continue

              reward = extract_reward(text)

              if reward <= 0:
                  rejected_no_reward += 1
                  continue

              initial_candidates.append(issue)

          def discovery_priority(issue):
              title = issue.get("title") or ""
              body = issue.get("body") or ""
              lowered = f"{title}\n{body}".lower()
              reward = extract_reward(f"{title}\n{body}")

              if 0.10 <= reward <= 50:
                  reward_band = 5
              elif reward <= 100:
                  reward_band = 4
              elif reward <= 250:
                  reward_band = 3
              elif reward <= 500:
                  reward_band = 1
              else:
                  reward_band = 0

              funded_signal = sum(
                  1 for term in (
                      "funded bounty",
                      "pre-funded bounty",
                      "prefunded bounty",
                      "funds secured",
                      "paid on merge",
                      "payment upon merge",
                      "automatic payout",
                  )
                  if term in lowered
              )

              easy_signal = sum(
                  1 for term in (
                      "good first issue",
                      "documentation",
                      "docs",
                      "test",
                      "tests",
                      "small fix",
                      "quick fix",
                      "beginner",
                      "easy",
                      "typo",
                      "workflow",
                      "github actions",
                  )
                  if term in lowered
              )

              complexity_signal = sum(
                  1 for term in COMPLEXITY_TERMS
                  if term in lowered
              )

              return (
                  reward_band,
                  funded_signal,
                  easy_signal,
                  -complexity_signal,
                  issue.get("updated_at") or "",
              )

          initial_candidates.sort(
              key=discovery_priority,
              reverse=True,
          )

          # V33 reserves verification capacity for both hunters and for
          # small rewards so they cannot disappear behind large speculative items.
          issue_by_url = {
              issue.get("html_url"): issue
              for issue in initial_candidates
              if issue.get("html_url")
          }

          previous_actionable_urls = [
              url
              for url, item in previous_by_url.items()
              if item.get("decision") in {
                  "PURSUE",
                  "PRIORITY REVIEW",
              }
              and url in issue_by_url
          ]

          atlas_candidates = [
              issue for issue in initial_candidates
              if "Atlas" in discovered_by.get(issue.get("html_url"), set())
          ]
          alex_candidates = [
              issue for issue in initial_candidates
              if "Alex" in discovered_by.get(issue.get("html_url"), set())
          ]
          small_candidates = [
              issue for issue in initial_candidates
              if 0.10 <= extract_reward(
                  f"{issue.get('title') or ''}\n{issue.get('body') or ''}"
              ) <= 100
          ]
          alex_small_candidates = [
              issue for issue in small_candidates
              if "Alex" in discovered_by.get(issue.get("html_url"), set())
          ]
          atlas_small_candidates = [
              issue for issue in small_candidates
              if "Atlas" in discovered_by.get(issue.get("html_url"), set())
          ]

          verification_queue = []
          queued_urls = set()

          def add_candidates(candidates, limit):
              added = 0
              for issue in candidates:
                  if added >= limit or len(verification_queue) >= 30:
                      break
                  url = issue.get("html_url")
                  if not url or url in queued_urls:
                      continue
                  verification_queue.append(issue)
                  queued_urls.add(url)
                  added += 1

          # Preserve active work, then guarantee both workers' small-reward output.
          add_candidates(
              [issue_by_url[url] for url in previous_actionable_urls],
              5,
          )
          add_candidates(alex_small_candidates, 10)
          add_candidates(atlas_small_candidates, 7)
          add_candidates(alex_candidates, 4)
          add_candidates(atlas_candidates, 4)
          add_candidates(initial_candidates, 30)

          verified_results = []

          for index, issue in enumerate(
              verification_queue,
              start=1,
          ):
              print(
                  "Verifying candidate "
                  f"{index}/"
                  f"{len(verification_queue)}: "
                  f"{issue.get('html_url')}"
              )

              verified_item = verify_candidate(issue)
              verified_item["discovered_by"] = sorted(
                  discovered_by.get(
                      issue.get("html_url"),
                      set(),
                  )
              )
              verified_item["primary_hunter"] = (
                  "BOTH"
                  if len(verified_item["discovered_by"]) > 1
                  else verified_item["discovered_by"][0]
                  if verified_item["discovered_by"]
                  else "CACHE"
              )
              verified_results.append(verified_item)

          verified_results.sort(
              key=lambda item: (
                  bool(item.get("instant_payment_priority")),
                  bool(item.get("fast_pay_candidate")),
                  item["score"],
                  item["reward"],
              ),
              reverse=True,
          )

          small_fast_wins = [
              item for item in verified_results
              if 0.10 <= item.get("reward", 0) <= 100
              and item.get("decision") != "REJECT"
          ]
          small_fast_wins.sort(
              key=lambda item: (
                  item.get("decision") == "PURSUE",
                  bool(item.get("instant_payment_priority")),
                  item.get("direct_payment_proof", False),
                  item.get("claimable_now", False),
                  item.get("atlas_can_execute", False),
                  item.get("score", 0),
                  -item.get("reward", 0),
              ),
              reverse=True,
          )
          atlas_small_wins = [
              item for item in small_fast_wins
              if "Atlas" in item.get("discovered_by", [])
          ]
          alex_small_wins = [
              item for item in small_fast_wins
              if "Alex" in item.get("discovered_by", [])
          ]
          ready_small_wins = [
              item for item in small_fast_wins
              if (
                  item.get("decision") == "PURSUE"
                  and (
                      item.get("instant_payment_verified")
                      or item.get("quick_win_risk_accepted")
                  )
              )
          ]

          micro_rewards = [
              item for item in small_fast_wins
              if 0.10 <= item.get("reward", 0) < 5
          ]
          trusted_payout_ready = []
          payout_program_reviews = []
          small_target_met = len(ready_small_wins) >= 2
          small_target_status = (
              "ACHIEVED"
              if small_target_met
              else "NOT ACHIEVED"
          )

          meaningful_changes = []

          for item in verified_results:
              previous = previous_by_url.get(
                  item["url"]
              )

              if not previous:
                  item["change"] = "NEW"

                  meaningful_changes.append(
                      {
                          "type": "NEW",
                          "title": item["title"],
                          "url": item["url"],
                          "decision": (
                              item["decision"]
                          ),
                      }
                  )

                  continue

              changed_fields = []

              for field in (
                  "decision",
                  "availability",
                  "reward",
                  "assignees",
                  "open_competing_prs",
                  "merged_linked_prs",
              ):
                  if (
                      previous.get(field)
                      != item.get(field)
                  ):
                      changed_fields.append(field)

              if changed_fields:
                  item["change"] = (
                      "CHANGED: "
                      + ", ".join(changed_fields)
                  )

                  meaningful_changes.append(
                      {
                          "type": "CHANGED",
                          "title": item["title"],
                          "url": item["url"],
                          "fields": changed_fields,
                          "decision": (
                              item["decision"]
                          ),
                      }
                  )

              else:
                  item["change"] = "UNCHANGED"

          candidate_lifecycle = load_candidate_lifecycle()
          current_verified_urls = {
              item["url"] for item in verified_results
          }

          lifecycle_new = 0
          lifecycle_still_active = 0
          lifecycle_changed = 0

          for item in verified_results:
              url = item["url"]
              record = candidate_lifecycle.get(url, {})
              first_seen = record.get("first_seen") or GENERATED_AT

              if not record:
                  lifecycle_new += 1
              elif item.get("change", "").startswith("CHANGED"):
                  lifecycle_changed += 1
              else:
                  lifecycle_still_active += 1

              item["first_seen"] = first_seen
              item["last_verified"] = GENERATED_AT

              candidate_lifecycle[url] = {
                  "title": item.get("title"),
                  "repository": item.get("repository"),
                  "first_seen": first_seen,
                  "last_verified": GENERATED_AT,
                  "last_decision": item.get("decision"),
                  "last_availability": item.get("availability"),
                  "last_reward": item.get("reward"),
                  "verification_state": "VERIFIED THIS RUN",
              }

          not_reverified_urls = [
              url
              for url in previous_by_url
              if url not in current_verified_urls
          ]

          for url in not_reverified_urls:
              previous_item = previous_by_url[url]
              record = candidate_lifecycle.get(url, {})
              candidate_lifecycle[url] = {
                  "title": previous_item.get("title"),
                  "repository": previous_item.get("repository"),
                  "first_seen": (
                      record.get("first_seen")
                      or previous_item.get("first_seen")
                      or GENERATED_AT
                  ),
                  "last_verified": (
                      record.get("last_verified")
                      or previous_item.get("last_verified")
                  ),
                  "last_decision": previous_item.get("decision"),
                  "last_availability": previous_item.get("availability"),
                  "last_reward": previous_item.get("reward"),
                  "verification_state": "NOT REVERIFIED THIS RUN",
              }

          CANDIDATE_LIFECYCLE_FILE.write_text(
              json.dumps(
                  candidate_lifecycle,
                  indent=2,
                  ensure_ascii=False,
              ),
              encoding="utf-8",
          )

          lifecycle_summary = {
              "new_this_run": lifecycle_new,
              "still_active": lifecycle_still_active,
              "changed": lifecycle_changed,
              "not_reverified": len(not_reverified_urls),
          }

          counts = {
              decision: sum(
                  item["decision"] == decision
                  for item in verified_results
              )
              for decision in (
                  "PURSUE",
                  "PRIORITY REVIEW",
                  "WATCHLIST",
                  "REJECT",
              )
          }

          gate_counts = {}
          for item in verified_results:
              gate = item.get("availability") or "UNKNOWN"
              gate_counts[gate] = gate_counts.get(gate, 0) + 1

          diagnostic_lines = [
              "# Atlas + Alex V35 Gate Diagnostics",
              "",
              f"Generated: {GENERATED_AT}",
              "",
              "## Decision Counts",
              "",
          ]
          for decision, value in counts.items():
              diagnostic_lines.append(f"- {decision}: {value}")

          diagnostic_lines.extend(["", "## Gate Counts", ""])
          for gate, value in sorted(
              gate_counts.items(),
              key=lambda pair: pair[1],
              reverse=True,
          ):
              diagnostic_lines.append(f"- {gate}: {value}")

          diagnostic_lines.extend(["", "## Candidate Details", ""])
          for item in verified_results:
              diagnostic_lines.extend([
                  f"### {item.get('repository')} #{item.get('issue_number')}",
                  f"- Decision: {item.get('decision')}",
                  f"- Gate: {item.get('availability')}",
                  f"- Reward: ${float(item.get('reward', 0) or 0):,.2f}",
                  f"- Payment: {item.get('payment_verification')}",
                  f"- Payout source: {item.get('payout_source')}",
                  f"- Claimable: {item.get('claimable_now')}",
                  f"- Quick-win risk accepted: {item.get('quick_win_risk_accepted', False)}",
                  f"- Atlas executable: {item.get('atlas_can_execute')}",
                  f"- URL: {item.get('url')}",
                  "",
              ])

          (REPORTS_DIR / "atlas-v33-gate-diagnostics.md").write_text(
              "\n".join(diagnostic_lines),
              encoding="utf-8",
          )

          contested_count = sum(
              item["open_competing_prs"] > 0
              for item in verified_results
          )

          assigned_count = sum(
              bool(item["assignees"])
              for item in verified_results
          )

          top_results = verified_results[:12]

          strong_targets = [
              item
              for item in verified_results
              if item["decision"] == "PURSUE"
              and item["open_competing_prs"] == 0
              and not item["assignees"]
          ]

          status = "HEALTHY"

          if searches_completed == 0:
              status = "FAILED"

          elif api_errors:
              status = "DEGRADED"

          def money_total(start=None, end=None, statuses=("paid", "received", "completed")):
              total = 0.0
              for entry in ledger:
                  try:
                      amount = float(entry.get("amount", 0) or 0)
                  except (TypeError, ValueError):
                      continue
                  status_value = str(entry.get("status", "paid")).lower()
                  if status_value not in statuses:
                      continue
                  when = parse_datetime(entry.get("paid_at") or entry.get("date") or entry.get("created_at"))
                  if start and (not when or when < start):
                      continue
                  if end and when and when >= end:
                      continue
                  total += amount
              return round(total, 2)

          today_start = NOW.replace(hour=0, minute=0, second=0, microsecond=0)
          week_start = today_start.replace(day=max(1, today_start.day - today_start.weekday()))
          month_start = today_start.replace(day=1)
          year_start = today_start.replace(month=1, day=1)

          waiting_today = 0.0
          waiting_later = 0.0
          overdue = 0.0
          waiting_unknown = 0.0
          payment_schedule = []
          for entry in ledger:
              status_value = str(entry.get("status", "")).lower()
              if status_value not in ("pending", "waiting", "submitted", "approved"):
                  continue
              try:
                  amount = float(entry.get("amount", 0) or 0)
              except (TypeError, ValueError):
                  amount = 0.0
              expected = parse_datetime(entry.get("expected_at"))
              if expected is None:
                  bucket = "UNKNOWN"
                  waiting_unknown += amount
              elif expected < today_start:
                  bucket = "OVERDUE"
                  overdue += amount
              elif expected < today_start.replace(hour=23, minute=59, second=59):
                  bucket = "TODAY"
                  waiting_today += amount
              else:
                  bucket = "LATER"
                  waiting_later += amount
              payment_schedule.append({
                  "title": entry.get("title", "Untitled payment"),
                  "amount": amount,
                  "expected_at": entry.get("expected_at"),
                  "bucket": bucket,
                  "status": status_value,
              })

          earnings = {
              "today": money_total(today_start),
              "week": money_total(week_start),
              "month": money_total(month_start),
              "year": money_total(year_start),
              "lifetime": money_total(),
              "waiting_today": round(waiting_today, 2),
              "waiting_later": round(waiting_later, 2),
              "overdue": round(overdue, 2),
              "waiting_unknown": round(waiting_unknown, 2),
          }
          earnings["waiting_total"] = round(waiting_today + waiting_later + overdue + waiting_unknown, 2)
          allocations = {
              "tax": round(earnings["year"] * float(config["tax_percent"]) / 100, 2),
              "reinvesting": round(earnings["year"] * float(config["reinvest_percent"]) / 100, 2),
              "mazen": round(earnings["year"] * float(config["mazen_percent"]) / 100, 2),
          }

          execution_queue = []
          for item in verified_results:
              payment_confidence = max(
                  0,
                  min(
                      100,
                      15
                      + item.get("score", 0) * 0.65
                      + (18 if item.get("direct_payment_proof") else 0)
                      + (12 if item.get("approval_authority") != "NOT VERIFIED" else 0)
                      + (10 if item.get("fast_payment_signals") else 0)
                      - item.get("open_competing_prs", 0) * 18
                      - (22 if item.get("assignees") else 0),
                  ),
              )
              if not item.get("direct_payment_proof"):
                  payment_confidence = min(
                      payment_confidence,
                      49,
                  )
              if item.get("repository_mismatch"):
                  payment_confidence = min(
                      payment_confidence,
                      25,
                  )

              competition_score = max(0, 100 - item.get("open_competing_prs", 0) * 30 - (25 if item.get("assignees") else 0))
              clarity_score = max(0, min(100, 50 + (10 if item.get("acceptance_criteria") else 0) + min(30, len(item.get("evidence", [])) * 5)))
              effort_risk = max(5, min(100, 45 + len(item.get("risks", [])) * 10))
              expected_value = round(item.get("reward", 0) * (payment_confidence / 100) * (competition_score / 100) / max(1, effort_risk / 25), 2)
              queue_item = dict(item)
              queue_item.update({
                  "payment_confidence": round(payment_confidence, 1),
                  "competition_score": round(competition_score, 1),
                  "clarity_score": round(clarity_score, 1),
                  "effort_risk": round(effort_risk, 1),
                  "expected_value": expected_value,
              })
              execution_queue.append(queue_item)
          def reward_priority_rank(item):
              reward = float(item.get("reward", 0) or 0)
              if 0.10 <= reward <= 50:
                  return 3
              if reward <= 100:
                  return 2
              if reward <= 250:
                  return 1
              return 0

          execution_queue.sort(
              key=lambda x: (
                  x["decision"] == "PURSUE",
                  bool(x.get("instant_payment_priority")),
                  bool(x.get("fast_pay_candidate")),
                  reward_priority_rank(x),
                  x.get("ai_eligibility") == "EXPLICITLY ALLOWED",
                  x["expected_value"],
                  x.get("score", 0),
              ),
              reverse=True,
          )
          execution_queue = execution_queue[:int(config.get("queue_size", 20))]

          operations["version"] = "V35"
          operations["last_updated"] = GENERATED_AT
          operations["pipeline"] = execution_queue
          OPERATIONS_FILE.write_text(json.dumps(operations, indent=2, ensure_ascii=False), encoding="utf-8")

          # V33: reserve distinct, prototype-qualified small PURSUE tasks for immediate workers.
          executable_candidates = [
              item for item in execution_queue
              if item.get("decision") == "PURSUE"
              and 0 < float(item.get("reward", 0) or 0) <= float(config.get("maximum_execution_reward", 250))
              and float(item.get("score", 0) or 0) >= float(config.get("execution_score_floor", 48))
              and not item.get("assignees")
              and int(item.get("open_competing_prs", 0) or 0) == 0
              and not item.get("repository_mismatch")
              and item.get("atlas_can_execute")
              and item.get("ai_eligibility") != "PROHIBITED"
          ]
          executable_candidates.sort(
              key=lambda item: (
                  bool(item.get("instant_payment_priority")),
                  bool(item.get("fast_pay_candidate")),
                  item.get("score", 0),
                  item.get("expected_value", 0),
              ),
              reverse=True,
          )

          reserved_repositories = set()
          selected_executions = []
          worker_names = ["Atlas", "Alex"]
          for item in executable_candidates:
              repository = item.get("repository") or ""
              if not repository or repository in reserved_repositories:
                  continue
              worker = worker_names[len(selected_executions) % len(worker_names)]
              selected_executions.append({
                  "worker": worker,
                  "repository": repository,
                  "issue_number": int(item.get("issue_number") or 0),
                  "issue_url": item.get("url") or "",
                  "title": item.get("title") or "",
                  "reward": float(item.get("reward", 0) or 0),
                  "score": float(item.get("score", 0) or 0),
                  "payment_verification": item.get("payment_verification") or "UNVERIFIED",
                  "status": "DISPATCHED",
                  "reserved_at": NOW.isoformat(),
              })
              reserved_repositories.add(repository)
              dispatch_limit = 1 if os.environ.get("REQUESTED_EXECUTION_MODE", "scan_only") == "safe_test" else int(config.get("parallel_workers", 2))
              if len(selected_executions) >= dispatch_limit:
                  break

          EXECUTION_FILE.write_text(
              json.dumps({
                  "version": "V35",
                  "generated_at": GENERATED_AT,
                  "automatic_execution": True,
                  "workers_requested": int(config.get("parallel_workers", 2)),
                  "tasks_dispatched": len(selected_executions),
                  "tasks": selected_executions,
              }, indent=2, ensure_ascii=False),
              encoding="utf-8",
          )

          quick_wins = [
              item for item in execution_queue
              if 5 <= float(item.get("reward", 0)) <= 100
              and not item.get("assignees")
              and int(item.get("open_competing_prs", 0)) == 0
          ]
          instant_priority_candidates = [item for item in execution_queue if item.get("instant_payment_priority")]
          fast_paypal_candidates = [item for item in execution_queue if item.get("fast_pay_candidate")]
          ai_clear_candidates = [item for item in execution_queue if item.get("ai_eligibility") == "EXPLICITLY ALLOWED"]
          approval_path_candidates = [item for item in execution_queue if item.get("approval_authority") != "NOT VERIFIED"]
          alex_recommendation = (
              f"EXTRA EXTRA PRIORITY: dispatch {len(instant_priority_candidates)} advertised instant-payment candidate(s) before every ordinary task."
              if instant_priority_candidates
              else f"Immediately review {len(fast_paypal_candidates)} small fast-pay lead(s)."
              if fast_paypal_candidates
              else f"Review {len(quick_wins)} unassigned quick-win candidate(s) first; verify AI permission and payer authority."
              if quick_wins
              else "No clean fast-pay quick win found in this scan; continue scanning."
          )
          maintenance.update({
              "doctor": "Dr. Alex",
              "health": status,
              "last_check": GENERATED_AT,
              "api_errors": len(api_errors),
              "searches_completed": searches_completed,
              "atlas_searches_completed": worker_searches_completed["Atlas"],
              "alex_searches_completed": worker_searches_completed["Alex"],
              "alex_raw_hits": worker_raw_hits["Alex"],
              "alex_fresh_discoveries": len(worker_fresh_urls["Alex"]),
              "alex_retry_triggered": alex_retry_triggered,
