name: Atlas Opportunity Hunter V9

on:
  workflow_dispatch:
  schedule:
    - cron: "7,22,37,52 * * * *"

concurrency:
  group: atlas-opportunity-hunter-v9
  cancel-in-progress: false

permissions:
  contents: write
  issues: read
  pull-requests: read

jobs:
  hunt:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Download repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Scan and verify paid opportunities
        id: atlas
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python <<'PY'
          import html
          import json
          import os
          import re
          import time
          import urllib.error
          import urllib.parse
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          TOKEN = os.environ["GITHUB_TOKEN"]
          API_VERSION = "2022-11-28"
          NOW = datetime.now(timezone.utc)
          GENERATED_AT = NOW.strftime("%Y-%m-%d %H:%M UTC")

          DATA_DIR = Path("data")
          DOCS_DIR = Path("docs")
          DATA_DIR.mkdir(exist_ok=True)
          DOCS_DIR.mkdir(exist_ok=True)

          CURRENT_FILE = DATA_DIR / "opportunities.json"
          HISTORY_FILE = DATA_DIR / "opportunity-history.json"
          DASHBOARD_FILE = DOCS_DIR / "index.html"
          MONEY_LEDGER_FILE = DATA_DIR / "money-ledger.json"

          SEARCH_QUERIES = [
              # Original GitHub repositories and maintainer-run paid issue boards.
              'is:issue is:open bounty in:title,body',
              'is:issue is:open reward in:title,body',
              'is:issue is:open label:bounty',
              'is:issue is:open label:reward',
              'is:issue is:open label:"paid task"',
              'is:issue is:open label:"good first issue" "$" in:body',
              'is:issue is:open label:"help wanted" "$" in:body',
              'is:issue is:open "paid on merge" in:body',
              'is:issue is:open "payment upon acceptance" in:body',
              'is:issue is:open "instant payment" in:body',
              'is:issue is:open "same day payment" in:body',
              'is:issue is:open "PayPal" bounty in:body',
              # AI-approved work signals.
              'is:issue is:open ("AI allowed" OR "AI-assisted") "$" in:body',
              'is:issue is:open ("Copilot allowed" OR "Claude Code allowed") "$" in:body',
              'is:issue is:open ("LLM allowed" OR "automation allowed") "$" in:body',
              # Easy task categories.
              'is:issue is:open (documentation OR docs OR tests OR workflow) bounty in:body',
              'is:issue is:open (prompt evaluation OR model evaluation OR data cleanup) reward in:body',
              # Known funded-bounty ecosystems surfaced through original GitHub issues.
              'is:issue is:open (algora OR issuehunt) "$" in:body',
          ]

          BLOCKED_TERMS = [
              "phishing",
              "malware",
              "ransomware",
              "credential theft",
              "steal credentials",
              "unauthorized access",
              "bypass authentication",
              "ddos",
              "fake account",
              "account farming",
              "exploit users",
              "stolen data",
          ]

          PREFERRED_TERMS = [
              "bug",
              "fix",
              "test",
              "tests",
              "documentation",
              "docs",
              "python",
              "javascript",
              "typescript",
              "workflow",
              "github actions",
              "ci",
              "data cleanup",
              "refactor",
          ]

          COMPLEXITY_TERMS = [
              "architecture",
              "rewrite",
              "redesign",
              "production ready",
              "full implementation",
              "mobile app",
              "blockchain",
              "smart contract",
              "machine learning model",
              "security audit",
          ]

          PAYMENT_EVIDENCE_TERMS = [
              "paid bounty",
              "payment sent",
              "payment received",
              "bounty paid",
              "reward paid",
              "funded bounty",
              "escrow",
              "algora",
              "polar bounty",
          ]

          AI_APPROVED_TERMS = [
              "ai allowed",
              "ai-assisted",
              "ai assisted",
              "generative ai allowed",
              "llm allowed",
              "claude code allowed",
              "copilot allowed",
              "github copilot allowed",
              "automation allowed",
              "agents allowed",
              "ai tools permitted",
          ]

          AI_PROHIBITED_TERMS = [
              "no ai",
              "ai prohibited",
              "human only",
              "human-only",
              "no generated submissions",
              "no bots",
              "no automated work",
              "original human work required",
          ]

          FAST_PAYMENT_TERMS = [
              "instant payment",
              "paid instantly",
              "immediate payment",
              "within hours",
              "within a few hours",
              "same hour",
              "same-day payment",
              "same day payment",
              "paid on acceptance",
              "payment upon acceptance",
              "paid on merge",
              "payment upon merge",
              "paypal immediately",
          ]

          PAYPAL_TERMS = ["paypal", "paypal payment", "paid via paypal"]
          MIN_REWARD = 5.0
          MAX_MAIN_REWARD = 250.0

          api_errors = []
          api_calls = 0

          def parse_datetime(value):
              if not value:
                  return None
              try:
                  return datetime.fromisoformat(value.replace("Z", "+00:00"))
              except (TypeError, ValueError):
                  return None

          def age_days(value):
              parsed = parse_datetime(value)
              if not parsed:
                  return None
              return max(0.0, (NOW - parsed).total_seconds() / 86400)

          def api_get(url, accept="application/vnd.github+json", retries=3):
              global api_calls
              last_error = None

              for attempt in range(1, retries + 1):
                  request = urllib.request.Request(
                      url,
                      headers={
                          "Authorization": f"Bearer {TOKEN}",
                          "Accept": accept,
                          "X-GitHub-Api-Version": API_VERSION,
                          "User-Agent": "Atlas-Opportunity-Hunter-V9",
                      },
                  )

                  try:
                      api_calls += 1
                      with urllib.request.urlopen(request, timeout=30) as response:
                          return json.loads(response.read().decode("utf-8"))
                  except urllib.error.HTTPError as error:
                      body = error.read().decode("utf-8", errors="replace")[:300]
                      last_error = f"HTTP {error.code}: {body}"

                      if error.code in (403, 429) and attempt < retries:
                          time.sleep(attempt * 3)
                          continue
                      if 500 <= error.code < 600 and attempt < retries:
                          time.sleep(attempt * 2)
                          continue
                      break
                  except Exception as error:
                      last_error = str(error)
                      if attempt < retries:
                          time.sleep(attempt * 2)
                          continue
                      break

              raise RuntimeError(last_error or "Unknown GitHub API error")

          def safe_api_get(url, accept="application/vnd.github+json"):
              try:
                  return api_get(url, accept=accept)
              except Exception as error:
                  api_errors.append({"url": url, "error": str(error)})
                  return None

          def extract_reward(text):
              patterns = [
                  r"/bounty\s*\$([0-9][0-9,]*(?:\.\d{1,2})?)",
                  r"\$([0-9][0-9,]*(?:\.\d{1,2})?)\s*(?:usd\s*)?(?:bounty|reward|prize)",
                  r"(?:bounty|reward|prize)\s*(?:of|is|:|=)?\s*\$([0-9][0-9,]*(?:\.\d{1,2})?)",
                  r"(?:pay|payment|paid)\s*(?:of|is|:|=)?\s*\$([0-9][0-9,]*(?:\.\d{1,2})?)",
              ]

              rewards = []
              for pattern in patterns:
                  for match in re.finditer(pattern, text, re.I):
                      try:
                          rewards.append(float(match.group(1).replace(",", "")))
                      except ValueError:
                          pass

              return max(rewards, default=0.0)

          def issue_identity(issue):
              repository = (issue.get("repository_url") or "").split("/repos/")[-1]
              number = int(issue.get("number") or 0)
              return repository, number

          def is_aggregator(issue, title, body):
              repository, _ = issue_identity(issue)
              repository = repository.lower()
              author = ((issue.get("user") or {}).get("login") or "").lower()
              labels = {
                  (label.get("name") or "").lower()
                  for label in issue.get("labels", [])
              }
              title_lower = title.lower()
              body_lower = body.lower()

              aggregator_phrases = [
                  "bounty alert",
                  "new opportunities",
                  "new opportunityies",
                  "opportunities found",
                  "opportunityies found",
                  "top opportunities",
                  "new bounties found",
              ]

              if "bountyscout" in repository:
                  return True
              if any(phrase in title_lower for phrase in aggregator_phrases):
                  return True
              if "bounty-alert" in labels or "bounty alert" in labels:
                  return True
              if author == "github-actions[bot]" or author.endswith("[bot]"):
                  return True

              linked_issues = re.findall(
                  r"https://github\.com/[^/\s]+/[^/\s]+/issues/\d+",
                  body,
                  re.I,
              )
              if len(set(linked_issues)) >= 3:
                  return True
              if any(phrase in body_lower for phrase in aggregator_phrases):
                  return True

              return False

          def load_previous():
              if not CURRENT_FILE.exists():
                  return {}
              try:
                  payload = json.loads(CURRENT_FILE.read_text(encoding="utf-8"))
                  return {
                      item.get("url"): item
                      for item in payload.get("all_verified_results", [])
                      if item.get("url")
                  }
              except Exception:
                  return {}

          def load_history():
              if not HISTORY_FILE.exists():
                  return []
              try:
                  data = json.loads(HISTORY_FILE.read_text(encoding="utf-8"))
                  return data if isinstance(data, list) else []
              except Exception:
                  return []

          def collect_issue_comments(repository, number):
              encoded_repo = urllib.parse.quote(repository, safe="/")
              url = f"https://api.github.com/repos/{encoded_repo}/issues/{number}/comments?per_page=100"
              data = safe_api_get(url)
              return data if isinstance(data, list) else []

          def collect_timeline(repository, number):
              encoded_repo = urllib.parse.quote(repository, safe="/")
              url = f"https://api.github.com/repos/{encoded_repo}/issues/{number}/timeline?per_page=100"
              data = safe_api_get(
                  url,
                  accept="application/vnd.github+json",
              )
              return data if isinstance(data, list) else []

          def search_linked_pull_requests(repository, number, issue_url):
              queries = [
                  f'repo:{repository} is:pr is:open "#{number}"',
                  f'repo:{repository} is:pr "{issue_url}"',
              ]
              found = {}

              for query in queries:
                  encoded = urllib.parse.quote(query)
                  url = (
                      "https://api.github.com/search/issues"
                      f"?q={encoded}&sort=updated&order=desc&per_page=30"
                  )
                  data = safe_api_get(url)
                  if not isinstance(data, dict):
                      continue

                  for item in data.get("items", []):
                      if "pull_request" not in item:
                          continue
                      html_url = item.get("html_url") or ""
                      if html_url:
                          found[html_url] = item

              return list(found.values())

          def verify_candidate(issue):
              title = issue.get("title") or ""
              body = issue.get("body") or ""
              issue_url = issue.get("html_url") or ""
              repository, number = issue_identity(issue)
              labels = sorted({
                  (label.get("name") or "").strip()
                  for label in issue.get("labels", [])
                  if (label.get("name") or "").strip()
              })

              comments = collect_issue_comments(repository, number)
              timeline = collect_timeline(repository, number)
              linked_prs = search_linked_pull_requests(repository, number, issue_url)

              comment_text = "\n".join(
                  (comment.get("body") or "") for comment in comments
              )
              combined_text = f"{title}\n{body}\n{comment_text}"
              lowered = combined_text.lower()

              timeline_pr_urls = set()
              for event in timeline:
                  source_issue = ((event.get("source") or {}).get("issue") or {})
                  if "pull_request" in source_issue:
                      url = source_issue.get("html_url") or ""
                      if url:
                          timeline_pr_urls.add(url)

              linked_pr_map = {
                  pr.get("html_url"): pr
                  for pr in linked_prs
                  if pr.get("html_url")
              }

              for url in timeline_pr_urls:
                  linked_pr_map.setdefault(
                      url,
                      {
                          "html_url": url,
                          "title": "Pull request linked through issue timeline",
                          "state": "unknown",
                          "user": {},
                          "created_at": "",
                          "updated_at": "",
                      },
                  )

              pr_summaries = []
              open_pr_count = 0
              merged_pr_count = 0

              for pr in linked_pr_map.values():
                  state = (pr.get("state") or "unknown").lower()
                  pull_data = pr.get("pull_request") or {}
                  merged_at = pull_data.get("merged_at")
                  if merged_at:
                      merged_pr_count += 1
                  elif state == "open":
                      open_pr_count += 1

                  pr_summaries.append({
                      "title": pr.get("title") or "Linked pull request",
                      "url": pr.get("html_url") or "",
                      "state": "merged" if merged_at else state,
                      "author": ((pr.get("user") or {}).get("login") or ""),
                      "created_at": pr.get("created_at") or "",
                      "updated_at": pr.get("updated_at") or "",
                  })

              assignees = [
                  person.get("login") or ""
                  for person in issue.get("assignees", [])
                  if person.get("login")
              ]

              reward = extract_reward(f"{title}\n{body}")
              created_age = age_days(issue.get("created_at"))
              updated_age = age_days(issue.get("updated_at"))
              detail = len(body.strip())
              preferred_matches = sorted({
                  term for term in PREFERRED_TERMS if term in lowered
              })
              complexity_matches = sorted({
                  term for term in COMPLEXITY_TERMS if term in lowered
              })
              payment_signals = sorted({
                  term for term in PAYMENT_EVIDENCE_TERMS if term in lowered
              })
              ai_approved_signals = sorted({term for term in AI_APPROVED_TERMS if term in lowered})
              ai_prohibited_signals = sorted({term for term in AI_PROHIBITED_TERMS if term in lowered})
              fast_payment_signals = sorted({term for term in FAST_PAYMENT_TERMS if term in lowered})
              paypal_signals = sorted({term for term in PAYPAL_TERMS if term in lowered})

              if ai_prohibited_signals:
                  ai_eligibility = "PROHIBITED"
              elif ai_approved_signals:
                  ai_eligibility = "EXPLICITLY ALLOWED"
              else:
                  ai_eligibility = "UNCLEAR"

              if fast_payment_signals:
                  payment_speed = "INSTANT OR FEW HOURS"
              else:
                  payment_speed = "UNVERIFIED"

              payment_destination = "PAYPAL" if paypal_signals else "UNVERIFIED"

              score = 0
              reasons = []
              risks = []

              # Reward priority is intentionally inverted toward faster, smaller wins.
              if 5 <= reward <= 50:
                  score += 28
                  reasons.append("Highest reward priority: $5-$50")
                  reward_priority = "HIGHEST"
              elif 50 < reward <= 100:
                  score += 23
                  reasons.append("High reward priority: $51-$100")
                  reward_priority = "HIGH"
              elif 100 < reward <= 250:
                  score += 18
                  reasons.append("Priority reward: $101-$250")
                  reward_priority = "PRIORITY"
              else:
                  score -= 50
                  risks.append("Outside main reward range")
                  reward_priority = "SKIP"

              if detail >= 1200:
                  score += 15
                  reasons.append("Detailed requirements")
              elif detail >= 500:
                  score += 11
                  reasons.append("Useful requirements")
              elif detail >= 150:
                  score += 6
                  reasons.append("Basic requirements")
              else:
                  score -= 8
                  risks.append("Requirements are too brief")

              score += min(18, len(preferred_matches) * 3)
              if preferred_matches:
                  reasons.append("Capability match: " + ", ".join(preferred_matches[:6]))

              if complexity_matches:
                  score -= min(15, len(complexity_matches) * 4)
                  risks.append("Potentially high complexity: " + ", ".join(complexity_matches[:4]))

              visible_discussion = len(comments)
              if visible_discussion == 0:
                  score += 10
                  reasons.append("No visible comments")
              elif visible_discussion <= 3:
                  score += 6
                  reasons.append("Low visible discussion")
              elif visible_discussion <= 8:
                  score += 1
                  risks.append("Moderate visible discussion")
              else:
                  score -= 8
                  risks.append("Heavy visible discussion")

              if created_age is not None:
                  if created_age <= 1:
                      score += 14
                      reasons.append("Posted within 24 hours")
                  elif created_age <= 7:
                      score += 10
                      reasons.append("Posted within 7 days")
                  elif created_age <= 30:
                      score += 5
                      reasons.append("Posted within 30 days")
                  elif created_age > 180:
                      score -= 12
                      risks.append("Issue may be stale")

              if updated_age is not None and updated_age <= 7:
                  score += 4
                  reasons.append("Recently updated")

              if "acceptance criteria" in lowered:
                  score += 10
                  reasons.append("Explicit acceptance criteria")
              elif "expected behavior" in lowered or "definition of done" in lowered:
                  score += 7
                  reasons.append("Expected result is described")
              elif detail >= 500:
                  score += 3
                  reasons.append("Review path appears usable")
              else:
                  risks.append("Acceptance path requires manual confirmation")

              if assignees:
                  score -= 18
                  risks.append("Issue already has an assignee")

              if open_pr_count == 1:
                  score -= 20
                  risks.append("One competing pull request detected")
              elif open_pr_count >= 2:
                  score -= 30
                  risks.append(f"{open_pr_count} competing pull requests detected")

              if merged_pr_count:
                  score -= 45
                  risks.append("A linked pull request appears merged")

              if issue.get("locked"):
                  score -= 8
                  risks.append("Issue discussion is locked")

              if payment_signals:
                  score += 5
                  reasons.append("Payment-related signal mentioned")

              if fast_payment_signals:
                  score += 22
                  reasons.append("Instant or few-hour payment signal")
              else:
                  score -= 20
                  risks.append("Payment speed is not verified as instant or within hours")

              if paypal_signals:
                  score += 8
                  reasons.append("PayPal payment signal")
              else:
                  score -= 8
                  risks.append("PayPal destination not verified")

              if ai_eligibility == "EXPLICITLY ALLOWED":
                  score += 20
                  reasons.append("AI use explicitly approved")
              elif ai_eligibility == "PROHIBITED":
                  score -= 100
                  risks.append("AI use prohibited")
              else:
                  score -= 35
                  risks.append("AI permission unclear")

              score = max(0, min(100, score))

              if reward < MIN_REWARD or reward > MAX_MAIN_REWARD:
                  availability = "OUTSIDE MAIN REWARD RANGE"
                  decision = "WATCHLIST" if reward > MAX_MAIN_REWARD else "REJECT"
              elif ai_eligibility != "EXPLICITLY ALLOWED":
                  availability = "AI NOT EXPLICITLY APPROVED"
                  decision = "REJECT"
              elif payment_speed != "INSTANT OR FEW HOURS":
                  availability = "FAST PAYMENT NOT VERIFIED"
                  decision = "WATCHLIST"
              elif payment_destination != "PAYPAL":
                  availability = "PAYPAL NOT VERIFIED"
                  decision = "WATCHLIST"
              elif merged_pr_count:
                  availability = "LIKELY CLOSED BY WORK"
                  decision = "REJECT"
              elif assignees and open_pr_count:
                  availability = "ASSIGNED AND CONTESTED"
                  decision = "REJECT"
              elif open_pr_count:
                  availability = "CONTESTED"
                  decision = "PRIORITY REVIEW" if score >= 55 else "WATCHLIST"
              elif assignees:
                  availability = "ASSIGNED"
                  decision = "WATCHLIST" if score >= 55 else "REJECT"
              elif score >= 72:
                  availability = "OPEN - VERIFY BEFORE WORK"
                  decision = "PURSUE"
              elif score >= 56:
                  availability = "OPEN - NEEDS REVIEW"
                  decision = "PRIORITY REVIEW"
              elif score >= 40:
                  availability = "UNCERTAIN"
                  decision = "WATCHLIST"
              else:
                  availability = "LOW VALUE OR HIGH RISK"
                  decision = "REJECT"

              payment_verification = (
                  "SIGNALS FOUND - STILL VERIFY MANUALLY"
                  if payment_signals
                  else "UNVERIFIED"
              )

              return {
                  "title": title,
                  "url": issue_url,
                  "repository": repository,
                  "issue_number": number,
                  "author": ((issue.get("user") or {}).get("login") or ""),
                  "reward": reward,
                  "reward_priority": reward_priority,
                  "ai_eligibility": ai_eligibility,
                  "ai_evidence": ai_approved_signals,
                  "payment_speed": payment_speed,
                  "fast_payment_evidence": fast_payment_signals,
                  "payment_destination": payment_destination,
                  "paypal_evidence": paypal_signals,
                  "score": score,
                  "decision": decision,
                  "availability": availability,
                  "created_at": issue.get("created_at") or "",
                  "updated_at": issue.get("updated_at") or "",
                  "comments": visible_discussion,
                  "labels": labels,
                  "assignees": assignees,
                  "open_competing_prs": open_pr_count,
                  "merged_linked_prs": merged_pr_count,
                  "linked_pull_requests": sorted(
                      pr_summaries,
                      key=lambda pr: pr.get("updated_at") or "",
                      reverse=True,
                  ),
                  "payment_verification": payment_verification,
                  "manual_verification_required": True,
                  "reasons": reasons,
                  "risks": risks,
              }

          previous_by_url = load_previous()
          raw_issues = {}
          searches_completed = 0

          for query in SEARCH_QUERIES:
              encoded = urllib.parse.quote(query)
              url = (
                  "https://api.github.com/search/issues"
                  f"?q={encoded}&sort=updated&order=desc&per_page=100"
              )
              data = safe_api_get(url)
              if not isinstance(data, dict):
                  continue

              searches_completed += 1
              for issue in data.get("items", []):
                  if "pull_request" in issue:
                      continue
                  issue_url = issue.get("html_url") or ""
                  if issue_url:
                      raw_issues[issue_url] = issue

          initial_candidates = []
          rejected_aggregators = 0
          rejected_unsafe = 0
          rejected_no_reward = 0
          rejected_below_minimum = 0
          high_reward_watchlist = 0
          rejected_ai_not_approved = 0

          for issue in raw_issues.values():
              title = issue.get("title") or ""
              body = issue.get("body") or ""
              text = f"{title}\n{body}"
              lowered = text.lower()

              if is_aggregator(issue, title, body):
                  rejected_aggregators += 1
                  continue
              if any(term in lowered for term in BLOCKED_TERMS):
                  rejected_unsafe += 1
                  continue

              reward = extract_reward(text)
              if reward <= 0:
                  rejected_no_reward += 1
                  continue
              if reward < MIN_REWARD:
                  rejected_below_minimum += 1
                  continue
              if reward > MAX_MAIN_REWARD:
                  high_reward_watchlist += 1
                  continue
              if any(term in lowered for term in AI_PROHIBITED_TERMS):
                  rejected_ai_not_approved += 1
                  continue
              if not any(term in lowered for term in AI_APPROVED_TERMS):
                  rejected_ai_not_approved += 1
                  continue

              initial_candidates.append(issue)

          def reward_bucket(value):
              if 5 <= value <= 50:
                  return 0
              if value <= 100:
                  return 1
              return 2

          initial_candidates.sort(
              key=lambda issue: (
                  reward_bucket(extract_reward(f"{issue.get('title') or ''}\n{issue.get('body') or ''}")),
                  -extract_reward(f"{issue.get('title') or ''}\n{issue.get('body') or ''}"),
                  issue.get("updated_at") or "",
              ),
          )

          # Deep verification is deliberately capped to control API use.
          verification_queue = initial_candidates[:40]
          verified_results = []

          for index, issue in enumerate(verification_queue, start=1):
              print(f"Verifying candidate {index}/{len(verification_queue)}: {issue.get('html_url')}")
              verified_results.append(verify_candidate(issue))

          verified_results.sort(
              key=lambda item: (item["score"], item["reward"]),
              reverse=True,
          )

          meaningful_changes = []
          for item in verified_results:
              previous = previous_by_url.get(item["url"])
              if not previous:
                  item["change"] = "NEW"
                  meaningful_changes.append({
                      "type": "NEW",
                      "title": item["title"],
                      "url": item["url"],
                      "decision": item["decision"],
                  })
                  continue

              changed_fields = []
              for field in (
                  "decision",
                  "availability",
                  "reward",
                  "assignees",
                  "open_competing_prs",
                  "merged_linked_prs",
              ):
                  if previous.get(field) != item.get(field):
                      changed_fields.append(field)

              if changed_fields:
                  item["change"] = "CHANGED: " + ", ".join(changed_fields)
                  meaningful_changes.append({
                      "type": "CHANGED",
                      "title": item["title"],
                      "url": item["url"],
                      "fields": changed_fields,
                      "decision": item["decision"],
                  })
              else:
                  item["change"] = "UNCHANGED"

          counts = {
              decision: sum(item["decision"] == decision for item in verified_results)
              for decision in ("PURSUE", "PRIORITY REVIEW", "WATCHLIST", "REJECT")
          }
          contested_count = sum(
              item["open_competing_prs"] > 0 for item in verified_results
          )
          assigned_count = sum(bool(item["assignees"]) for item in verified_results)

          top_results = verified_results[:12]
          strong_targets = [
              item for item in verified_results
              if item["decision"] == "PURSUE"
              and item["open_competing_prs"] == 0
              and not item["assignees"]
          ]

          status = "HEALTHY"
          if searches_completed == 0:
              status = "FAILED"
          elif api_errors:
              status = "DEGRADED"

          payload = {
              "version": "V9",
              "owner": "Mazen Farkouh",
              "generated_at": GENERATED_AT,
              "system_status": status,
              "manual_verification_required": True,
              "automation_boundary": (
                  "Atlas discovers, scores, and monitors opportunities. "
                  "It does not claim work, submit code, or guarantee payment."
              ),
              "searches_completed": searches_completed,
              "api_calls": api_calls,
              "api_errors": api_errors,
              "raw_issues_found": len(raw_issues),
              "aggregator_pages_rejected": rejected_aggregators,
              "unsafe_items_rejected": rejected_unsafe,
              "items_without_extractable_reward_rejected": rejected_no_reward,
              "items_below_5_rejected": rejected_below_minimum,
              "over_250_skipped_to_watchlist": high_reward_watchlist,
              "ai_not_explicitly_approved_rejected": rejected_ai_not_approved,
              "eligible_candidates_found": len(initial_candidates),
              "deep_verified_candidates": len(verified_results),
              "counts": counts,
              "contested_count": contested_count,
              "assigned_count": assigned_count,
              "strong_uncontested_targets": len(strong_targets),
              "meaningful_changes": meaningful_changes,
              "top_results": top_results,
              "all_verified_results": verified_results,
          }

          CURRENT_FILE.write_text(
              json.dumps(payload, indent=2, ensure_ascii=False),
              encoding="utf-8",
          )

          history = load_history()
          history.append({
              "generated_at": GENERATED_AT,
              "system_status": status,
              "raw_issues_found": len(raw_issues),
              "eligible_candidates_found": len(initial_candidates),
              "deep_verified_candidates": len(verified_results),
              "counts": counts,
              "contested_count": contested_count,
              "assigned_count": assigned_count,
              "strong_uncontested_targets": len(strong_targets),
              "meaningful_change_count": len(meaningful_changes),
          })
          HISTORY_FILE.write_text(
              json.dumps(history[-500:], indent=2, ensure_ascii=False),
              encoding="utf-8",
          )

          # Alex money ledger: only completed, actually received payments count as money made.
          if MONEY_LEDGER_FILE.exists():
              try:
                  money_ledger = json.loads(MONEY_LEDGER_FILE.read_text(encoding="utf-8"))
              except Exception:
                  money_ledger = {"payments": []}
          else:
              money_ledger = {"payments": []}

          payments = money_ledger.get("payments", []) if isinstance(money_ledger, dict) else []
          received_payments = [
              p for p in payments
              if str(p.get("status", "")).upper() == "RECEIVED"
              and float(p.get("amount", 0) or 0) > 0
          ]
          pending_payments = [
              p for p in payments
              if str(p.get("status", "")).upper() in {"APPROVED", "PENDING"}
          ]

          def payment_date(payment):
              return parse_datetime(payment.get("received_at") or payment.get("date"))

          today_total = 0.0
          week_total = 0.0
          month_total = 0.0
          lifetime_total = 0.0
          for payment in received_payments:
              amount = float(payment.get("amount", 0) or 0)
              paid_at = payment_date(payment)
              lifetime_total += amount
              if paid_at:
                  if paid_at.date() == NOW.date():
                      today_total += amount
                  if (NOW - paid_at).total_seconds() <= 7 * 86400:
                      week_total += amount
                  if paid_at.year == NOW.year and paid_at.month == NOW.month:
                      month_total += amount

          pending_total = sum(float(p.get("amount", 0) or 0) for p in pending_payments)
          last_payment = max(received_payments, key=lambda p: payment_date(p) or datetime.min.replace(tzinfo=timezone.utc), default=None)
          last_payment_text = "None" if not last_payment else f"${float(last_payment.get('amount', 0) or 0):,.2f}"

          money_ledger = {
              "updated_at": GENERATED_AT,
              "currency": "USD",
              "payments": payments,
              "totals": {
                  "today": round(today_total, 2),
                  "week": round(week_total, 2),
                  "month": round(month_total, 2),
                  "lifetime": round(lifetime_total, 2),
                  "pending": round(pending_total, 2),
              },
          }
          MONEY_LEDGER_FILE.write_text(json.dumps(money_ledger, indent=2), encoding="utf-8")

          def badge_class(decision):
              return {
                  "PURSUE": "pursue",
                  "PRIORITY REVIEW": "review",
                  "WATCHLIST": "watch",
                  "REJECT": "reject",
              }.get(decision, "watch")

          rows = []
          for item in top_results:
              title = html.escape(item["title"])
              url = html.escape(item["url"], quote=True)
              decision = html.escape(item["decision"])
              availability = html.escape(item["availability"])
              change = html.escape(item["change"])
              risks = html.escape("; ".join(item["risks"][:3]) or "None detected")
              rows.append(
                  "<tr>"
                  f"<td><span class='badge {badge_class(item['decision'])}'>{decision}</span></td>"
                  f"<td>{item['score']}</td>"
                  f"<td>${item['reward']:,.2f}</td>"
                  f"<td><a href='{url}' target='_blank' rel='noopener'>{title}</a>"
                  f"<div class='small'>{html.escape(item['repository'])} #{item['issue_number']}</div></td>"
                  f"<td>{availability}</td>"
                  f"<td>{item['open_competing_prs']}</td>"
                  f"<td>{', '.join(html.escape(a) for a in item['assignees']) or 'None'}</td>"
                  f"<td>{change}</td>"
                  f"<td class='small'>{risks}</td>"
                  "</tr>"
              )

          change_items = "".join(
              "<li>"
              f"<strong>{html.escape(change['type'])}</strong>: "
              f"<a href='{html.escape(change['url'], quote=True)}' target='_blank' rel='noopener'>"
              f"{html.escape(change['title'])}</a> — {html.escape(change.get('decision', ''))}"
              "</li>"
              for change in meaningful_changes[:15]
          ) or "<li>No meaningful changes detected in verified candidates.</li>"

          error_items = "".join(
              f"<li>{html.escape(error['error'])}</li>"
              for error in api_errors[:10]
          ) or "<li>None</li>"

          dashboard = f"""<!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <meta http-equiv="refresh" content="900">
            <title>Atlas Money Made</title>
            <style>
              :root {{ color-scheme: dark; }}
              * {{ box-sizing: border-box; }}
              body {{
                margin: 0;
                min-height: 100vh;
                display: grid;
                place-items: center;
                font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                background: #090d12;
                color: #f5f7fa;
                padding: 18px;
              }}
              .window {{
                width: min(760px, 100%);
                border: 1px solid #2b3440;
                border-radius: 22px;
                background: #111821;
                padding: 28px;
                box-shadow: 0 20px 60px #0008;
              }}
              h1 {{ margin: 0; text-align: center; letter-spacing: .08em; font-size: 1.2rem; }}
              .money {{ text-align: center; font-size: clamp(3.2rem, 12vw, 6.5rem); font-weight: 850; margin: 24px 0 4px; }}
              .label {{ text-align: center; opacity: .72; margin-bottom: 28px; }}
              .grid {{ display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }}
              .card {{ border: 1px solid #2b3440; border-radius: 14px; padding: 16px; background: #0c1219; }}
              .value {{ font-size: 1.6rem; font-weight: 760; }}
              .name {{ opacity: .7; margin-top: 4px; }}
              .status {{ margin-top: 18px; border-top: 1px solid #2b3440; padding-top: 16px; line-height: 1.7; }}
              .ok {{ font-weight: 750; }}
              .small {{ opacity: .65; font-size: .88rem; text-align: center; margin-top: 18px; }}
              @media (max-width: 560px) {{ .grid {{ grid-template-columns: 1fr; }} .window {{ padding: 20px; }} }}
            </style>
          </head>
          <body>
            <main class="window">
              <h1>MONEY MADE</h1>
              <div class="money">${lifetime_total:,.2f}</div>
              <div class="label">Verified money received</div>

              <section class="grid">
                <div class="card"><div class="value">${today_total:,.2f}</div><div class="name">Today</div></div>
                <div class="card"><div class="value">${week_total:,.2f}</div><div class="name">Last 7 days</div></div>
                <div class="card"><div class="value">${month_total:,.2f}</div><div class="name">This month</div></div>
                <div class="card"><div class="value">${pending_total:,.2f}</div><div class="name">Approved / pending</div></div>
              </section>

              <section class="status">
                <div><strong>Last payment:</strong> {html.escape(last_payment_text)}</div>
                <div><strong>Atlas:</strong> <span class="ok">{html.escape(status)} — scanning AI-approved $5–$250 tasks</span></div>
                <div><strong>Alex:</strong> enforcing reward limits, AI permission, PayPal destination, fast-payment rules, duplicates, competition, and workflow health</div>
                <div><strong>Last scan:</strong> {html.escape(GENERATED_AT)}</div>
              </section>

              <div class="small">Updates automatically every 15 minutes. Only received payments count as money made.</div>
            </main>
          </body>
          </html>
          """

          DASHBOARD_FILE.write_text(dashboard, encoding="utf-8")

          summary_lines = [
              "# Atlas Opportunity Hunter V9",
              "",
              f"- System status: **{status}**",
              f"- Generated: **{GENERATED_AT}**",
              f"- Raw issues found: **{len(raw_issues)}**",
              f"- Eligible paid candidates: **{len(initial_candidates)}**",
              f"- Deep verified: **{len(verified_results)}**",
              f"- Pursue: **{counts['PURSUE']}**",
              f"- Priority review: **{counts['PRIORITY REVIEW']}**",
              f"- Contested: **{contested_count}**",
              f"- Assigned: **{assigned_count}**",
              f"- Strong uncontested targets: **{len(strong_targets)}**",
              f"- Meaningful changes: **{len(meaningful_changes)}**",
              f"- API errors: **{len(api_errors)}**",
              "",
              "> Manual verification is required before any work begins.",
              "",
              "## Top Candidates",
          ]

          for item in top_results[:8]:
              summary_lines.append(
                  f"- **{item['decision']}** | Score {item['score']} | "
                  f"${item['reward']:,.2f} | {item['title']} | "
                  f"{item['availability']}"
              )

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary_path:
              Path(summary_path).write_text(
                  "\n".join(summary_lines) + "\n",
                  encoding="utf-8",
              )

          github_output = os.environ.get("GITHUB_OUTPUT")
          if github_output:
              with open(github_output, "a", encoding="utf-8") as output:
                  output.write(f"system_status={status}\n")
                  output.write(f"pursue_count={counts['PURSUE']}\n")
                  output.write(f"contested_count={contested_count}\n")
                  output.write(f"meaningful_change_count={len(meaningful_changes)}\n")

          print(
              f"Atlas V4 status={status}; checked {len(raw_issues)} raw issues; "
              f"found {len(initial_candidates)} eligible candidates; "
              f"deep-verified {len(verified_results)}; "
              f"pursue={counts['PURSUE']}; "
              f"priority-review={counts['PRIORITY REVIEW']}; "
              f"contested={contested_count}; assigned={assigned_count}; "
              f"meaningful-changes={len(meaningful_changes)}."
          )

          if searches_completed == 0:
              raise SystemExit("Atlas V4 could not complete any GitHub search query.")
          PY

      - name: Save Atlas V4 results
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          git config user.name "Atlas Opportunity Hunter"
          git config user.email "atlas-bot@users.noreply.github.com"
          git add data/opportunities.json data/opportunity-history.json data/money-ledger.json docs/index.html

          if git diff --cached --quiet
          then
            echo "No Atlas result changes to save."
            exit 0
          fi

          git commit -m "Atlas V4 opportunity scan"

          # A scheduled run can overlap with another repository update.
          # Rebase once before pushing so a harmless remote change does not lose the scan.
          git pull --rebase origin "$BRANCH_NAME"
          git push origin "HEAD:$BRANCH_NAME"
