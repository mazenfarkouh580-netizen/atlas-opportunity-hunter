name: Atlas + Alex Opportunity Hunter V15

on:
  workflow_dispatch:
  repository_dispatch:
    types: [atlas-scheduled-run, atlas-watchdog-recovery]
  schedule:
    - cron: "7,22,37,52 * * * *"

concurrency:
  group: atlas-alex-opportunity-hunter-v15
  cancel-in-progress: false

permissions:
  contents: write
  issues: read
  pull-requests: read

jobs:
  hunt:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Download repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Atlas search with Alex rapid-decision assistance
        id: atlas
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python <<'PY'
          import html
          import json
          import os
          import re
          import time
          import urllib.error
          import urllib.parse
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          TOKEN = os.environ["GITHUB_TOKEN"]
          API_VERSION = "2022-11-28"
          NOW = datetime.now(timezone.utc)
          GENERATED_AT = NOW.strftime("%Y-%m-%d %H:%M UTC")

          DATA_DIR = Path("data")
          DOCS_DIR = Path("docs")
          DATA_DIR.mkdir(exist_ok=True)
          DOCS_DIR.mkdir(exist_ok=True)

          CURRENT_FILE = DATA_DIR / "opportunities.json"
          HISTORY_FILE = DATA_DIR / "opportunity-history.json"
          CANDIDATE_LIFECYCLE_FILE = DATA_DIR / "candidate-lifecycle.json"
          DISCOVERY_CACHE_FILE = DATA_DIR / "discovery-cache.json"
          DASHBOARD_FILE = DOCS_DIR / "index.html"
          MONEY_WINDOW_FILE = DOCS_DIR / "money.html"
          CONFIG_FILE = DATA_DIR / "atlas-config.json"
          OPERATIONS_FILE = DATA_DIR / "atlas-operations.json"
          MAINTENANCE_FILE = DATA_DIR / "dr-alex-maintenance.json"
          EARNINGS_FILE = DATA_DIR / "earnings-ledger.json"
          ALERTS_FILE = DATA_DIR / "atlas-alerts.json"
          WORKER_HEALTH_FILE = DATA_DIR / "worker-health.json"
          REPORTS_DIR = DOCS_DIR / "reports"
          REPORTS_DIR.mkdir(exist_ok=True)

          SEARCH_QUERIES = [
              # Core paid-work discovery.
              'is:issue is:open bounty in:title,body',
              'is:issue is:open reward in:title,body',
              'is:issue is:open label:bounty',
              'is:issue is:open label:reward',
              'is:issue is:open label:"help wanted" "$" in:body',
              'is:issue is:open label:"good first issue" bounty in:title,body',
              'is:issue is:open label:"good first issue" reward in:title,body',

              # Simple AI, automation, and agent opportunities.
              'is:issue is:open AI bounty in:title,body',
              'is:issue is:open AI reward in:title,body',
              'is:issue is:open LLM bounty in:title,body',
              'is:issue is:open LLM reward in:title,body',
              'is:issue is:open "AI agent" bounty in:title,body',
              'is:issue is:open "AI agent" reward in:title,body',
              'is:issue is:open prompt bounty in:title,body',
              'is:issue is:open prompt reward in:title,body',
              'is:issue is:open RAG bounty in:title,body',
              'is:issue is:open chatbot bounty in:title,body',
              'is:issue is:open n8n bounty in:title,body',
              'is:issue is:open automation bounty in:title,body',
              'is:issue is:open "data annotation" reward in:title,body',
              'is:issue is:open "model evaluation" reward in:title,body',
              'is:issue is:open OpenAI bounty in:title,body',
              'is:issue is:open Claude bounty in:title,body',
              'is:issue is:open LangChain bounty in:title,body',

              # Quick-win reward bands requested by the CEO.
              'is:issue is:open "$5" in:title,body',
              'is:issue is:open "$10" in:title,body',
              'is:issue is:open "$15" in:title,body',
              'is:issue is:open "$20" in:title,body',
              'is:issue is:open "$25" in:title,body',
              'is:issue is:open "$30" in:title,body',
              'is:issue is:open "$40" in:title,body',
              'is:issue is:open "$50" in:title,body',
              'is:issue is:open "$75" in:title,body',
              'is:issue is:open "$100" in:title,body',

              # Fast-payment and PayPal micro-bounty discovery.
              'is:issue is:open PayPal bounty in:title,body',
              'is:issue is:open PayPal reward in:title,body',
              'is:issue is:open "paid via PayPal" in:title,body',
              'is:issue is:open "payment by PayPal" in:title,body',
              'is:issue is:open "instant payment" bounty in:title,body',
              'is:issue is:open "same day payment" bounty in:title,body',
              'is:issue is:open "upon acceptance" PayPal in:title,body',
              'is:issue is:open "first accepted" bounty in:title,body',

              # Fast-claim and low-complexity discovery.
              'is:issue is:open "first come first served" bounty in:title,body',
              'is:issue is:open "claim this" reward in:title,body',
              'is:issue is:open "micro bounty" in:title,body',
              'is:issue is:open beginner bounty in:title,body',
              'is:issue is:open easy bounty in:title,body',
              'is:issue is:open documentation bounty in:title,body',
              'is:issue is:open tests bounty in:title,body',
              'is:issue is:open "bug fix" reward in:title,body',
              'is:issue is:open "OpenAI API" reward in:title,body',
              'is:issue is:open "prompt engineering" reward in:title,body',
              'is:issue is:open "AI evaluation" reward in:title,body',
              'is:issue is:open "data cleanup" reward in:title,body',

              # Funded bounty ecosystems and maintainer-run payment signals.
              'is:issue is:open Algora bounty in:title,body',
              'is:issue is:open IssueHunt bounty in:title,body',
              'is:issue is:open "paid on merge" in:title,body',
              'is:issue is:open "payment upon merge" in:title,body',
              'is:issue is:open "payment within hours" in:title,body',
              'is:issue is:open "AI tools permitted" reward in:title,body',
          ]

          BLOCKED_TERMS = [
              "phishing",
              "malware",
              "ransomware",
              "credential theft",
              "steal credentials",
              "unauthorized access",
              "bypass authentication",
              "ddos",
              "fake account",
              "account farming",
              "exploit users",
              "stolen data",
          ]

          PREFERRED_TERMS = [
              "bug",
              "fix",
              "test",
              "tests",
              "documentation",
              "docs",
              "python",
              "javascript",
              "typescript",
              "workflow",
              "github actions",
              "ci",
              "data cleanup",
              "refactor",
              "prompt",
              "prompt engineering",
              "llm",
              "rag",
              "ai agent",
              "agent workflow",
              "evaluation",
              "dataset",
              "data annotation",
              "n8n",
              "automation",
              "api integration",
              "chatbot",
              "openai",
              "claude",
              "langchain",
          ]

          COMPLEXITY_TERMS = [
              "architecture",
              "rewrite",
              "redesign",
              "production ready",
              "full implementation",
              "mobile app",
              "blockchain",
              "smart contract",
              "machine learning model",
              "security audit",
          ]

          PAYMENT_EVIDENCE_TERMS = [
              "paid bounty",
              "payment sent",
              "payment received",
              "bounty paid",
              "reward paid",
              "funded bounty",
              "escrow",
              "algora",
              "polar bounty",
          ]

          PAYPAL_TERMS = [
              "paypal",
              "paid via paypal",
              "payment by paypal",
              "paypal payment",
          ]

          FAST_PAYMENT_TERMS = [
              "instant payment",
              "paid immediately",
              "same day payment",
              "payment upon acceptance",
              "pay upon acceptance",
              "paid on acceptance",
              "first accepted",
              "first valid submission",
          ]

          AI_ALLOWED_TERMS = [
              "ai allowed",
              "ai-assisted allowed",
              "ai assisted allowed",
              "automation allowed",
              "agents allowed",
              "bot submissions allowed",
              "llm allowed",
              "claude code",
              "openai",
              "ai agent",
          ]

          HUMAN_ONLY_TERMS = [
              "human only",
              "no ai",
              "ai prohibited",
              "no bots",
              "no automation",
              "manual work only",
              "must be completed by a human",
              "identity verification required",
              "live interview required",
          ]

          APPROVAL_AUTHORITY_TERMS = [
              "maintainer approval",
              "owner approval",
              "bounty issuer",
              "repository owner",
              "upon merge",
              "upon acceptance",
              "accepted submission",
          ]

          api_errors = []
          api_calls = 0
          api_rate_limited = False

          def load_json_file(path, default):
              try:
                  if path.exists():
                      value = json.loads(path.read_text(encoding="utf-8"))
                      return value
              except Exception as error:
                  api_errors.append({
                      "stage": f"load {path.name}",
                      "error": str(error),
                  })
              return default

          default_config = {
              "minimum_reward": 5,
              "minimum_payment_confidence": 55,
              "minimum_expected_value": 2,
              "queue_size": 20,
              "dashboard_refresh_seconds": 900,
              "tax_percent": 25,
              "reinvest_percent": 25,
              "mazen_percent": 50,
          }
          config = load_json_file(CONFIG_FILE, default_config)
          for key, value in default_config.items():
              config.setdefault(key, value)

          split_total = sum(float(config.get(key, 0)) for key in (
              "tax_percent", "reinvest_percent", "mazen_percent"
          ))
          if split_total <= 0:
              config.update({"tax_percent": 25, "reinvest_percent": 25, "mazen_percent": 50})
              split_total = 100
          if abs(split_total - 100) > 0.01:
              for key in ("tax_percent", "reinvest_percent", "mazen_percent"):
                  config[key] = round(float(config.get(key, 0)) * 100 / split_total, 2)

          CONFIG_FILE.write_text(json.dumps(config, indent=2), encoding="utf-8")

          ledger = load_json_file(EARNINGS_FILE, [])
          if not isinstance(ledger, list):
              ledger = []
              EARNINGS_FILE.write_text("[]\n", encoding="utf-8")

          operations = load_json_file(OPERATIONS_FILE, {
              "version": "V14",
              "pipeline": [],
              "last_updated": GENERATED_AT,
          })
          if not isinstance(operations, dict):
              operations = {"version": "V14", "pipeline": [], "last_updated": GENERATED_AT}

          maintenance = load_json_file(MAINTENANCE_FILE, {
              "doctor": "Dr. Alex",
              "health": "HEALTHY",
              "last_check": GENERATED_AT,
              "repairs": [],
              "diagnostics": [],
          })
          if not isinstance(maintenance, dict):
              maintenance = {"doctor": "Dr. Alex", "health": "HEALTHY", "last_check": GENERATED_AT, "repairs": [], "diagnostics": []}

          def parse_datetime(value):
              if not value:
                  return None
              try:
                  return datetime.fromisoformat(
                      value.replace("Z", "+00:00")
                  )
              except (TypeError, ValueError):
                  return None

          def age_days(value):
              parsed = parse_datetime(value)

              if not parsed:
                  return None

              return max(
                  0.0,
                  (NOW - parsed).total_seconds() / 86400,
              )

          def api_get(
              url,
              accept="application/vnd.github+json",
              retries=3,
          ):
              global api_calls, api_rate_limited

              if api_rate_limited:
                  raise RuntimeError(
                      "GitHub API rate limit already reached; "
                      "remaining calls skipped"
                  )

              last_error = None

              for attempt in range(1, retries + 1):
                  request = urllib.request.Request(
                      url,
                      headers={
                          "Authorization": f"Bearer {TOKEN}",
                          "Accept": accept,
                          "X-GitHub-Api-Version": API_VERSION,
                          "User-Agent": (
                              "Atlas-Opportunity-Hunter-V14"
                          ),
                      },
                  )

                  try:
                      api_calls += 1

                      with urllib.request.urlopen(
                          request,
                          timeout=30,
                      ) as response:
                          return json.loads(
                              response.read().decode("utf-8")
                          )

                  except urllib.error.HTTPError as error:
                      body = error.read().decode(
                          "utf-8",
                          errors="replace",
                      )[:300]

                      last_error = (
                          f"HTTP {error.code}: {body}"
                      )

                      if error.code in (403, 429):
                          api_rate_limited = True
                          break

                      if (
                          500 <= error.code < 600
                          and attempt < retries
                      ):
                          time.sleep(attempt * 2)
                          continue

                      break

                  except Exception as error:
                      last_error = str(error)

                      if attempt < retries:
                          time.sleep(attempt * 2)
                          continue

                      break

              raise RuntimeError(
                  last_error
                  or "Unknown GitHub API error"
              )

          def safe_api_get(
              url,
              accept="application/vnd.github+json",
          ):
              try:
                  return api_get(
                      url,
                      accept=accept,
                  )

              except Exception as error:
                  message = str(error)
                  if not (
                      "rate limit already reached" in message
                      and any(
                          "rate limit" in item.get("error", "").lower()
                          for item in api_errors
                      )
                  ):
                      api_errors.append(
                          {
                              "url": url,
                              "error": message,
                          }
                      )

                  return None

          def extract_reward(text):
              patterns = [
                  (
                      r"/bounty\s*\$"
                      r"([0-9][0-9,]*(?:\.\d{1,2})?)"
                  ),
                  (
                      r"\$"
                      r"([0-9][0-9,]*(?:\.\d{1,2})?)"
                      r"\s*(?:usd\s*)?"
                      r"(?:bounty|reward|prize)"
                  ),
                  (
                      r"(?:bounty|reward|prize)"
                      r"\s*(?:of|is|:|=)?\s*\$"
                      r"([0-9][0-9,]*(?:\.\d{1,2})?)"
                  ),
                  (
                      r"(?:pay|payment|paid)"
                      r"\s*(?:of|is|:|=)?\s*\$"
                      r"([0-9][0-9,]*(?:\.\d{1,2})?)"
                  ),
              ]

              rewards = []

              for pattern in patterns:
                  for match in re.finditer(
                      pattern,
                      text,
                      re.I,
                  ):
                      try:
                          rewards.append(
                              float(
                                  match.group(1).replace(
                                      ",",
                                      "",
                                  )
                              )
                          )
                      except ValueError:
                          pass

              return max(
                  rewards,
                  default=0.0,
              )

          def issue_identity(issue):
              repository = (
                  issue.get("repository_url") or ""
              ).split("/repos/")[-1]

              number = int(
                  issue.get("number") or 0
              )

              return repository, number

          def title_repository_mismatch(title, repository):
              title_repositories = re.findall(
                  r"\[([A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+)\]",
                  title or "",
              )
              if not title_repositories:
                  return False, ""

              actual = (repository or "").lower()
              for advertised in title_repositories:
                  if advertised.lower() != actual:
                      return True, advertised

              return False, ""

          def is_aggregator(
              issue,
              title,
              body,
          ):
              repository, _ = issue_identity(issue)
              repository = repository.lower()

              author = (
                  (issue.get("user") or {}).get(
                      "login"
                  )
                  or ""
              ).lower()

              labels = {
                  (label.get("name") or "").lower()
                  for label in issue.get(
                      "labels",
                      [],
                  )
              }

              title_lower = title.lower()
              body_lower = body.lower()

              aggregator_phrases = [
                  "bounty alert",
                  "new opportunities",
                  "new opportunityies",
                  "opportunities found",
                  "opportunityies found",
                  "top opportunities",
                  "new bounties found",
              ]

              if "bountyscout" in repository:
                  return True

              if any(
                  phrase in title_lower
                  for phrase in aggregator_phrases
              ):
                  return True

              if (
                  "bounty-alert" in labels
                  or "bounty alert" in labels
              ):
                  return True

              if (
                  author == "github-actions[bot]"
                  or author.endswith("[bot]")
              ):
                  return True

              linked_issues = re.findall(
                  (
                      r"https://github\.com/"
                      r"[^/\s]+/[^/\s]+/issues/\d+"
                  ),
                  body,
                  re.I,
              )

              if len(set(linked_issues)) >= 3:
                  return True

              if any(
                  phrase in body_lower
                  for phrase in aggregator_phrases
              ):
                  return True

              return False

          def load_previous():
              if not CURRENT_FILE.exists():
                  return {}

              try:
                  payload = json.loads(
                      CURRENT_FILE.read_text(
                          encoding="utf-8"
                      )
                  )

                  return {
                      item.get("url"): item
                      for item in payload.get(
                          "all_verified_results",
                          [],
                      )
                      if item.get("url")
                  }

              except Exception:
                  return {}

          def load_history():
              if not HISTORY_FILE.exists():
                  return []

              try:
                  data = json.loads(
                      HISTORY_FILE.read_text(
                          encoding="utf-8"
                      )
                  )

                  return (
                      data
                      if isinstance(data, list)
                      else []
                  )

              except Exception:
                  return []

          def load_candidate_lifecycle():
              if not CANDIDATE_LIFECYCLE_FILE.exists():
                  return {}
              try:
                  data = json.loads(
                      CANDIDATE_LIFECYCLE_FILE.read_text(
                          encoding="utf-8"
                      )
                  )
                  return data if isinstance(data, dict) else {}
              except Exception:
                  return {}

          def collect_issue_comments(
              repository,
              number,
          ):
              encoded_repo = urllib.parse.quote(
                  repository,
                  safe="/",
              )

              url = (
                  "https://api.github.com/repos/"
                  f"{encoded_repo}/issues/"
                  f"{number}/comments?per_page=100"
              )

              data = safe_api_get(url)

              return (
                  data
                  if isinstance(data, list)
                  else []
              )

          def collect_timeline(
              repository,
              number,
          ):
              encoded_repo = urllib.parse.quote(
                  repository,
                  safe="/",
              )

              url = (
                  "https://api.github.com/repos/"
                  f"{encoded_repo}/issues/"
                  f"{number}/timeline?per_page=100"
              )

              data = safe_api_get(
                  url,
                  accept=(
                      "application/vnd.github+json"
                  ),
              )

              return (
                  data
                  if isinstance(data, list)
                  else []
              )

          def search_linked_pull_requests(
              repository,
              number,
              issue_url,
          ):
              queries = [
                  (
                      f'repo:{repository} '
                      f'is:pr is:open "#{number}"'
                  ),
                  (
                      f'repo:{repository} '
                      f'is:pr "{issue_url}"'
                  ),
              ]

              found = {}

              for query in queries:
                  encoded = urllib.parse.quote(query)

                  url = (
                      "https://api.github.com/"
                      "search/issues"
                      f"?q={encoded}"
                      "&sort=updated"
                      "&order=desc"
                      "&per_page=30"
                  )

                  data = safe_api_get(url)

                  if not isinstance(data, dict):
                      continue

                  for item in data.get(
                      "items",
                      [],
                  ):
                      if "pull_request" not in item:
                          continue

                      html_url = (
                          item.get("html_url") or ""
                      )

                      if html_url:
                          found[html_url] = item

              return list(found.values())

          def verify_candidate(issue):
              title = issue.get("title") or ""
              body = issue.get("body") or ""
              issue_url = (
                  issue.get("html_url") or ""
              )

              repository, number = issue_identity(
                  issue
              )

              labels = sorted(
                  {
                      (
                          label.get("name") or ""
                      ).strip()
                      for label in issue.get(
                          "labels",
                          [],
                      )
                      if (
                          label.get("name") or ""
                      ).strip()
                  }
              )

              comments = collect_issue_comments(
                  repository,
                  number,
              )

              timeline = collect_timeline(
                  repository,
                  number,
              )

              linked_prs = (
                  search_linked_pull_requests(
                      repository,
                      number,
                      issue_url,
                  )
              )

              comment_text = "\n".join(
                  comment.get("body") or ""
                  for comment in comments
              )

              combined_text = (
                  f"{title}\n"
                  f"{body}\n"
                  f"{comment_text}"
              )

              lowered = combined_text.lower()

              timeline_pr_urls = set()

              for event in timeline:
                  source_issue = (
                      (
                          event.get("source") or {}
                      ).get("issue")
                      or {}
                  )

                  if "pull_request" in source_issue:
                      url = (
                          source_issue.get(
                              "html_url"
                          )
                          or ""
                      )

                      if url:
                          timeline_pr_urls.add(url)

              linked_pr_map = {
                  pr.get("html_url"): pr
                  for pr in linked_prs
                  if pr.get("html_url")
              }

              for url in timeline_pr_urls:
                  linked_pr_map.setdefault(
                      url,
                      {
                          "html_url": url,
                          "title": (
                              "Pull request linked "
                              "through issue timeline"
                          ),
                          "state": "unknown",
                          "user": {},
                          "created_at": "",
                          "updated_at": "",
                      },
                  )

              pr_summaries = []
              open_pr_count = 0
              merged_pr_count = 0

              for pr in linked_pr_map.values():
                  state = (
                      pr.get("state") or "unknown"
                  ).lower()

                  pull_data = (
                      pr.get("pull_request") or {}
                  )

                  merged_at = pull_data.get(
                      "merged_at"
                  )

                  if merged_at:
                      merged_pr_count += 1

                  elif state == "open":
                      open_pr_count += 1

                  pr_summaries.append(
                      {
                          "title": (
                              pr.get("title")
                              or "Linked pull request"
                          ),
                          "url": (
                              pr.get("html_url")
                              or ""
                          ),
                          "state": (
                              "merged"
                              if merged_at
                              else state
                          ),
                          "author": (
                              (
                                  pr.get("user")
                                  or {}
                              ).get("login")
                              or ""
                          ),
                          "created_at": (
                              pr.get("created_at")
                              or ""
                          ),
                          "updated_at": (
                              pr.get("updated_at")
                              or ""
                          ),
                      }
                  )

              assignees = [
                  person.get("login") or ""
                  for person in issue.get(
                      "assignees",
                      [],
                  )
                  if person.get("login")
              ]

              reward = extract_reward(
                  f"{title}\n{body}"
              )

              created_age = age_days(
                  issue.get("created_at")
              )

              updated_age = age_days(
                  issue.get("updated_at")
              )

              detail = len(body.strip())

              preferred_matches = sorted(
                  {
                      term
                      for term in PREFERRED_TERMS
                      if term in lowered
                  }
              )

              complexity_matches = sorted(
                  {
                      term
                      for term in COMPLEXITY_TERMS
                      if term in lowered
                  }
              )

              payment_signals = sorted(
                  {
                      term
                      for term in PAYMENT_EVIDENCE_TERMS
                      if term in lowered
                  }
              )

              paypal_signals = sorted({term for term in PAYPAL_TERMS if term in lowered})
              fast_payment_signals = sorted({term for term in FAST_PAYMENT_TERMS if term in lowered})
              ai_allowed_signals = sorted({term for term in AI_ALLOWED_TERMS if term in lowered})
              human_only_signals = sorted({term for term in HUMAN_ONLY_TERMS if term in lowered})
              approval_authority_signals = sorted({term for term in APPROVAL_AUTHORITY_TERMS if term in lowered})

              repository_mismatch, advertised_repository = (
                  title_repository_mismatch(
                      title,
                      repository,
                  )
              )

              direct_payment_proof = bool(
                  payment_signals
                  or (
                      paypal_signals
                      and fast_payment_signals
                  )
                  or any(
                      platform in lowered
                      for platform in (
                          "algora",
                          "polar bounty",
                          "issuehunt",
                          "escrow",
                          "paid on merge",
                          "payment upon acceptance",
                          "pay upon acceptance",
                      )
                  )
              )
 
              claimability_signals = sorted({
                  term for term in (
                      "claim this issue",
                      "comment to claim",
                      "open to contributors",
                      "submit a pull request",
                      "first accepted",
                      "available bounty",
                      "unassigned",
                      "ready to claim",
                  )
                  if term in lowered
              })
              blocked_claim_signals = sorted({
                  term for term in (
                      "do not start",
                      "wait for approval",
                      "reserved",
                      "already claimed",
                      "not accepting",
                      "internal only",
                  )
                  if term in lowered
              })
              atlas_capability_signals = sorted({
                  term for term in (
                      "python",
                      "javascript",
                      "typescript",
                      "documentation",
                      "unit test",
                      "parser",
                      "api",
                      "automation",
                      "data",
                      "bug fix",
                      "cli",
                  )
                  if term in lowered
              })
              external_execution_blockers = sorted({
                  term for term in (
                      "app store submission",
                      "google play submission",
                      "hardware required",
                      "physical device required",
                      "paid account required",
                      "identity verification required",
                      "on-site",
                  )
                  if term in lowered
              })

              claimable_now = bool(
                  claimability_signals
                  and not blocked_claim_signals
                  and not assignees
              )
              atlas_can_execute = bool(
                  atlas_capability_signals
                  and not external_execution_blockers
              )

              score = 0
              reasons = []
              risks = []

              if reward >= 1000:
                  score += 25
                  reasons.append(
                      "Very large stated reward"
                  )

              elif reward >= 500:
                  score += 23
                  reasons.append(
                      "Large stated reward"
                  )

              elif reward >= 150:
                  score += 20
                  reasons.append(
                      "Strong stated reward"
                  )

              elif reward >= 50:
                  score += 16
                  reasons.append(
                      "Good stated reward"
                  )

              else:
                  score += 10
                  reasons.append(
                      "Stated paid reward"
                  )

              if detail >= 1200:
                  score += 15
                  reasons.append(
                      "Detailed requirements"
                  )

              elif detail >= 500:
                  score += 11
                  reasons.append(
                      "Useful requirements"
                  )

              elif detail >= 150:
                  score += 6
                  reasons.append(
                      "Basic requirements"
                  )

              else:
                  score -= 8
                  risks.append(
                      "Requirements are too brief"
                  )

              score += min(
                  18,
                  len(preferred_matches) * 3,
              )

              if preferred_matches:
                  reasons.append(
                      "Capability match: "
                      + ", ".join(
                          preferred_matches[:6]
                      )
                  )

              if complexity_matches:
                  score -= min(
                      15,
                      len(complexity_matches) * 4,
                  )

                  risks.append(
                      "Potentially high complexity: "
                      + ", ".join(
                          complexity_matches[:4]
                      )
                  )

              visible_discussion = len(comments)

              if visible_discussion == 0:
                  score += 10
                  reasons.append(
                      "No visible comments"
                  )

              elif visible_discussion <= 3:
                  score += 6
                  reasons.append(
                      "Low visible discussion"
                  )

              elif visible_discussion <= 8:
                  score += 1
                  risks.append(
                      "Moderate visible discussion"
                  )

              else:
                  score -= 8
                  risks.append(
                      "Heavy visible discussion"
                  )

              if created_age is not None:
                  if created_age <= 1:
                      score += 14
                      reasons.append(
                          "Posted within 24 hours"
                      )

                  elif created_age <= 7:
                      score += 10
                      reasons.append(
                          "Posted within 7 days"
                      )

                  elif created_age <= 30:
                      score += 5
                      reasons.append(
                          "Posted within 30 days"
                      )

                  elif created_age > 180:
                      score -= 12
                      risks.append(
                          "Issue may be stale"
                      )

              if (
                  updated_age is not None
                  and updated_age <= 7
              ):
                  score += 4
                  reasons.append(
                      "Recently updated"
                  )

              if "acceptance criteria" in lowered:
                  score += 10
                  reasons.append(
                      "Explicit acceptance criteria"
                  )

              elif (
                  "expected behavior" in lowered
                  or "definition of done" in lowered
              ):
                  score += 7
                  reasons.append(
                      "Expected result is described"
                  )

              elif detail >= 500:
                  score += 3
                  reasons.append(
                      "Review path appears usable"
                  )

              else:
                  risks.append(
                      "Acceptance path requires "
                      "manual confirmation"
                  )

              if assignees:
                  score -= 18
                  risks.append(
                      "Issue already has an assignee"
                  )

              if open_pr_count == 1:
                  score -= 20
                  risks.append(
                      "One competing pull request "
                      "detected"
                  )

              elif open_pr_count >= 2:
                  score -= 30
                  risks.append(
                      f"{open_pr_count} competing "
                      "pull requests detected"
                  )

              if merged_pr_count:
                  score -= 45
                  risks.append(
                      "A linked pull request "
                      "appears merged"
                  )

              if issue.get("locked"):
                  score -= 8
                  risks.append(
                      "Issue discussion is locked"
                  )

              if payment_signals:
                  score += 5
                  reasons.append("Payment-related signal mentioned")

              if paypal_signals:
                  score += 6
                  reasons.append("PayPal payment explicitly mentioned")

              if fast_payment_signals:
                  score += 6
                  reasons.append("Fast-payment timing explicitly mentioned")

              if ai_allowed_signals:
                  score += 5
                  reasons.append("AI/automation participation appears allowed")

              if human_only_signals:
                  score -= 35
                  risks.append("Human-only or AI-prohibited language detected")

              if approval_authority_signals:
                  score += 5
                  reasons.append("Acceptance authority or approval trigger is described")

              if repository_mismatch:
                  score -= 45
                  risks.append(
                      "Advertised repository does not match "
                      "the GitHub issue repository"
                  )

              if not direct_payment_proof:
                  score -= 18
                  risks.append(
                      "No direct payment proof or funded "
                      "bounty platform detected"
                  )

              if claimable_now:
                  score += 12
                  reasons.append(
                      "Explicitly claimable with no current assignee"
                  )
              else:
                  score -= 12
                  risks.append(
                      "Claim path is missing, blocked, or ambiguous"
                  )

              if atlas_can_execute:
                  score += 10
                  reasons.append(
                      "Task matches Atlas execution capabilities"
                  )
              else:
                  score -= 20
                  risks.append(
                      "Task is not clearly executable by Atlas"
                  )

              if 5 <= reward <= 50:
                  score += 10
                  reasons.append("Highest-priority first-payment reward band")
              elif reward <= 100:
                  score += 7
                  reasons.append("High-priority small reward band")
              elif reward <= 250:
                  score += 4
                  reasons.append("Priority reward band")

              if not assignees and open_pr_count == 0:
                  score += 8
                  reasons.append("No assignee and no competing pull request")

              if updated_age is not None and updated_age <= 3:
                  score += 5
                  reasons.append("Very recent activity")

              score = max(
                  0,
                  min(100, score),
              )

              if human_only_signals:
                  availability = "HUMAN-ONLY OR AI PROHIBITED"
                  decision = "REJECT"

              elif merged_pr_count:
                  availability = (
                      "LIKELY CLOSED BY WORK"
                  )
                  decision = "REJECT"

              elif assignees and open_pr_count:
                  availability = (
                      "ASSIGNED AND CONTESTED"
                  )
                  decision = "REJECT"

              elif open_pr_count:
                  availability = "CONTESTED"

                  decision = (
                      "PRIORITY REVIEW"
                      if score >= 62
                      else "WATCHLIST"
                  )

              elif assignees:
                  availability = "ASSIGNED"

                  decision = (
                      "WATCHLIST"
                      if score >= 50
                      else "REJECT"
                  )

              elif repository_mismatch:
                  availability = (
                      "REPOSITORY MISMATCH - MANUAL VERIFY"
                  )
                  decision = "WATCHLIST"

              elif not direct_payment_proof:
                  availability = (
                      "PAYMENT NOT PROVEN - MANUAL VERIFY"
                  )
                  decision = "PRIORITY REVIEW"

              elif not claimable_now:
                  availability = "CLAIM PATH NOT CONFIRMED"
                  decision = "PRIORITY REVIEW"

              elif not atlas_can_execute:
                  availability = "NOT EXECUTION-READY FOR ATLAS"
                  decision = "WATCHLIST"

              elif score >= 62:
                  availability = (
                      "OPEN - READY FOR FINAL CLAIM CHECK"
                  )
                  decision = "PURSUE"

              elif score >= 48:
                  availability = (
                      "OPEN - NEEDS FINAL REVIEW"
                  )
                  decision = "PRIORITY REVIEW"

              elif score >= 36:
                  availability = "UNCERTAIN"
                  decision = "WATCHLIST"

              else:
                  availability = (
                      "LOW VALUE OR HIGH RISK"
                  )
                  decision = "REJECT"

              # CEO reward law: over $250 stays visible but never enters the main pursue queue.
              if reward > 250 and decision not in {"REJECT"}:
                  availability = "OVER $250 - WATCHLIST ONLY"
                  decision = "WATCHLIST"

              payment_verification = (
                  "PAYPAL + FAST-PAY TERMS FOUND - OWNER APPROVAL STILL REQUIRED"
                  if paypal_signals and fast_payment_signals
                  else "PAYPAL MENTIONED - VERIFY TIMING AND PAYER"
                  if paypal_signals
                  else "SIGNALS FOUND - STILL VERIFY MANUALLY"
                  if payment_signals
                  else "UNVERIFIED"
              )

              ai_eligibility = (
                  "PROHIBITED" if human_only_signals
                  else "EXPLICITLY ALLOWED" if ai_allowed_signals
                  else "UNCLEAR - MANUAL VERIFICATION REQUIRED"
              )

              approval_authority = (
                  "OWNER/MAINTAINER APPROVAL PATH DESCRIBED"
                  if approval_authority_signals
                  else "NOT VERIFIED"
              )

              fast_pay_candidate = bool(
                  5 <= reward <= 50
                  and paypal_signals
                  and fast_payment_signals
                  and not human_only_signals
                  and not assignees
                  and open_pr_count == 0
                  and merged_pr_count == 0
              )

              fast_pay_status = (
                  "FAST PAYPAL CANDIDATE - OWNER APPROVAL REQUIRED"
                  if fast_pay_candidate
                  else "NOT FAST-PAY VERIFIED"
              )

              return {
                  "title": title,
                  "url": issue_url,
                  "repository": repository,
                  "issue_number": number,
                  "author": (
                      (
                          issue.get("user") or {}
                      ).get("login")
                      or ""
                  ),
                  "reward": reward,
                  "reward_priority": (
                      "HIGHEST" if 5 <= reward <= 50
                      else "HIGH" if reward <= 100
                      else "PRIORITY" if reward <= 250
                      else "WATCHLIST"
                  ),
                  "score": score,
                  "decision": decision,
                  "availability": availability,
                  "created_at": (
                      issue.get("created_at")
                      or ""
                  ),
                  "updated_at": (
                      issue.get("updated_at")
                      or ""
                  ),
                  "comments": visible_discussion,
                  "labels": labels,
                  "assignees": assignees,
                  "open_competing_prs": (
                      open_pr_count
                  ),
                  "merged_linked_prs": (
                      merged_pr_count
                  ),
                  "linked_pull_requests": sorted(
                      pr_summaries,
                      key=lambda pr: (
                          pr.get("updated_at") or ""
                      ),
                      reverse=True,
                  ),
                  "payment_verification": payment_verification,
                  "paypal_signals": paypal_signals,
                  "fast_payment_signals": fast_payment_signals,
                  "ai_eligibility": ai_eligibility,
                  "approval_authority": approval_authority,
                  "direct_payment_proof": direct_payment_proof,
                  "claimable_now": claimable_now,
                  "claimability_signals": claimability_signals,
                  "atlas_can_execute": atlas_can_execute,
                  "atlas_capability_signals": atlas_capability_signals,
                  "external_execution_blockers": external_execution_blockers,
                  "repository_mismatch": repository_mismatch,
                  "advertised_repository": advertised_repository,
                  "fast_pay_candidate": fast_pay_candidate,
                  "fast_pay_status": fast_pay_status,
                  "manual_verification_required": bool(
                      repository_mismatch
                      or not direct_payment_proof
                      or not claimable_now
                      or not atlas_can_execute
                      or not (
                          fast_pay_candidate
                          and ai_allowed_signals
                          and approval_authority_signals
                      )
                  ),
                  "reasons": reasons,
                  "risks": risks,
              }

          previous_by_url = load_previous()
          discovery_cache = load_json_file(
              DISCOVERY_CACHE_FILE,
              {"issues": {}},
          )
          cached_issues = discovery_cache.get("issues", {})
          raw_issues = {
              url: issue
              for url, issue in cached_issues.items()
              if isinstance(issue, dict)
          }
          searches_completed = 0
          fresh_discovery_urls = set()

          # Full discovery breadth restored. Every configured query is
          # attempted each run. Opportunity quality is controlled after discovery.
          for query in SEARCH_QUERIES:
              if api_rate_limited:
                  break
              encoded = urllib.parse.quote(query)

              url = (
                  "https://api.github.com/"
                  "search/issues"
                  f"?q={encoded}"
                  "&sort=updated"
                  "&order=desc"
                  "&per_page=100"
              )

              data = safe_api_get(url)

              if not isinstance(data, dict):
                  continue

              searches_completed += 1

              for issue in data.get(
                  "items",
                  [],
              ):
                  if "pull_request" in issue:
                      continue

                  issue_url = (
                      issue.get("html_url") or ""
                  )

                  if issue_url:
                      raw_issues[issue_url] = issue
                      fresh_discovery_urls.add(issue_url)

          DISCOVERY_CACHE_FILE.write_text(
              json.dumps(
                  {
                      "updated_at": GENERATED_AT,
                      "issues": raw_issues,
                      "fresh_urls": sorted(fresh_discovery_urls),
                  },
                  indent=2,
                  ensure_ascii=False,
              ),
              encoding="utf-8",
          )

          initial_candidates = []
          rejected_aggregators = 0
          rejected_unsafe = 0
          rejected_no_reward = 0

          for issue in raw_issues.values():
              title = issue.get("title") or ""
              body = issue.get("body") or ""
              text = f"{title}\n{body}"
              lowered = text.lower()

              if is_aggregator(
                  issue,
                  title,
                  body,
              ):
                  rejected_aggregators += 1
                  continue

              if any(
                  term in lowered
                  for term in BLOCKED_TERMS
              ):
                  rejected_unsafe += 1
                  continue

              reward = extract_reward(text)

              if reward <= 0:
                  rejected_no_reward += 1
                  continue

              initial_candidates.append(issue)

          def discovery_priority(issue):
              title = issue.get("title") or ""
              body = issue.get("body") or ""
              lowered = f"{title}\n{body}".lower()
              reward = extract_reward(f"{title}\n{body}")

              if 5 <= reward <= 50:
                  reward_band = 5
              elif reward <= 100:
                  reward_band = 4
              elif reward <= 250:
                  reward_band = 3
              elif reward <= 500:
                  reward_band = 1
              else:
                  reward_band = 0

              funded_signal = sum(
                  1 for term in (
                      "algora",
                      "polar bounty",
                      "issuehunt",
                      "funded bounty",
                      "escrow",
                      "paid on merge",
                      "payment upon acceptance",
                      "pay upon acceptance",
                  )
                  if term in lowered
              )

              easy_signal = sum(
                  1 for term in (
                      "good first issue",
                      "documentation",
                      "docs",
                      "test",
                      "tests",
                      "small fix",
                      "quick fix",
                      "beginner",
                      "easy",
                      "typo",
                      "workflow",
                      "github actions",
                  )
                  if term in lowered
              )

              complexity_signal = sum(
                  1 for term in COMPLEXITY_TERMS
                  if term in lowered
              )

              return (
                  reward_band,
                  funded_signal,
                  easy_signal,
                  -complexity_signal,
                  issue.get("updated_at") or "",
              )

          initial_candidates.sort(
              key=discovery_priority,
              reverse=True,
          )

          # Recheck prior actionable candidates first, then fill the
          # API-safe queue with the best newly ranked opportunities.
          issue_by_url = {
              issue.get("html_url"): issue
              for issue in initial_candidates
              if issue.get("html_url")
          }

          previous_actionable_urls = [
              url
              for url, item in previous_by_url.items()
              if item.get("decision") in {
                  "PURSUE",
                  "PRIORITY REVIEW",
              }
              and url in issue_by_url
          ]

          verification_queue = []
          queued_urls = set()

          for url in previous_actionable_urls:
              if len(verification_queue) >= 20:
                  break
              verification_queue.append(issue_by_url[url])
              queued_urls.add(url)

          for issue in initial_candidates:
              url = issue.get("html_url")
              if not url or url in queued_urls:
                  continue
              verification_queue.append(issue)
              queued_urls.add(url)
              if len(verification_queue) >= 20:
                  break

          verified_results = []

          for index, issue in enumerate(
              verification_queue,
              start=1,
          ):
              print(
                  "Verifying candidate "
                  f"{index}/"
                  f"{len(verification_queue)}: "
                  f"{issue.get('html_url')}"
              )

              verified_results.append(
                  verify_candidate(issue)
              )

          verified_results.sort(
              key=lambda item: (
                  item["score"],
                  item["reward"],
              ),
              reverse=True,
          )

          meaningful_changes = []

          for item in verified_results:
              previous = previous_by_url.get(
                  item["url"]
              )

              if not previous:
                  item["change"] = "NEW"

                  meaningful_changes.append(
                      {
                          "type": "NEW",
                          "title": item["title"],
                          "url": item["url"],
                          "decision": (
                              item["decision"]
                          ),
                      }
                  )

                  continue

              changed_fields = []

              for field in (
                  "decision",
                  "availability",
                  "reward",
                  "assignees",
                  "open_competing_prs",
                  "merged_linked_prs",
              ):
                  if (
                      previous.get(field)
                      != item.get(field)
                  ):
                      changed_fields.append(field)

              if changed_fields:
                  item["change"] = (
                      "CHANGED: "
                      + ", ".join(changed_fields)
                  )

                  meaningful_changes.append(
                      {
                          "type": "CHANGED",
                          "title": item["title"],
                          "url": item["url"],
                          "fields": changed_fields,
                          "decision": (
                              item["decision"]
                          ),
                      }
                  )

              else:
                  item["change"] = "UNCHANGED"

          candidate_lifecycle = load_candidate_lifecycle()
          current_verified_urls = {
              item["url"] for item in verified_results
          }

          lifecycle_new = 0
          lifecycle_still_active = 0
          lifecycle_changed = 0

          for item in verified_results:
              url = item["url"]
              record = candidate_lifecycle.get(url, {})
              first_seen = record.get("first_seen") or GENERATED_AT

              if not record:
                  lifecycle_new += 1
              elif item.get("change", "").startswith("CHANGED"):
                  lifecycle_changed += 1
              else:
                  lifecycle_still_active += 1

              item["first_seen"] = first_seen
              item["last_verified"] = GENERATED_AT

              candidate_lifecycle[url] = {
                  "title": item.get("title"),
                  "repository": item.get("repository"),
                  "first_seen": first_seen,
                  "last_verified": GENERATED_AT,
                  "last_decision": item.get("decision"),
                  "last_availability": item.get("availability"),
                  "last_reward": item.get("reward"),
                  "verification_state": "VERIFIED THIS RUN",
              }

          not_reverified_urls = [
              url
              for url in previous_by_url
              if url not in current_verified_urls
          ]

          for url in not_reverified_urls:
              previous_item = previous_by_url[url]
              record = candidate_lifecycle.get(url, {})
              candidate_lifecycle[url] = {
                  "title": previous_item.get("title"),
                  "repository": previous_item.get("repository"),
                  "first_seen": (
                      record.get("first_seen")
                      or previous_item.get("first_seen")
                      or GENERATED_AT
                  ),
                  "last_verified": (
                      record.get("last_verified")
                      or previous_item.get("last_verified")
                  ),
                  "last_decision": previous_item.get("decision"),
                  "last_availability": previous_item.get("availability"),
                  "last_reward": previous_item.get("reward"),
                  "verification_state": "NOT REVERIFIED THIS RUN",
              }

          CANDIDATE_LIFECYCLE_FILE.write_text(
              json.dumps(
                  candidate_lifecycle,
                  indent=2,
                  ensure_ascii=False,
              ),
              encoding="utf-8",
          )

          lifecycle_summary = {
              "new_this_run": lifecycle_new,
              "still_active": lifecycle_still_active,
              "changed": lifecycle_changed,
              "not_reverified": len(not_reverified_urls),
          }

          counts = {
              decision: sum(
                  item["decision"] == decision
                  for item in verified_results
              )
              for decision in (
                  "PURSUE",
                  "PRIORITY REVIEW",
                  "WATCHLIST",
                  "REJECT",
              )
          }

          contested_count = sum(
              item["open_competing_prs"] > 0
              for item in verified_results
          )

          assigned_count = sum(
              bool(item["assignees"])
              for item in verified_results
          )

          top_results = verified_results[:12]

          strong_targets = [
              item
              for item in verified_results
              if item["decision"] == "PURSUE"
              and item["open_competing_prs"] == 0
              and not item["assignees"]
          ]

          status = "HEALTHY"

          if searches_completed == 0:
              status = "FAILED"

          elif api_errors:
              status = "DEGRADED"

          def money_total(start=None, end=None, statuses=("paid", "received", "completed")):
              total = 0.0
              for entry in ledger:
                  try:
                      amount = float(entry.get("amount", 0) or 0)
                  except (TypeError, ValueError):
                      continue
                  status_value = str(entry.get("status", "paid")).lower()
                  if status_value not in statuses:
                      continue
                  when = parse_datetime(entry.get("paid_at") or entry.get("date") or entry.get("created_at"))
                  if start and (not when or when < start):
                      continue
                  if end and when and when >= end:
                      continue
                  total += amount
              return round(total, 2)

          today_start = NOW.replace(hour=0, minute=0, second=0, microsecond=0)
          week_start = today_start.replace(day=max(1, today_start.day - today_start.weekday()))
          month_start = today_start.replace(day=1)
          year_start = today_start.replace(month=1, day=1)

          waiting_today = 0.0
          waiting_later = 0.0
          overdue = 0.0
          waiting_unknown = 0.0
          payment_schedule = []
          for entry in ledger:
              status_value = str(entry.get("status", "")).lower()
              if status_value not in ("pending", "waiting", "submitted", "approved"):
                  continue
              try:
                  amount = float(entry.get("amount", 0) or 0)
              except (TypeError, ValueError):
                  amount = 0.0
              expected = parse_datetime(entry.get("expected_at"))
              if expected is None:
                  bucket = "UNKNOWN"
                  waiting_unknown += amount
              elif expected < today_start:
                  bucket = "OVERDUE"
                  overdue += amount
              elif expected < today_start.replace(hour=23, minute=59, second=59):
                  bucket = "TODAY"
                  waiting_today += amount
              else:
                  bucket = "LATER"
                  waiting_later += amount
              payment_schedule.append({
                  "title": entry.get("title", "Untitled payment"),
                  "amount": amount,
                  "expected_at": entry.get("expected_at"),
                  "bucket": bucket,
                  "status": status_value,
              })

          earnings = {
              "today": money_total(today_start),
              "week": money_total(week_start),
              "month": money_total(month_start),
              "year": money_total(year_start),
              "lifetime": money_total(),
              "waiting_today": round(waiting_today, 2),
              "waiting_later": round(waiting_later, 2),
              "overdue": round(overdue, 2),
              "waiting_unknown": round(waiting_unknown, 2),
          }
          earnings["waiting_total"] = round(waiting_today + waiting_later + overdue + waiting_unknown, 2)
          allocations = {
              "tax": round(earnings["year"] * float(config["tax_percent"]) / 100, 2),
              "reinvesting": round(earnings["year"] * float(config["reinvest_percent"]) / 100, 2),
              "mazen": round(earnings["year"] * float(config["mazen_percent"]) / 100, 2),
          }

          execution_queue = []
          for item in verified_results:
              payment_confidence = max(
                  0,
                  min(
                      100,
                      15
                      + item.get("score", 0) * 0.65
                      + (15 if item.get("paypal_signals") else 0)
                      + (12 if item.get("approval_authority") != "NOT VERIFIED" else 0)
                      + (10 if item.get("fast_payment_signals") else 0)
                      - item.get("open_competing_prs", 0) * 18
                      - (22 if item.get("assignees") else 0),
                  ),
              )
              if not item.get("direct_payment_proof"):
                  payment_confidence = min(
                      payment_confidence,
                      49,
                  )
              if item.get("repository_mismatch"):
                  payment_confidence = min(
                      payment_confidence,
                      25,
                  )

              competition_score = max(0, 100 - item.get("open_competing_prs", 0) * 30 - (25 if item.get("assignees") else 0))
              clarity_score = max(0, min(100, 50 + (10 if item.get("acceptance_criteria") else 0) + min(30, len(item.get("evidence", [])) * 5)))
              effort_risk = max(5, min(100, 45 + len(item.get("risks", [])) * 10))
              expected_value = round(item.get("reward", 0) * (payment_confidence / 100) * (competition_score / 100) / max(1, effort_risk / 25), 2)
              queue_item = dict(item)
              queue_item.update({
                  "payment_confidence": round(payment_confidence, 1),
                  "competition_score": round(competition_score, 1),
                  "clarity_score": round(clarity_score, 1),
                  "effort_risk": round(effort_risk, 1),
                  "expected_value": expected_value,
              })
              execution_queue.append(queue_item)
          def reward_priority_rank(item):
              reward = float(item.get("reward", 0) or 0)
              if 5 <= reward <= 50:
                  return 3
              if reward <= 100:
                  return 2
              if reward <= 250:
                  return 1
              return 0

          execution_queue.sort(
              key=lambda x: (
                  x["decision"] == "PURSUE",
                  reward_priority_rank(x),
                  bool(x.get("fast_pay_candidate")),
                  x.get("ai_eligibility") == "EXPLICITLY ALLOWED",
                  x["expected_value"],
                  x.get("score", 0),
              ),
              reverse=True,
          )
          execution_queue = execution_queue[:int(config.get("queue_size", 20))]

          operations["version"] = "V14"
          operations["last_updated"] = GENERATED_AT
          operations["pipeline"] = execution_queue
          OPERATIONS_FILE.write_text(json.dumps(operations, indent=2, ensure_ascii=False), encoding="utf-8")

          quick_wins = [
              item for item in execution_queue
              if 5 <= float(item.get("reward", 0)) <= 100
              and not item.get("assignees")
              and int(item.get("open_competing_prs", 0)) == 0
          ]
          fast_paypal_candidates = [item for item in execution_queue if item.get("fast_pay_candidate")]
          ai_clear_candidates = [item for item in execution_queue if item.get("ai_eligibility") == "EXPLICITLY ALLOWED"]
          approval_path_candidates = [item for item in execution_queue if item.get("approval_authority") != "NOT VERIFIED"]
          alex_recommendation = (
              f"Immediately review {len(fast_paypal_candidates)} verified fast-PayPal candidate(s); owner approval remains required."
