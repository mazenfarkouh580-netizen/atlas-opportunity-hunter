              <div class="subtitle">Verified received earnings only</div>

              <section class="grid">
                <div class="card"><div class="value">${earnings['today']:,.2f}</div><div class="name">Today</div></div>
                <div class="card"><div class="value">${earnings['week']:,.2f}</div><div class="name">This week</div></div>
                <div class="card"><div class="value">${earnings['month']:,.2f}</div><div class="name">This month</div></div>
                <div class="card"><div class="value">${earnings['waiting_total']:,.2f}</div><div class="name">Pending / waiting</div></div>
              </section>

              <section class="status">
                <div><strong>Last payment:</strong> {html.escape(last_payment_text)}</div>
                <div><strong>Atlas:</strong> {html.escape(status)} — scanning every 15 minutes</div>
                <div><strong>Alex:</strong> ranking small fast wins, checking AI rules, PayPal signals, competition, payment evidence, and system health</div>
                <div><strong>Pursue:</strong> {counts['PURSUE']} &nbsp; <strong>Priority review:</strong> {counts['PRIORITY REVIEW']}</div>
                <div><strong>Last updated:</strong> {html.escape(GENERATED_AT)}</div>
                <div><a href="index.html">Open full Atlas dashboard</a></div>
              </section>

              <div class="footer">Target schedule: every 15 minutes. Actual completion time is recorded and monitored. Atlas records money only after the ledger marks payment as received.</div>
            </main>
          </body>
          </html>
          """
          MONEY_WINDOW_FILE.write_text(money_window, encoding="utf-8")

          report_rows = "".join(
              f"<tr><td>{i}</td><td>{html.escape(item['decision'])}</td><td>${item['reward']:,.2f}</td><td>${item['expected_value']:,.2f}</td><td>{html.escape(item['title'])}</td></tr>"
              for i, item in enumerate(execution_queue, 1)
          )
          report_html = f"""<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Atlas + Alex V15 Report</title><style>body{{font-family:Arial,sans-serif;margin:28px}}table{{border-collapse:collapse;width:100%}}th,td{{border:1px solid #999;padding:8px;text-align:left}}@media print{{button{{display:none}}}}</style></head><body><button onclick='window.print()'>Print</button><h1>Atlas Opportunity Hunter V14 Report</h1><p>Generated: {html.escape(GENERATED_AT)}</p><p>Status: <strong>{html.escape(status)}</strong></p><h2>Earnings</h2><p>Today ${earnings['today']:,.2f} · Week ${earnings['week']:,.2f} · Month ${earnings['month']:,.2f} · Year ${earnings['year']:,.2f} · Lifetime ${earnings['lifetime']:,.2f}</p><h2>Allocation</h2><p>Tax ${allocations['tax']:,.2f} · Reinvesting ${allocations['reinvesting']:,.2f} · Mazen ${allocations['mazen']:,.2f}</p><h2>Execution Queue</h2><table><thead><tr><th>#</th><th>Decision</th><th>Reward</th><th>Expected Value</th><th>Opportunity</th></tr></thead><tbody>{report_rows}</tbody></table></body></html>"""
          (REPORTS_DIR / "latest.html").write_text(report_html, encoding="utf-8")
          csv_lines = ["rank,decision,reward,expected_value,payment_confidence,competition_advantage,title,url"]
          for i, item in enumerate(execution_queue, 1):
              def csv_value(value):
                  return '"' + str(value).replace('"', '""') + '"'
              csv_lines.append(",".join([
                  str(i), csv_value(item['decision']), str(item['reward']), str(item['expected_value']),
                  str(item['payment_confidence']), str(item['competition_score']), csv_value(item['title']), csv_value(item['url'])
              ]))
          (REPORTS_DIR / "latest.csv").write_text("\n".join(csv_lines) + "\n", encoding="utf-8")
          (REPORTS_DIR / "latest.txt").write_text(
              "Atlas Opportunity Hunter V14\n" +
              f"Generated: {GENERATED_AT}\nStatus: {status}\n" +
              f"Today: ${earnings['today']:,.2f}\nWeek: ${earnings['week']:,.2f}\nMonth: ${earnings['month']:,.2f}\nYear: ${earnings['year']:,.2f}\nLifetime: ${earnings['lifetime']:,.2f}\n",
              encoding="utf-8",
          )

          summary_lines = [
              "# Atlas Opportunity Hunter V14",
              "",
              (
                  f"- System status: "
                  f"**{status}**"
              ),
              (
                  f"- Generated: "
                  f"**{GENERATED_AT}**"
              ),
              (
                  f"- Raw issues found: "
                  f"**{len(raw_issues)}**"
              ),
              (
                  f"- Eligible paid candidates: "
                  f"**{len(initial_candidates)}**"
              ),
              (
                  f"- Deep verified: "
                  f"**{len(verified_results)}**"
              ),
              (
                  f"- Pursue: "
                  f"**{counts['PURSUE']}**"
              ),
              (
                  f"- Priority review: "
                  f"**{counts['PRIORITY REVIEW']}**"
              ),
              (
                  f"- Contested: "
                  f"**{contested_count}**"
              ),
              (
                  f"- Assigned: "
                  f"**{assigned_count}**"
              ),
              (
                  f"- Strong uncontested targets: "
                  f"**{len(strong_targets)}**"
              ),
              (
                  f"- Meaningful changes: "
                  f"**{len(meaningful_changes)}**"
              ),
              (
                  f"- API errors: "
                  f"**{len(api_errors)}**"
              ),
              "",
              (
                  "> Manual verification is "
                  "required before any work begins."
              ),
              "",
              "## Top Candidates",
          ]

          for item in top_results[:8]:
              summary_lines.append(
                  f"- **{item['decision']}** | "
                  f"Score {item['score']} | "
                  f"${item['reward']:,.2f} | "
                  f"{item['title']} | "
                  f"{item['availability']}"
              )

          summary_path = os.environ.get(
              "GITHUB_STEP_SUMMARY"
          )

          if summary_path:
              Path(summary_path).write_text(
                  "\n".join(summary_lines) + "\n",
                  encoding="utf-8",
              )

          github_output = os.environ.get(
              "GITHUB_OUTPUT"
          )

          if github_output:
              with open(
                  github_output,
                  "a",
                  encoding="utf-8",
              ) as output:
                  output.write(
                      f"system_status={status}\n"
                  )

                  output.write(
                      "pursue_count="
                      f"{counts['PURSUE']}\n"
                  )

                  output.write(
                      "contested_count="
                      f"{contested_count}\n"
                  )

                  output.write(
                      "meaningful_change_count="
                      f"{len(meaningful_changes)}\n"
                  )

          print(
              f"Atlas + Alex V15 status={status}; "
              f"checked {len(raw_issues)} "
              "raw issues; "
              f"found {len(initial_candidates)} "
              "eligible candidates; "
              f"deep-verified "
              f"{len(verified_results)}; "
              f"pursue={counts['PURSUE']}; "
              "priority-review="
              f"{counts['PRIORITY REVIEW']}; "
              f"contested={contested_count}; "
              f"assigned={assigned_count}; "
              "meaningful-changes="
              f"{len(meaningful_changes)}."
          )

          if searches_completed == 0:
              raise SystemExit(
                  "Atlas + Alex V15 could not complete "
                  "any GitHub search query."
              )
          PY

      - name: Save Atlas + Alex V15 results
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          git config \
            user.name \
            "Atlas Opportunity Hunter"

          git config \
            user.email \
            "atlas-bot@users.noreply.github.com"

          git add -A data docs

          if git diff --cached --quiet
          then
            echo "No Atlas result changes to save."
            exit 0
          fi

          git commit \
            -m "Atlas + Alex V15 opportunity scan"

          git pull \
            --rebase \
            origin \
            "$BRANCH_NAME"

          git push \
            origin \
            "HEAD:$BRANCH_NAME"
