name: Atlas Opportunity Hunter V8

on:
  workflow_dispatch:
  schedule:
    - cron: "7,22,37,52 * * * *"

concurrency:
  group: atlas-opportunity-hunter-v8
  cancel-in-progress: false

permissions:
  contents: write
  issues: read
  pull-requests: read

jobs:
  hunt:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Download repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Scan and verify paid opportunities
        id: atlas
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python <<'PY'
          import html
          import json
          import os
          import re
          import time
          import urllib.error
          import urllib.parse
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          TOKEN = os.environ["GITHUB_TOKEN"]
          API_VERSION = "2022-11-28"
          NOW = datetime.now(timezone.utc)
          GENERATED_AT = NOW.strftime("%Y-%m-%d %H:%M UTC")

          DATA_DIR = Path("data")
          DOCS_DIR = Path("docs")
          DATA_DIR.mkdir(exist_ok=True)
          DOCS_DIR.mkdir(exist_ok=True)

          CURRENT_FILE = DATA_DIR / "opportunities.json"
          HISTORY_FILE = DATA_DIR / "opportunity-history.json"
          DASHBOARD_FILE = DOCS_DIR / "index.html"
          CONFIG_FILE = DATA_DIR / "atlas-config.json"
          OPERATIONS_FILE = DATA_DIR / "atlas-operations.json"
          MAINTENANCE_FILE = DATA_DIR / "dr-alex-maintenance.json"
          EARNINGS_FILE = DATA_DIR / "earnings-ledger.json"
          ALERTS_FILE = DATA_DIR / "atlas-alerts.json"
          REPORTS_DIR = DOCS_DIR / "reports"
          REPORTS_DIR.mkdir(exist_ok=True)

          SEARCH_QUERIES = [
              # Core paid-work discovery.
              'is:issue is:open bounty in:title,body',
              'is:issue is:open reward in:title,body',
              'is:issue is:open label:bounty',
              'is:issue is:open label:reward',
              'is:issue is:open label:"help wanted" "$" in:body',
              'is:issue is:open label:"good first issue" bounty in:title,body',
              'is:issue is:open label:"good first issue" reward in:title,body',

              # Simple AI, automation, and agent opportunities.
              'is:issue is:open AI bounty in:title,body',
              'is:issue is:open AI reward in:title,body',
              'is:issue is:open LLM bounty in:title,body',
              'is:issue is:open LLM reward in:title,body',
              'is:issue is:open "AI agent" bounty in:title,body',
              'is:issue is:open "AI agent" reward in:title,body',
              'is:issue is:open prompt bounty in:title,body',
              'is:issue is:open prompt reward in:title,body',
              'is:issue is:open RAG bounty in:title,body',
              'is:issue is:open chatbot bounty in:title,body',
              'is:issue is:open n8n bounty in:title,body',
              'is:issue is:open automation bounty in:title,body',
              'is:issue is:open "data annotation" reward in:title,body',
              'is:issue is:open "model evaluation" reward in:title,body',
              'is:issue is:open OpenAI bounty in:title,body',
              'is:issue is:open Claude bounty in:title,body',
              'is:issue is:open LangChain bounty in:title,body',

              # Quick-win reward bands requested by the CEO.
              'is:issue is:open "$5" in:title,body',
              'is:issue is:open "$10" in:title,body',
              'is:issue is:open "$15" in:title,body',
              'is:issue is:open "$20" in:title,body',
              'is:issue is:open "$25" in:title,body',
              'is:issue is:open "$30" in:title,body',
              'is:issue is:open "$40" in:title,body',
              'is:issue is:open "$50" in:title,body',
              'is:issue is:open "$75" in:title,body',
              'is:issue is:open "$100" in:title,body',

              # Fast-payment and PayPal micro-bounty discovery.
              'is:issue is:open PayPal bounty in:title,body',
              'is:issue is:open PayPal reward in:title,body',
              'is:issue is:open "paid via PayPal" in:title,body',
              'is:issue is:open "payment by PayPal" in:title,body',
              'is:issue is:open "instant payment" bounty in:title,body',
              'is:issue is:open "same day payment" bounty in:title,body',
              'is:issue is:open "upon acceptance" PayPal in:title,body',
              'is:issue is:open "first accepted" bounty in:title,body',

              # Fast-claim and low-complexity discovery.
              'is:issue is:open "first come first served" bounty in:title,body',
              'is:issue is:open "claim this" reward in:title,body',
              'is:issue is:open "micro bounty" in:title,body',
              'is:issue is:open beginner bounty in:title,body',
              'is:issue is:open easy bounty in:title,body',
              'is:issue is:open documentation bounty in:title,body',
              'is:issue is:open tests bounty in:title,body',
              'is:issue is:open "bug fix" reward in:title,body',
              'is:issue is:open "OpenAI API" reward in:title,body',
              'is:issue is:open "prompt engineering" reward in:title,body',
              'is:issue is:open "AI evaluation" reward in:title,body',
              'is:issue is:open "data cleanup" reward in:title,body',
          ]

          BLOCKED_TERMS = [
              "phishing",
              "malware",
              "ransomware",
              "credential theft",
              "steal credentials",
              "unauthorized access",
              "bypass authentication",
              "ddos",
              "fake account",
              "account farming",
              "exploit users",
              "stolen data",
          ]

          PREFERRED_TERMS = [
              "bug",
              "fix",
              "test",
              "tests",
              "documentation",
              "docs",
              "python",
              "javascript",
              "typescript",
              "workflow",
              "github actions",
              "ci",
              "data cleanup",
              "refactor",
              "prompt",
              "prompt engineering",
              "llm",
              "rag",
              "ai agent",
              "agent workflow",
              "evaluation",
              "dataset",
              "data annotation",
              "n8n",
              "automation",
              "api integration",
              "chatbot",
              "openai",
              "claude",
              "langchain",
          ]

          COMPLEXITY_TERMS = [
              "architecture",
              "rewrite",
              "redesign",
              "production ready",
              "full implementation",
              "mobile app",
              "blockchain",
              "smart contract",
              "machine learning model",
              "security audit",
          ]

          PAYMENT_EVIDENCE_TERMS = [
              "paid bounty",
              "payment sent",
              "payment received",
              "bounty paid",
              "reward paid",
              "funded bounty",
              "escrow",
              "algora",
              "polar bounty",
          ]

          PAYPAL_TERMS = [
              "paypal",
              "paid via paypal",
              "payment by paypal",
              "paypal payment",
          ]

          FAST_PAYMENT_TERMS = [
              "instant payment",
              "paid immediately",
              "same day payment",
              "payment upon acceptance",
              "pay upon acceptance",
              "paid on acceptance",
              "first accepted",
              "first valid submission",
          ]

          AI_ALLOWED_TERMS = [
              "ai allowed",
              "ai-assisted allowed",
              "ai assisted allowed",
              "automation allowed",
              "agents allowed",
              "bot submissions allowed",
              "llm allowed",
              "claude code",
              "openai",
              "ai agent",
          ]

          HUMAN_ONLY_TERMS = [
              "human only",
              "no ai",
              "ai prohibited",
              "no bots",
              "no automation",
              "manual work only",
              "must be completed by a human",
              "identity verification required",
              "live interview required",
          ]

          APPROVAL_AUTHORITY_TERMS = [
              "maintainer approval",
              "owner approval",
              "bounty issuer",
              "repository owner",
              "upon merge",
              "upon acceptance",
              "accepted submission",
          ]

          api_errors = []
          api_calls = 0

          def load_json_file(path, default):
              try:
                  if path.exists():
                      value = json.loads(path.read_text(encoding="utf-8"))
                      return value
              except Exception as error:
                  api_errors.append({
                      "stage": f"load {path.name}",
                      "error": str(error),
                  })
              return default

          default_config = {
              "minimum_reward": 5,
              "minimum_payment_confidence": 55,
              "minimum_expected_value": 2,
              "queue_size": 20,
              "dashboard_refresh_seconds": 900,
              "tax_percent": 25,
              "reinvest_percent": 25,
              "mazen_percent": 50,
          }
          config = load_json_file(CONFIG_FILE, default_config)
          for key, value in default_config.items():
              config.setdefault(key, value)

          split_total = sum(float(config.get(key, 0)) for key in (
              "tax_percent", "reinvest_percent", "mazen_percent"
          ))
          if split_total <= 0:
              config.update({"tax_percent": 25, "reinvest_percent": 25, "mazen_percent": 50})
              split_total = 100
          if abs(split_total - 100) > 0.01:
              for key in ("tax_percent", "reinvest_percent", "mazen_percent"):
                  config[key] = round(float(config.get(key, 0)) * 100 / split_total, 2)

          CONFIG_FILE.write_text(json.dumps(config, indent=2), encoding="utf-8")

          ledger = load_json_file(EARNINGS_FILE, [])
          if not isinstance(ledger, list):
              ledger = []
              EARNINGS_FILE.write_text("[]\n", encoding="utf-8")

          operations = load_json_file(OPERATIONS_FILE, {
              "version": "V8",
              "pipeline": [],
              "last_updated": GENERATED_AT,
          })
          if not isinstance(operations, dict):
              operations = {"version": "V8", "pipeline": [], "last_updated": GENERATED_AT}

          maintenance = load_json_file(MAINTENANCE_FILE, {
              "doctor": "Dr. Alex",
              "health": "HEALTHY",
              "last_check": GENERATED_AT,
              "repairs": [],
              "diagnostics": [],
          })
          if not isinstance(maintenance, dict):
              maintenance = {"doctor": "Dr. Alex", "health": "HEALTHY", "last_check": GENERATED_AT, "repairs": [], "diagnostics": []}

          def parse_datetime(value):
              if not value:
                  return None
              try:
                  return datetime.fromisoformat(
                      value.replace("Z", "+00:00")
                  )
              except (TypeError, ValueError):
                  return None

          def age_days(value):
              parsed = parse_datetime(value)

              if not parsed:
                  return None

              return max(
                  0.0,
                  (NOW - parsed).total_seconds() / 86400,
              )

          def api_get(
              url,
              accept="application/vnd.github+json",
              retries=3,
          ):
              global api_calls

              last_error = None

              for attempt in range(1, retries + 1):
                  request = urllib.request.Request(
                      url,
                      headers={
                          "Authorization": f"Bearer {TOKEN}",
                          "Accept": accept,
                          "X-GitHub-Api-Version": API_VERSION,
                          "User-Agent": (
                              "Atlas-Opportunity-Hunter-V8"
                          ),
                      },
                  )

                  try:
                      api_calls += 1

                      with urllib.request.urlopen(
                          request,
                          timeout=30,
                      ) as response:
                          return json.loads(
                              response.read().decode("utf-8")
                          )

                  except urllib.error.HTTPError as error:
                      body = error.read().decode(
                          "utf-8",
                          errors="replace",
                      )[:300]

                      last_error = (
                          f"HTTP {error.code}: {body}"
                      )

                      if (
                          error.code in (403, 429)
                          and attempt < retries
                      ):
                          time.sleep(attempt * 3)
                          continue

                      if (
                          500 <= error.code < 600
                          and attempt < retries
                      ):
                          time.sleep(attempt * 2)
                          continue

                      break

                  except Exception as error:
                      last_error = str(error)

                      if attempt < retries:
                          time.sleep(attempt * 2)
                          continue

                      break

              raise RuntimeError(
                  last_error
                  or "Unknown GitHub API error"
              )

          def safe_api_get(
              url,
              accept="application/vnd.github+json",
          ):
              try:
                  return api_get(
                      url,
                      accept=accept,
                  )

              except Exception as error:
                  api_errors.append(
                      {
                          "url": url,
                          "error": str(error),
                      }
                  )

                  return None

          def extract_reward(text):
              patterns = [
                  (
                      r"/bounty\s*\$"
                      r"([0-9][0-9,]*(?:\.\d{1,2})?)"
                  ),
                  (
                      r"\$"
                      r"([0-9][0-9,]*(?:\.\d{1,2})?)"
                      r"\s*(?:usd\s*)?"
                      r"(?:bounty|reward|prize)"
                  ),
                  (
                      r"(?:bounty|reward|prize)"
                      r"\s*(?:of|is|:|=)?\s*\$"
                      r"([0-9][0-9,]*(?:\.\d{1,2})?)"
                  ),
                  (
                      r"(?:pay|payment|paid)"
                      r"\s*(?:of|is|:|=)?\s*\$"
                      r"([0-9][0-9,]*(?:\.\d{1,2})?)"
                  ),
              ]

              rewards = []

              for pattern in patterns:
                  for match in re.finditer(
                      pattern,
                      text,
                      re.I,
                  ):
                      try:
                          rewards.append(
                              float(
                                  match.group(1).replace(
                                      ",",
                                      "",
                                  )
                              )
                          )
                      except ValueError:
                          pass

              return max(
                  rewards,
                  default=0.0,
              )

          def issue_identity(issue):
              repository = (
                  issue.get("repository_url") or ""
              ).split("/repos/")[-1]

              number = int(
                  issue.get("number") or 0
              )

              return repository, number

          def is_aggregator(
              issue,
              title,
              body,
          ):
              repository, _ = issue_identity(issue)
              repository = repository.lower()

              author = (
                  (issue.get("user") or {}).get(
                      "login"
                  )
                  or ""
              ).lower()

              labels = {
                  (label.get("name") or "").lower()
                  for label in issue.get(
                      "labels",
                      [],
                  )
              }

              title_lower = title.lower()
              body_lower = body.lower()

              aggregator_phrases = [
                  "bounty alert",
                  "new opportunities",
                  "new opportunityies",
                  "opportunities found",
                  "opportunityies found",
                  "top opportunities",
                  "new bounties found",
              ]

              if "bountyscout" in repository:
                  return True

              if any(
                  phrase in title_lower
                  for phrase in aggregator_phrases
              ):
                  return True

              if (
                  "bounty-alert" in labels
                  or "bounty alert" in labels
              ):
                  return True

              if (
                  author == "github-actions[bot]"
                  or author.endswith("[bot]")
              ):
                  return True

              linked_issues = re.findall(
                  (
                      r"https://github\.com/"
                      r"[^/\s]+/[^/\s]+/issues/\d+"
                  ),
                  body,
                  re.I,
              )

              if len(set(linked_issues)) >= 3:
                  return True

              if any(
                  phrase in body_lower
                  for phrase in aggregator_phrases
              ):
                  return True

              return False

          def load_previous():
              if not CURRENT_FILE.exists():
                  return {}

              try:
                  payload = json.loads(
                      CURRENT_FILE.read_text(
                          encoding="utf-8"
                      )
                  )

                  return {
                      item.get("url"): item
                      for item in payload.get(
                          "all_verified_results",
                          [],
                      )
                      if item.get("url")
                  }

              except Exception:
                  return {}

          def load_history():
              if not HISTORY_FILE.exists():
                  return []

              try:
                  data = json.loads(
                      HISTORY_FILE.read_text(
                          encoding="utf-8"
                      )
                  )

                  return (
                      data
                      if isinstance(data, list)
                      else []
                  )

              except Exception:
                  return []

          def collect_issue_comments(
              repository,
              number,
          ):
              encoded_repo = urllib.parse.quote(
                  repository,
                  safe="/",
              )

              url = (
                  "https://api.github.com/repos/"
                  f"{encoded_repo}/issues/"
                  f"{number}/comments?per_page=100"
              )

              data = safe_api_get(url)

              return (
                  data
                  if isinstance(data, list)
                  else []
              )

          def collect_timeline(
              repository,
              number,
          ):
              encoded_repo = urllib.parse.quote(
                  repository,
                  safe="/",
              )

              url = (
                  "https://api.github.com/repos/"
                  f"{encoded_repo}/issues/"
                  f"{number}/timeline?per_page=100"
              )

              data = safe_api_get(
                  url,
                  accept=(
                      "application/vnd.github+json"
                  ),
              )

              return (
                  data
                  if isinstance(data, list)
                  else []
              )

          def search_linked_pull_requests(
              repository,
              number,
              issue_url,
          ):
              queries = [
                  (
                      f'repo:{repository} '
                      f'is:pr is:open "#{number}"'
                  ),
                  (
                      f'repo:{repository} '
                      f'is:pr "{issue_url}"'
                  ),
              ]

              found = {}

              for query in queries:
                  encoded = urllib.parse.quote(query)

                  url = (
                      "https://api.github.com/"
                      "search/issues"
                      f"?q={encoded}"
                      "&sort=updated"
                      "&order=desc"
                      "&per_page=30"
                  )

                  data = safe_api_get(url)

                  if not isinstance(data, dict):
                      continue

                  for item in data.get(
                      "items",
                      [],
                  ):
                      if "pull_request" not in item:
                          continue

                      html_url = (
                          item.get("html_url") or ""
                      )

                      if html_url:
                          found[html_url] = item

              return list(found.values())

          def verify_candidate(issue):
              title = issue.get("title") or ""
              body = issue.get("body") or ""
              issue_url = (
                  issue.get("html_url") or ""
              )

              repository, number = issue_identity(
                  issue
              )

              labels = sorted(
                  {
                      (
                          label.get("name") or ""
                      ).strip()
                      for label in issue.get(
                          "labels",
                          [],
                      )
                      if (
                          label.get("name") or ""
                      ).strip()
                  }
              )

              comments = collect_issue_comments(
                  repository,
                  number,
              )

              timeline = collect_timeline(
                  repository,
                  number,
              )

              linked_prs = (
                  search_linked_pull_requests(
                      repository,
                      number,
                      issue_url,
                  )
              )

              comment_text = "\n".join(
                  comment.get("body") or ""
                  for comment in comments
              )

              combined_text = (
                  f"{title}\n"
                  f"{body}\n"
                  f"{comment_text}"
              )

              lowered = combined_text.lower()

              timeline_pr_urls = set()

              for event in timeline:
                  source_issue = (
                      (
                          event.get("source") or {}
                      ).get("issue")
                      or {}
                  )

                  if "pull_request" in source_issue:
                      url = (
                          source_issue.get(
                              "html_url"
                          )
                          or ""
                      )

                      if url:
                          timeline_pr_urls.add(url)

              linked_pr_map = {
                  pr.get("html_url"): pr
                  for pr in linked_prs
                  if pr.get("html_url")
              }

              for url in timeline_pr_urls:
                  linked_pr_map.setdefault(
                      url,
                      {
                          "html_url": url,
                          "title": (
                              "Pull request linked "
                              "through issue timeline"
                          ),
                          "state": "unknown",
                          "user": {},
                          "created_at": "",
                          "updated_at": "",
                      },
                  )

              pr_summaries = []
              open_pr_count = 0
              merged_pr_count = 0

              for pr in linked_pr_map.values():
                  state = (
                      pr.get("state") or "unknown"
                  ).lower()

                  pull_data = (
                      pr.get("pull_request") or {}
                  )

                  merged_at = pull_data.get(
                      "merged_at"
                  )

                  if merged_at:
                      merged_pr_count += 1

                  elif state == "open":
                      open_pr_count += 1

                  pr_summaries.append(
                      {
                          "title": (
                              pr.get("title")
                              or "Linked pull request"
                          ),
                          "url": (
                              pr.get("html_url")
                              or ""
                          ),
                          "state": (
                              "merged"
                              if merged_at
                              else state
                          ),
                          "author": (
                              (
                                  pr.get("user")
                                  or {}
                              ).get("login")
                              or ""
                          ),
                          "created_at": (
                              pr.get("created_at")
                              or ""
                          ),
                          "updated_at": (
                              pr.get("updated_at")
                              or ""
                          ),
                      }
                  )

              assignees = [
                  person.get("login") or ""
                  for person in issue.get(
                      "assignees",
                      [],
                  )
                  if person.get("login")
              ]

              reward = extract_reward(
                  f"{title}\n{body}"
              )

              created_age = age_days(
                  issue.get("created_at")
              )

              updated_age = age_days(
                  issue.get("updated_at")
              )

              detail = len(body.strip())

              preferred_matches = sorted(
                  {
                      term
                      for term in PREFERRED_TERMS
                      if term in lowered
                  }
              )

              complexity_matches = sorted(
                  {
                      term
                      for term in COMPLEXITY_TERMS
                      if term in lowered
                  }
              )

              payment_signals = sorted(
                  {
                      term
                      for term in PAYMENT_EVIDENCE_TERMS
                      if term in lowered
                  }
              )

              paypal_signals = sorted({term for term in PAYPAL_TERMS if term in lowered})
              fast_payment_signals = sorted({term for term in FAST_PAYMENT_TERMS if term in lowered})
              ai_allowed_signals = sorted({term for term in AI_ALLOWED_TERMS if term in lowered})
              human_only_signals = sorted({term for term in HUMAN_ONLY_TERMS if term in lowered})
              approval_authority_signals = sorted({term for term in APPROVAL_AUTHORITY_TERMS if term in lowered})

              score = 0
              reasons = []
              risks = []

              if reward >= 1000:
                  score += 25
                  reasons.append(
                      "Very large stated reward"
                  )

              elif reward >= 500:
                  score += 23
                  reasons.append(
                      "Large stated reward"
                  )

              elif reward >= 150:
                  score += 20
                  reasons.append(
                      "Strong stated reward"
                  )

              elif reward >= 50:
                  score += 16
                  reasons.append(
                      "Good stated reward"
                  )

              else:
                  score += 10
                  reasons.append(
                      "Stated paid reward"
                  )

              if detail >= 1200:
                  score += 15
                  reasons.append(
                      "Detailed requirements"
                  )

              elif detail >= 500:
                  score += 11
                  reasons.append(
                      "Useful requirements"
                  )

              elif detail >= 150:
                  score += 6
                  reasons.append(
                      "Basic requirements"
                  )

              else:
                  score -= 8
                  risks.append(
                      "Requirements are too brief"
                  )

              score += min(
                  18,
                  len(preferred_matches) * 3,
              )

              if preferred_matches:
                  reasons.append(
                      "Capability match: "
                      + ", ".join(
                          preferred_matches[:6]
                      )
                  )

              if complexity_matches:
                  score -= min(
                      15,
                      len(complexity_matches) * 4,
                  )

                  risks.append(
                      "Potentially high complexity: "
                      + ", ".join(
                          complexity_matches[:4]
                      )
                  )

              visible_discussion = len(comments)

              if visible_discussion == 0:
                  score += 10
                  reasons.append(
                      "No visible comments"
                  )

              elif visible_discussion <= 3:
                  score += 6
                  reasons.append(
                      "Low visible discussion"
                  )

              elif visible_discussion <= 8:
                  score += 1
                  risks.append(
                      "Moderate visible discussion"
                  )

              else:
                  score -= 8
                  risks.append(
                      "Heavy visible discussion"
                  )

              if created_age is not None:
                  if created_age <= 1:
                      score += 14
                      reasons.append(
                          "Posted within 24 hours"
                      )

                  elif created_age <= 7:
                      score += 10
                      reasons.append(
                          "Posted within 7 days"
                      )

                  elif created_age <= 30:
                      score += 5
                      reasons.append(
                          "Posted within 30 days"
                      )

                  elif created_age > 180:
                      score -= 12
                      risks.append(
                          "Issue may be stale"
                      )

              if (
                  updated_age is not None
                  and updated_age <= 7
              ):
                  score += 4
                  reasons.append(
                      "Recently updated"
                  )

              if "acceptance criteria" in lowered:
                  score += 10
                  reasons.append(
                      "Explicit acceptance criteria"
                  )

              elif (
                  "expected behavior" in lowered
                  or "definition of done" in lowered
              ):
                  score += 7
                  reasons.append(
                      "Expected result is described"
                  )

              elif detail >= 500:
                  score += 3
                  reasons.append(
                      "Review path appears usable"
                  )

              else:
                  risks.append(
                      "Acceptance path requires "
                      "manual confirmation"
                  )

              if assignees:
                  score -= 18
                  risks.append(
                      "Issue already has an assignee"
                  )

              if open_pr_count == 1:
                  score -= 20
                  risks.append(
                      "One competing pull request "
                      "detected"
                  )

              elif open_pr_count >= 2:
                  score -= 30
                  risks.append(
                      f"{open_pr_count} competing "
                      "pull requests detected"
                  )

              if merged_pr_count:
                  score -= 45
                  risks.append(
                      "A linked pull request "
                      "appears merged"
                  )

              if issue.get("locked"):
                  score -= 8
                  risks.append(
                      "Issue discussion is locked"
                  )

              if payment_signals:
                  score += 5
                  reasons.append("Payment-related signal mentioned")

              if paypal_signals:
                  score += 6
                  reasons.append("PayPal payment explicitly mentioned")

              if fast_payment_signals:
                  score += 6
                  reasons.append("Fast-payment timing explicitly mentioned")

              if ai_allowed_signals:
                  score += 5
                  reasons.append("AI/automation participation appears allowed")

              if human_only_signals:
                  score -= 35
                  risks.append("Human-only or AI-prohibited language detected")

              if approval_authority_signals:
                  reasons.append("Acceptance authority or approval trigger is described")

              score = max(
                  0,
                  min(100, score),
              )

              if human_only_signals:
                  availability = "HUMAN-ONLY OR AI PROHIBITED"
                  decision = "REJECT"

              elif merged_pr_count:
                  availability = (
                      "LIKELY CLOSED BY WORK"
                  )
                  decision = "REJECT"

              elif assignees and open_pr_count:
                  availability = (
                      "ASSIGNED AND CONTESTED"
                  )
                  decision = "REJECT"

              elif open_pr_count:
                  availability = "CONTESTED"

                  decision = (
                      "PRIORITY REVIEW"
                      if score >= 55
                      else "WATCHLIST"
                  )

              elif assignees:
                  availability = "ASSIGNED"

                  decision = (
                      "WATCHLIST"
                      if score >= 55
                      else "REJECT"
                  )

              elif score >= 72:
                  availability = (
                      "OPEN - VERIFY BEFORE WORK"
                  )
                  decision = "PURSUE"

              elif score >= 56:
                  availability = (
                      "OPEN - NEEDS REVIEW"
                  )
                  decision = "PRIORITY REVIEW"

              elif score >= 40:
                  availability = "UNCERTAIN"
                  decision = "WATCHLIST"

              else:
                  availability = (
                      "LOW VALUE OR HIGH RISK"
                  )
                  decision = "REJECT"

              payment_verification = (
                  "PAYPAL + FAST-PAY TERMS FOUND - OWNER APPROVAL STILL REQUIRED"
                  if paypal_signals and fast_payment_signals
                  else "PAYPAL MENTIONED - VERIFY TIMING AND PAYER"
                  if paypal_signals
                  else "SIGNALS FOUND - STILL VERIFY MANUALLY"
                  if payment_signals
                  else "UNVERIFIED"
              )

              ai_eligibility = (
                  "PROHIBITED" if human_only_signals
                  else "EXPLICITLY ALLOWED" if ai_allowed_signals
                  else "UNCLEAR - MANUAL VERIFICATION REQUIRED"
              )

              approval_authority = (
                  "OWNER/MAINTAINER APPROVAL PATH DESCRIBED"
                  if approval_authority_signals
                  else "NOT VERIFIED"
              )

              fast_pay_candidate = bool(
                  5 <= reward <= 50
                  and paypal_signals
                  and fast_payment_signals
                  and not human_only_signals
                  and not assignees
                  and open_pr_count == 0
                  and merged_pr_count == 0
              )

              fast_pay_status = (
                  "FAST PAYPAL CANDIDATE - OWNER APPROVAL REQUIRED"
                  if fast_pay_candidate
                  else "NOT FAST-PAY VERIFIED"
              )

              return {
                  "title": title,
                  "url": issue_url,
                  "repository": repository,
                  "issue_number": number,
                  "author": (
                      (
                          issue.get("user") or {}
                      ).get("login")
                      or ""
                  ),
                  "reward": reward,
                  "score": score,
                  "decision": decision,
                  "availability": availability,
                  "created_at": (
                      issue.get("created_at")
                      or ""
                  ),
                  "updated_at": (
                      issue.get("updated_at")
                      or ""
                  ),
                  "comments": visible_discussion,
                  "labels": labels,
                  "assignees": assignees,
                  "open_competing_prs": (
                      open_pr_count
                  ),
                  "merged_linked_prs": (
                      merged_pr_count
                  ),
                  "linked_pull_requests": sorted(
                      pr_summaries,
                      key=lambda pr: (
                          pr.get("updated_at") or ""
                      ),
                      reverse=True,
                  ),
                  "payment_verification": payment_verification,
                  "paypal_signals": paypal_signals,
                  "fast_payment_signals": fast_payment_signals,
                  "ai_eligibility": ai_eligibility,
                  "approval_authority": approval_authority,
                  "fast_pay_candidate": fast_pay_candidate,
                  "fast_pay_status": fast_pay_status,
                  "manual_verification_required": not (
                      fast_pay_candidate and ai_allowed_signals and approval_authority_signals
                  ),
                  "reasons": reasons,
                  "risks": risks,
              }

          previous_by_url = load_previous()
          raw_issues = {}
          searches_completed = 0

          for query in SEARCH_QUERIES:
              encoded = urllib.parse.quote(query)

              url = (
                  "https://api.github.com/"
                  "search/issues"
                  f"?q={encoded}"
                  "&sort=updated"
                  "&order=desc"
                  "&per_page=100"
              )

              data = safe_api_get(url)

              if not isinstance(data, dict):
                  continue

              searches_completed += 1

              for issue in data.get(
                  "items",
                  [],
              ):
                  if "pull_request" in issue:
                      continue

                  issue_url = (
                      issue.get("html_url") or ""
                  )

                  if issue_url:
                      raw_issues[issue_url] = issue

          initial_candidates = []
          rejected_aggregators = 0
          rejected_unsafe = 0
          rejected_no_reward = 0

          for issue in raw_issues.values():
              title = issue.get("title") or ""
              body = issue.get("body") or ""
              text = f"{title}\n{body}"
              lowered = text.lower()

              if is_aggregator(
                  issue,
                  title,
                  body,
              ):
                  rejected_aggregators += 1
                  continue

              if any(
                  term in lowered
                  for term in BLOCKED_TERMS
              ):
                  rejected_unsafe += 1
                  continue

              reward = extract_reward(text)

              if reward <= 0:
                  rejected_no_reward += 1
                  continue

              initial_candidates.append(issue)

          initial_candidates.sort(
              key=lambda issue: (
                  extract_reward(
                      (
                          f"{issue.get('title') or ''}"
                          "\n"
                          f"{issue.get('body') or ''}"
                      )
                  ),
                  issue.get("updated_at") or "",
              ),
              reverse=True,
          )

          # Deep verification is capped to control API use.
          verification_queue = (
              initial_candidates[:25]
          )

          verified_results = []

          for index, issue in enumerate(
              verification_queue,
              start=1,
          ):
              print(
                  "Verifying candidate "
                  f"{index}/"
                  f"{len(verification_queue)}: "
                  f"{issue.get('html_url')}"
              )

              verified_results.append(
                  verify_candidate(issue)
              )

          verified_results.sort(
              key=lambda item: (
                  item["score"],
                  item["reward"],
              ),
              reverse=True,
          )

          meaningful_changes = []

          for item in verified_results:
              previous = previous_by_url.get(
                  item["url"]
              )

              if not previous:
                  item["change"] = "NEW"

                  meaningful_changes.append(
                      {
                          "type": "NEW",
                          "title": item["title"],
                          "url": item["url"],
                          "decision": (
                              item["decision"]
                          ),
                      }
                  )

                  continue

              changed_fields = []

              for field in (
                  "decision",
                  "availability",
                  "reward",
                  "assignees",
                  "open_competing_prs",
                  "merged_linked_prs",
              ):
                  if (
                      previous.get(field)
                      != item.get(field)
                  ):
                      changed_fields.append(field)

              if changed_fields:
                  item["change"] = (
                      "CHANGED: "
                      + ", ".join(changed_fields)
                  )

                  meaningful_changes.append(
                      {
                          "type": "CHANGED",
                          "title": item["title"],
                          "url": item["url"],
                          "fields": changed_fields,
                          "decision": (
                              item["decision"]
                          ),
                      }
                  )

              else:
                  item["change"] = "UNCHANGED"

          counts = {
              decision: sum(
                  item["decision"] == decision
                  for item in verified_results
              )
              for decision in (
                  "PURSUE",
                  "PRIORITY REVIEW",
                  "WATCHLIST",
                  "REJECT",
              )
          }

          contested_count = sum(
              item["open_competing_prs"] > 0
              for item in verified_results
          )

          assigned_count = sum(
              bool(item["assignees"])
              for item in verified_results
          )

          top_results = verified_results[:12]

          strong_targets = [
              item
              for item in verified_results
              if item["decision"] == "PURSUE"
              and item["open_competing_prs"] == 0
              and not item["assignees"]
          ]

          status = "HEALTHY"

          if searches_completed == 0:
              status = "FAILED"

          elif api_errors:
              status = "DEGRADED"

          def money_total(start=None, end=None, statuses=("paid", "received", "completed")):
              total = 0.0
              for entry in ledger:
                  try:
                      amount = float(entry.get("amount", 0) or 0)
                  except (TypeError, ValueError):
                      continue
                  status_value = str(entry.get("status", "paid")).lower()
                  if status_value not in statuses:
                      continue
                  when = parse_datetime(entry.get("paid_at") or entry.get("date") or entry.get("created_at"))
                  if start and (not when or when < start):
                      continue
                  if end and when and when >= end:
                      continue
                  total += amount
              return round(total, 2)

          today_start = NOW.replace(hour=0, minute=0, second=0, microsecond=0)
          week_start = today_start.replace(day=max(1, today_start.day - today_start.weekday()))
          month_start = today_start.replace(day=1)
          year_start = today_start.replace(month=1, day=1)

          waiting_today = 0.0
          waiting_later = 0.0
          overdue = 0.0
          waiting_unknown = 0.0
          payment_schedule = []
          for entry in ledger:
              status_value = str(entry.get("status", "")).lower()
              if status_value not in ("pending", "waiting", "submitted", "approved"):
                  continue
              try:
                  amount = float(entry.get("amount", 0) or 0)
              except (TypeError, ValueError):
                  amount = 0.0
              expected = parse_datetime(entry.get("expected_at"))
              if expected is None:
                  bucket = "UNKNOWN"
                  waiting_unknown += amount
              elif expected < today_start:
                  bucket = "OVERDUE"
                  overdue += amount
              elif expected < today_start.replace(hour=23, minute=59, second=59):
                  bucket = "TODAY"
                  waiting_today += amount
              else:
                  bucket = "LATER"
                  waiting_later += amount
              payment_schedule.append({
                  "title": entry.get("title", "Untitled payment"),
                  "amount": amount,
                  "expected_at": entry.get("expected_at"),
                  "bucket": bucket,
                  "status": status_value,
              })

          earnings = {
              "today": money_total(today_start),
              "week": money_total(week_start),
              "month": money_total(month_start),
              "year": money_total(year_start),
              "lifetime": money_total(),
              "waiting_today": round(waiting_today, 2),
              "waiting_later": round(waiting_later, 2),
              "overdue": round(overdue, 2),
              "waiting_unknown": round(waiting_unknown, 2),
          }
          earnings["waiting_total"] = round(waiting_today + waiting_later + overdue + waiting_unknown, 2)
          allocations = {
              "tax": round(earnings["year"] * float(config["tax_percent"]) / 100, 2),
              "reinvesting": round(earnings["year"] * float(config["reinvest_percent"]) / 100, 2),
              "mazen": round(earnings["year"] * float(config["mazen_percent"]) / 100, 2),
          }

          execution_queue = []
          for item in verified_results:
              payment_confidence = max(0, min(100, 40 + item.get("score", 0) * 5 - item.get("open_competing_prs", 0) * 15 - (20 if item.get("assignees") else 0)))
              competition_score = max(0, 100 - item.get("open_competing_prs", 0) * 30 - (25 if item.get("assignees") else 0))
              clarity_score = max(0, min(100, 50 + (10 if item.get("acceptance_criteria") else 0) + min(30, len(item.get("evidence", [])) * 5)))
              effort_risk = max(5, min(100, 45 + len(item.get("risks", [])) * 10))
              expected_value = round(item.get("reward", 0) * (payment_confidence / 100) * (competition_score / 100) / max(1, effort_risk / 25), 2)
              queue_item = dict(item)
              queue_item.update({
                  "payment_confidence": round(payment_confidence, 1),
                  "competition_score": round(competition_score, 1),
                  "clarity_score": round(clarity_score, 1),
                  "effort_risk": round(effort_risk, 1),
                  "expected_value": expected_value,
              })
              execution_queue.append(queue_item)
          execution_queue.sort(key=lambda x: (x["decision"] == "PURSUE", x["expected_value"], x.get("score", 0)), reverse=True)
          execution_queue = execution_queue[:int(config.get("queue_size", 20))]

          operations["version"] = "V8"
          operations["last_updated"] = GENERATED_AT
          operations["pipeline"] = execution_queue
          OPERATIONS_FILE.write_text(json.dumps(operations, indent=2, ensure_ascii=False), encoding="utf-8")

          quick_wins = [
              item for item in execution_queue
              if 5 <= float(item.get("reward", 0)) <= 100
              and not item.get("assignees")
              and int(item.get("open_competing_prs", 0)) == 0
          ]
          fast_paypal_candidates = [item for item in execution_queue if item.get("fast_pay_candidate")]
          ai_clear_candidates = [item for item in execution_queue if item.get("ai_eligibility") == "EXPLICITLY ALLOWED"]
          approval_path_candidates = [item for item in execution_queue if item.get("approval_authority") != "NOT VERIFIED"]
          alex_recommendation = (
              f"Immediately review {len(fast_paypal_candidates)} verified fast-PayPal candidate(s); owner approval remains required."
              if fast_paypal_candidates
              else f"Review {len(quick_wins)} unassigned quick-win candidate(s) first; verify AI permission and payer authority."
              if quick_wins
              else "No clean fast-pay quick win found in this scan; continue scanning."
          )
          maintenance.update({
              "doctor": "Dr. Alex",
              "health": status,
              "last_check": GENERATED_AT,
              "api_errors": len(api_errors),
              "searches_completed": searches_completed,
              "quick_wins_found": len(quick_wins),
              "fast_paypal_candidates": len(fast_paypal_candidates),
              "ai_explicitly_allowed_candidates": len(ai_clear_candidates),
              "approval_path_candidates": len(approval_path_candidates),
              "priority_reviews": counts.get("PRIORITY REVIEW", 0),
              "pursue_candidates": counts.get("PURSUE", 0),
              "recommendation": alex_recommendation,
              "instant_money_warning": (
                  "Small PayPal bounties may pay quickly after acceptance, but only the bounty owner or platform can approve work and release payment. "
                  "Atlas now prioritizes explicit PayPal terms, fast-payment language, AI eligibility, no assignee, and no competing PR."
              ),
          })
          MAINTENANCE_FILE.write_text(json.dumps(maintenance, indent=2, ensure_ascii=False), encoding="utf-8")

          alerts = []
          if counts["PURSUE"]:
              alerts.append({"level": "HIGH", "message": f"{counts['PURSUE']} pursue candidate(s) found", "generated_at": GENERATED_AT})
          if api_errors:
              alerts.append({"level": "WARNING", "message": f"Atlas health is {status}: {len(api_errors)} API error(s)", "generated_at": GENERATED_AT})
          if overdue:
              alerts.append({"level": "PAYMENT", "message": f"${overdue:,.2f} is overdue", "generated_at": GENERATED_AT})
          ALERTS_FILE.write_text(json.dumps(alerts, indent=2), encoding="utf-8")

          payload = {
              "version": "V8",
              "owner": "Mazen Farkouh",
              "generated_at": GENERATED_AT,
              "config": config,
              "earnings": earnings,
              "allocations": allocations,
              "payment_schedule": payment_schedule,
              "execution_queue": execution_queue,
              "alerts": alerts,
              "system_status": status,
              "manual_verification_required": True,
              "automation_boundary": (
                  "Atlas discovers, scores, and "
                  "monitors opportunities. It does "
                  "not claim work, submit code, "
                  "or guarantee payment."
              ),
              "searches_completed": (
                  searches_completed
              ),
              "api_calls": api_calls,
              "api_errors": api_errors,
              "raw_issues_found": len(raw_issues),
              "aggregator_pages_rejected": (
                  rejected_aggregators
              ),
              "unsafe_items_rejected": (
                  rejected_unsafe
              ),
              (
                  "items_without_extractable_"
                  "reward_rejected"
              ): rejected_no_reward,
              "eligible_candidates_found": (
                  len(initial_candidates)
              ),
              "deep_verified_candidates": (
                  len(verified_results)
              ),
              "counts": counts,
              "contested_count": (
                  contested_count
              ),
              "assigned_count": assigned_count,
              "strong_uncontested_targets": (
                  len(strong_targets)
              ),
              "meaningful_changes": (
                  meaningful_changes
              ),
              "top_results": top_results,
              "all_verified_results": (
                  verified_results
              ),
          }

          CURRENT_FILE.write_text(
              json.dumps(
                  payload,
                  indent=2,
                  ensure_ascii=False,
              ),
              encoding="utf-8",
          )

          history = load_history()

          history.append(
              {
                  "generated_at": GENERATED_AT,
                  "system_status": status,
                  "raw_issues_found": (
                      len(raw_issues)
                  ),
                  "eligible_candidates_found": (
                      len(initial_candidates)
                  ),
                  "deep_verified_candidates": (
                      len(verified_results)
                  ),
                  "counts": counts,
                  "contested_count": (
                      contested_count
                  ),
                  "assigned_count": (
                      assigned_count
                  ),
                  "strong_uncontested_targets": (
                      len(strong_targets)
                  ),
                  "meaningful_change_count": (
                      len(meaningful_changes)
                  ),
              }
          )

          HISTORY_FILE.write_text(
              json.dumps(
                  history[-500:],
                  indent=2,
                  ensure_ascii=False,
              ),
              encoding="utf-8",
          )

          def badge_class(decision):
              return {
                  "PURSUE": "pursue",
                  "PRIORITY REVIEW": "review",
                  "WATCHLIST": "watch",
                  "REJECT": "reject",
              }.get(
                  decision,
                  "watch",
              )

          rows = []

          for item in top_results:
              title = html.escape(
                  item["title"]
              )

              url = html.escape(
                  item["url"],
                  quote=True,
              )

              decision = html.escape(
                  item["decision"]
              )

              availability = html.escape(
                  item["availability"]
              )

              change = html.escape(
                  item["change"]
              )

              risks = html.escape(
                  "; ".join(
                      item["risks"][:3]
                  )
                  or "None detected"
              )

              rows.append(
                  "<tr>"
                  f"<td><span class='badge "
                  f"{badge_class(item['decision'])}'>"
                  f"{decision}</span></td>"
                  f"<td>{item['score']}</td>"
                  f"<td>${item['reward']:,.2f}</td>"
                  f"<td><a href='{url}' "
                  "target='_blank' rel='noopener'>"
                  f"{title}</a>"
                  "<div class='small'>"
                  f"{html.escape(item['repository'])} "
                  f"#{item['issue_number']}"
                  "</div></td>"
                  f"<td>{availability}</td>"
                  f"<td>"
                  f"{item['open_competing_prs']}"
                  "</td>"
                  f"<td>"
                  f"{', '.join(html.escape(a) for a in item['assignees']) or 'None'}"
                  "</td>"
                  f"<td>{change}</td>"
                  f"<td class='small'>{risks}</td>"
                  "</tr>"
              )

          change_items = "".join(
              "<li>"
              f"<strong>"
              f"{html.escape(change['type'])}"
              "</strong>: "
              f"<a href='"
              f"{html.escape(change['url'], quote=True)}"
              "' target='_blank' rel='noopener'>"
              f"{html.escape(change['title'])}"
              "</a> — "
              f"{html.escape(change.get('decision', ''))}"
              "</li>"
              for change in meaningful_changes[:15]
          ) or (
              "<li>No meaningful changes detected "
              "in verified candidates.</li>"
          )

          error_items = "".join(
              "<li>"
              f"{html.escape(error['error'])}"
              "</li>"
              for error in api_errors[:10]
          ) or "<li>None</li>"

          queue_rows = "".join(
              "<tr>"
              f"<td>{index}</td>"
              f"<td><span class='badge {badge_class(item['decision'])}'>{html.escape(item['decision'])}</span></td>"
              f"<td>${item['expected_value']:,.2f}</td>"
              f"<td>{item['payment_confidence']:.0f}%</td>"
              f"<td>{item['competition_score']:.0f}%</td>"
              f"<td><a href='{html.escape(item['url'], quote=True)}' target='_blank' rel='noopener'>{html.escape(item['title'])}</a></td>"
              "</tr>"
              for index, item in enumerate(execution_queue[:12], 1)
          ) or "<tr><td colspan='6'>No queued opportunities.</td></tr>"

          payment_rows = "".join(
              "<tr>"
              f"<td>{html.escape(str(item['title']))}</td>"
              f"<td>${item['amount']:,.2f}</td>"
              f"<td>{html.escape(str(item.get('expected_at') or 'Unknown'))}</td>"
              f"<td>{html.escape(item['bucket'])}</td>"
              "</tr>"
              for item in payment_schedule[:20]
          ) or "<tr><td colspan='4'>No pending payments recorded.</td></tr>"

          dashboard = f"""<!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta
              name="viewport"
              content="width=device-width, initial-scale=1"
            >
            <meta
              http-equiv="refresh"
              content="{int(config.get('dashboard_refresh_seconds', 900))}"
            >
            <title>
              Atlas Opportunity Hunter V8
            </title>
            <style>
              :root {{
                color-scheme: light dark;
              }}

              body {{
                font-family:
                  system-ui,
                  -apple-system,
                  BlinkMacSystemFont,
                  "Segoe UI",
                  sans-serif;
                max-width: 1500px;
                margin: auto;
                padding: 20px;
                line-height: 1.45;
              }}

              .grid {{
                display: grid;
                grid-template-columns:
                  repeat(
                    auto-fit,
                    minmax(150px, 1fr)
                  );
                gap: 12px;
                margin: 18px 0;
              }}

              .card {{
                border: 1px solid #8885;
                border-radius: 12px;
                padding: 14px;
              }}

              .value {{
                font-size: 1.7rem;
                font-weight: 750;
              }}

              .warning {{
                background: #fff3cd;
                color: #3d3300;
                padding: 14px;
                border-radius: 10px;
              }}

              .status {{
                font-weight: 800;
              }}

              .table-wrap {{
                overflow-x: auto;
              }}

              table {{
                width: 100%;
                border-collapse: collapse;
                min-width: 1150px;
              }}

              th,
              td {{
                border: 1px solid #8885;
                padding: 9px;
                text-align: left;
                vertical-align: top;
              }}

              th {{
                position: sticky;
                top: 0;
                background: Canvas;
              }}

              .badge {{
                display: inline-block;
                padding: 4px 8px;
                border-radius: 999px;
                font-weight: 750;
              }}

              .pursue {{
                background: #d1e7dd;
                color: #0f5132;
              }}

              .review {{
                background: #cff4fc;
                color: #055160;
              }}

              .watch {{
                background: #fff3cd;
                color: #664d03;
              }}

              .reject {{
                background: #f8d7da;
                color: #842029;
              }}

              .small {{
                font-size: .85rem;
                opacity: .78;
                margin-top: 4px;
              }}

              a {{
                overflow-wrap: anywhere;
              }}
            </style>
          </head>
          <body>
            <h1>
              Atlas Opportunity Hunter V8
            </h1>

            <p>
              <strong>Owner:</strong>
              Mazen Farkouh
            </p>

            <p>
              <strong>Last scan:</strong>
              {html.escape(GENERATED_AT)}
            </p>

            <p>
              <strong>System status:</strong>
              <span class="status">
                {html.escape(status)}
              </span>
            </p>

            <div class="warning">
              Atlas does not verify that money is
              funded, guarantee payment, claim work,
              or submit code. Every candidate
              requires human verification of
              funding, eligibility, competition,
              rules, acceptance criteria, and
              payment terms before work begins.
            </div>

            <div class="grid">
              <div class="card">
                <div class="value">
                  {len(raw_issues)}
                </div>
                <div>Raw Issues</div>
              </div>

              <div class="card">
                <div class="value">
                  {len(initial_candidates)}
                </div>
                <div>Eligible Candidates</div>
              </div>

              <div class="card">
                <div class="value">
                  {len(verified_results)}
                </div>
                <div>Deep Verified</div>
              </div>

              <div class="card">
                <div class="value">
                  {counts['PURSUE']}
                </div>
                <div>Pursue</div>
              </div>

              <div class="card">
                <div class="value">
                  {counts['PRIORITY REVIEW']}
                </div>
                <div>Priority Review</div>
              </div>

              <div class="card">
                <div class="value">
                  {contested_count}
                </div>
                <div>Contested</div>
              </div>

              <div class="card">
                <div class="value">
                  {assigned_count}
                </div>
                <div>Assigned</div>
              </div>

              <div class="card">
                <div class="value">
                  {len(strong_targets)}
                </div>
                <div>Strong Uncontested</div>
              </div>
            </div>

            <h2>Money</h2>
            <div class="grid">
              <div class="card"><div class="value">${earnings['today']:,.2f}</div><div>Today</div></div>
              <div class="card"><div class="value">${earnings['week']:,.2f}</div><div>This Week</div></div>
              <div class="card"><div class="value">${earnings['month']:,.2f}</div><div>This Month</div></div>
              <div class="card"><div class="value">${earnings['year']:,.2f}</div><div>This Year</div></div>
              <div class="card"><div class="value">${earnings['lifetime']:,.2f}</div><div>Lifetime</div></div>
              <div class="card"><div class="value">${earnings['waiting_total']:,.2f}</div><div>Waiting Total</div></div>
              <div class="card"><div class="value">${earnings['waiting_today']:,.2f}</div><div>Waiting Today</div></div>
              <div class="card"><div class="value">${earnings['waiting_later']:,.2f}</div><div>Waiting Later</div></div>
              <div class="card"><div class="value">${earnings['overdue']:,.2f}</div><div>Overdue</div></div>
            </div>

            <h2>Year Allocation</h2>
            <div class="grid">
              <div class="card"><div class="value">${allocations['tax']:,.2f}</div><div>Tax ({config['tax_percent']}%)</div></div>
              <div class="card"><div class="value">${allocations['reinvesting']:,.2f}</div><div>Reinvesting ({config['reinvest_percent']}%)</div></div>
              <div class="card"><div class="value">${allocations['mazen']:,.2f}</div><div>Mazen ({config['mazen_percent']}%)</div></div>
              <div class="card"><div class="value">{html.escape(str(maintenance.get('health', status)))}</div><div>Dr. Alex Status</div></div>
            </div>

            <p><a href="reports/latest.html">Open printable report</a> · <a href="reports/latest.csv">Download CSV report</a></p>

            <h2>Execution Queue</h2>
            <div class="table-wrap"><table><thead><tr><th>#</th><th>Decision</th><th>Expected Value</th><th>Payment Confidence</th><th>Competition</th><th>Opportunity</th></tr></thead><tbody>{queue_rows}</tbody></table></div>

            <h2>Payment Timing</h2>
            <div class="table-wrap"><table><thead><tr><th>Payment</th><th>Amount</th><th>Expected</th><th>Timing</th></tr></thead><tbody>{payment_rows}</tbody></table></div>

            <h2>Meaningful Changes</h2>

            <ul>
              {change_items}
            </ul>

            <h2>Top Verified Candidates</h2>

            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Decision</th>
                    <th>Score</th>
                    <th>Reward</th>
                    <th>Opportunity</th>
                    <th>Availability</th>
                    <th>Open PRs</th>
                    <th>Assignees</th>
                    <th>Change</th>
                    <th>Main Risks</th>
                  </tr>
                </thead>

                <tbody>
                  {''.join(rows)}
                </tbody>
              </table>
            </div>

            <h2>API Errors</h2>

            <ul>
              {error_items}
            </ul>

            <p class="small">
              V8 deep-verifies up to 25 candidates
              per run to reduce unnecessary API use.
              The page refreshes every 15 minutes.
            </p>
          </body>
          </html>
          """

          DASHBOARD_FILE.write_text(
              dashboard,
              encoding="utf-8",
          )

          report_rows = "".join(
              f"<tr><td>{i}</td><td>{html.escape(item['decision'])}</td><td>${item['reward']:,.2f}</td><td>${item['expected_value']:,.2f}</td><td>{html.escape(item['title'])}</td></tr>"
              for i, item in enumerate(execution_queue, 1)
          )
          report_html = f"""<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Atlas V8 Report</title><style>body{{font-family:Arial,sans-serif;margin:28px}}table{{border-collapse:collapse;width:100%}}th,td{{border:1px solid #999;padding:8px;text-align:left}}@media print{{button{{display:none}}}}</style></head><body><button onclick='window.print()'>Print</button><h1>Atlas Opportunity Hunter V8 Report</h1><p>Generated: {html.escape(GENERATED_AT)}</p><p>Status: <strong>{html.escape(status)}</strong></p><h2>Earnings</h2><p>Today ${earnings['today']:,.2f} · Week ${earnings['week']:,.2f} · Month ${earnings['month']:,.2f} · Year ${earnings['year']:,.2f} · Lifetime ${earnings['lifetime']:,.2f}</p><h2>Allocation</h2><p>Tax ${allocations['tax']:,.2f} · Reinvesting ${allocations['reinvesting']:,.2f} · Mazen ${allocations['mazen']:,.2f}</p><h2>Execution Queue</h2><table><thead><tr><th>#</th><th>Decision</th><th>Reward</th><th>Expected Value</th><th>Opportunity</th></tr></thead><tbody>{report_rows}</tbody></table></body></html>"""
          (REPORTS_DIR / "latest.html").write_text(report_html, encoding="utf-8")
          csv_lines = ["rank,decision,reward,expected_value,payment_confidence,competition_score,title,url"]
          for i, item in enumerate(execution_queue, 1):
              def csv_value(value):
                  return '"' + str(value).replace('"', '""') + '"'
              csv_lines.append(",".join([
                  str(i), csv_value(item['decision']), str(item['reward']), str(item['expected_value']),
                  str(item['payment_confidence']), str(item['competition_score']), csv_value(item['title']), csv_value(item['url'])
              ]))
          (REPORTS_DIR / "latest.csv").write_text("\n".join(csv_lines) + "\n", encoding="utf-8")
          (REPORTS_DIR / "latest.txt").write_text(
              "Atlas Opportunity Hunter V8\n" +
              f"Generated: {GENERATED_AT}\nStatus: {status}\n" +
              f"Today: ${earnings['today']:,.2f}\nWeek: ${earnings['week']:,.2f}\nMonth: ${earnings['month']:,.2f}\nYear: ${earnings['year']:,.2f}\nLifetime: ${earnings['lifetime']:,.2f}\n",
              encoding="utf-8",
          )

          summary_lines = [
              "# Atlas Opportunity Hunter V8",
              "",
              (
                  f"- System status: "
                  f"**{status}**"
              ),
              (
                  f"- Generated: "
                  f"**{GENERATED_AT}**"
              ),
              (
                  f"- Raw issues found: "
                  f"**{len(raw_issues)}**"
              ),
              (
                  f"- Eligible paid candidates: "
                  f"**{len(initial_candidates)}**"
              ),
              (
                  f"- Deep verified: "
                  f"**{len(verified_results)}**"
              ),
              (
                  f"- Pursue: "
                  f"**{counts['PURSUE']}**"
              ),
              (
                  f"- Priority review: "
                  f"**{counts['PRIORITY REVIEW']}**"
              ),
              (
                  f"- Contested: "
                  f"**{contested_count}**"
              ),
              (
                  f"- Assigned: "
                  f"**{assigned_count}**"
              ),
              (
                  f"- Strong uncontested targets: "
                  f"**{len(strong_targets)}**"
              ),
              (
                  f"- Meaningful changes: "
                  f"**{len(meaningful_changes)}**"
              ),
              (
                  f"- API errors: "
                  f"**{len(api_errors)}**"
              ),
              "",
              (
                  "> Manual verification is "
                  "required before any work begins."
              ),
              "",
              "## Top Candidates",
          ]

          for item in top_results[:8]:
              summary_lines.append(
                  f"- **{item['decision']}** | "
                  f"Score {item['score']} | "
                  f"${item['reward']:,.2f} | "
                  f"{item['title']} | "
                  f"{item['availability']}"
              )

          summary_path = os.environ.get(
              "GITHUB_STEP_SUMMARY"
          )

          if summary_path:
              Path(summary_path).write_text(
                  "\n".join(summary_lines) + "\n",
                  encoding="utf-8",
              )

          github_output = os.environ.get(
              "GITHUB_OUTPUT"
          )

          if github_output:
              with open(
                  github_output,
                  "a",
                  encoding="utf-8",
              ) as output:
                  output.write(
                      f"system_status={status}\n"
                  )

                  output.write(
                      "pursue_count="
                      f"{counts['PURSUE']}\n"
                  )

                  output.write(
                      "contested_count="
                      f"{contested_count}\n"
                  )

                  output.write(
                      "meaningful_change_count="
                      f"{len(meaningful_changes)}\n"
                  )

          print(
              f"Atlas V8 status={status}; "
              f"checked {len(raw_issues)} "
              "raw issues; "
              f"found {len(initial_candidates)} "
              "eligible candidates; "
              f"deep-verified "
              f"{len(verified_results)}; "
              f"pursue={counts['PURSUE']}; "
              "priority-review="
              f"{counts['PRIORITY REVIEW']}; "
              f"contested={contested_count}; "
              f"assigned={assigned_count}; "
              "meaningful-changes="
              f"{len(meaningful_changes)}."
          )

          if searches_completed == 0:
              raise SystemExit(
                  "Atlas V8 could not complete "
                  "any GitHub search query."
              )
          PY

      - name: Save Atlas V8 results
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          git config \
            user.name \
            "Atlas Opportunity Hunter"

          git config \
            user.email \
            "atlas-bot@users.noreply.github.com"

          git add -A data docs

          if git diff --cached --quiet
          then
            echo "No Atlas result changes to save."
            exit 0
          fi

          git commit \
            -m "Atlas V8 opportunity scan"

          git pull \
            --rebase \
            origin \
            "$BRANCH_NAME"

          git push \
            origin \
            "HEAD:$BRANCH_NAME"
