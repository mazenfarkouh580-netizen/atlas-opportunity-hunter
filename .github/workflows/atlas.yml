name: Atlas Opportunity Hunter

on:
  workflow_dispatch:
  schedule:
    - cron: "7,22,37,52 * * * *"

permissions:
  contents: write
  issues: read

jobs:
  hunt:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Download repository
        uses: actions/checkout@v5

      - name: Scan paid opportunities
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python <<'PY'
          import json
          import os
          import re
          import urllib.parse
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          token = os.environ["GITHUB_TOKEN"]

          queries = [
              'is:issue is:open bounty in:title,body',
              'is:issue is:open reward in:title,body',
              'is:issue is:open label:bounty',
              'is:issue is:open label:reward',
          ]

          blocked = [
              "phishing",
              "malware",
              "ransomware",
              "unauthorized access",
              "steal credentials",
              "ddos",
              "fake account",
          ]

          preferred = [
              "bug",
              "fix",
              "test",
              "tests",
              "documentation",
              "docs",
              "python",
              "javascript",
              "typescript",
              "workflow",
              "ci",
          ]

          def api_get(url):
              request = urllib.request.Request(
                  url,
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                      "User-Agent": "Atlas-Opportunity-Hunter",
                  },
              )
              with urllib.request.urlopen(request, timeout=30) as response:
                  return json.loads(response.read().decode("utf-8"))

          def extract_reward(text):
              patterns = [
                  r"/bounty\s*\$([0-9][0-9,]*(?:\.\d{1,2})?)",
                  r"\$([0-9][0-9,]*(?:\.\d{1,2})?)\s*(?:bounty|reward)",
                  r"(?:bounty|reward)\s*(?:of|:)?\s*\$([0-9][0-9,]*(?:\.\d{1,2})?)",
              ]

              rewards = []

              for pattern in patterns:
                  for match in re.finditer(pattern, text, re.I):
                      rewards.append(
                          float(match.group(1).replace(",", ""))
                      )

              return max(rewards, default=0.0)

          def is_aggregator(issue, title, body):
              repository = (
                  issue.get("repository_url") or ""
              ).split("/repos/")[-1].lower()

              author = (
                  (issue.get("user") or {}).get("login") or ""
              ).lower()

              labels = {
                  (label.get("name") or "").lower()
                  for label in issue.get("labels", [])
              }

              title_lower = title.lower()
              body_lower = body.lower()

              if "bountyscout" in repository:
                  return True

              if "bounty alert" in title_lower:
                  return True

              if "new opportunities" in title_lower:
                  return True

              if "new opportunityies" in title_lower:
                  return True

              if "opportunities found" in title_lower:
                  return True

              if "opportunityies found" in title_lower:
                  return True

              if "bounty-alert" in labels:
                  return True

              if "bounty alert" in labels:
                  return True

              if author == "github-actions[bot]":
                  return True

              if author.endswith("[bot]"):
                  return True

              linked_issues = re.findall(
                  r"https://github\.com/[^/\s]+/[^/\s]+/issues/\d+",
                  body,
                  re.I,
              )

              if len(set(linked_issues)) >= 3:
                  return True

              if "top opportunities" in body_lower:
                  return True

              if "new bounties found" in body_lower:
                  return True

              return False

          issues = {}

          for query in queries:
              encoded = urllib.parse.quote(query)

              url = (
                  "https://api.github.com/search/issues"
                  f"?q={encoded}&sort=created&order=desc&per_page=50"
              )

              try:
                  data = api_get(url)
              except Exception as error:
                  print(f"Search failed: {error}")
                  continue

              for issue in data.get("items", []):
                  if "pull_request" in issue:
                      continue

                  issue_url = issue.get("html_url") or ""

                  if issue_url:
                      issues[issue_url] = issue

          results = []
          rejected_aggregators = 0

          for issue in issues.values():
              title = issue.get("title") or ""
              body = issue.get("body") or ""
              text = f"{title}\n{body}"
              lowered = text.lower()

              if is_aggregator(issue, title, body):
                  rejected_aggregators += 1
                  continue

              if any(term in lowered for term in blocked):
                  continue

              reward = extract_reward(text)

              if reward <= 0:
                  continue

              score = 0
              reasons = []

              if reward >= 500:
                  score += 25
                  reasons.append("Large stated reward")
              elif reward >= 150:
                  score += 22
                  reasons.append("Strong stated reward")
              elif reward >= 50:
                  score += 18
                  reasons.append("Good stated reward")
              else:
                  score += 12
                  reasons.append("Stated paid reward")

              detail = len(body.strip())

              if detail >= 800:
                  score += 15
                  reasons.append("Detailed requirements")
              elif detail >= 300:
                  score += 10
                  reasons.append("Useful requirements")
              elif detail >= 100:
                  score += 5
                  reasons.append("Basic requirements")
              else:
                  reasons.append("Requirements need review")

              matches = sorted({
                  word for word in preferred
                  if word in lowered
              })

              score += min(20, len(matches) * 4)

              if matches:
                  reasons.append(
                      "Capability match: " + ", ".join(matches[:5])
                  )

              comments = int(issue.get("comments") or 0)

              if comments == 0:
                  score += 15
                  reasons.append("No visible discussion")
              elif comments <= 3:
                  score += 10
                  reasons.append("Low visible competition")
              elif comments <= 8:
                  score += 4
                  reasons.append("Moderate competition")
              else:
                  score -= 8
                  reasons.append("Heavy discussion")

              created_at = issue.get("created_at") or ""

              try:
                  created = datetime.fromisoformat(
                      created_at.replace("Z", "+00:00")
                  )

                  age_days = (
                      datetime.now(timezone.utc) - created
                  ).total_seconds() / 86400

                  if age_days <= 1:
                      score += 15
                      reasons.append("Posted within 24 hours")
                  elif age_days <= 7:
                      score += 10
                      reasons.append("Posted within 7 days")
                  elif age_days <= 30:
                      score += 5
                      reasons.append("Posted within 30 days")
                  elif age_days > 180:
                      score -= 8
                      reasons.append("May be stale")
              except Exception:
                  pass

              if "acceptance criteria" in lowered:
                  score += 10
                  reasons.append("Clear acceptance criteria")
              elif "expected behavior" in lowered:
                  score += 7
                  reasons.append("Expected behavior described")
              elif detail >= 300:
                  score += 4
                  reasons.append("Review path appears usable")

              score = max(0, min(100, score))

              if score >= 70:
                  decision = "PURSUE"
              elif score >= 55:
                  decision = "PRIORITY REVIEW"
              elif score >= 40:
                  decision = "WATCHLIST"
              else:
                  decision = "REJECT"

              repository = (
                  issue.get("repository_url") or ""
              ).split("/repos/")[-1]

              author = (
                  (issue.get("user") or {}).get("login") or ""
              )

              results.append(
                  {
                      "title": title,
                      "url": issue.get("html_url") or "",
                      "repository": repository,
                      "author": author,
                      "reward": reward,
                      "score": score,
                      "decision": decision,
                      "comments": comments,
                      "created_at": created_at,
                      "manual_verification_required": True,
                      "reasons": reasons,
                  }
              )

          results.sort(
              key=lambda item: (
                  item["score"],
                  item["reward"],
              ),
              reverse=True,
          )

          top_results = results[:10]

          counts = {
              "PURSUE": sum(
                  item["decision"] == "PURSUE"
                  for item in results
              ),
              "PRIORITY REVIEW": sum(
                  item["decision"] == "PRIORITY REVIEW"
                  for item in results
              ),
              "WATCHLIST": sum(
                  item["decision"] == "WATCHLIST"
                  for item in results
              ),
              "REJECT": sum(
                  item["decision"] == "REJECT"
                  for item in results
              ),
          }

          generated_at = datetime.now(timezone.utc).strftime(
              "%Y-%m-%d %H:%M UTC"
          )

          Path("data").mkdir(exist_ok=True)
          Path("docs").mkdir(exist_ok=True)

          Path("data/opportunities.json").write_text(
              json.dumps(
                  {
                      "owner": "Mazen Farkouh",
                      "generated_at": generated_at,
                      "manual_verification_required": True,
                      "aggregator_pages_rejected": rejected_aggregators,
                      "counts": counts,
                      "top_results": top_results,
                  },
                  indent=2,
              ),
              encoding="utf-8",
          )

          rows = ""

          for item in top_results:
              rows += (
                  "<tr>"
                  f"<td>{item['decision']}</td>"
                  f"<td>{item['score']}</td>"
                  f"<td>${item['reward']:.2f}</td>"
                  f"<td><a href='{item['url']}'>{item['title']}</a></td>"
                  "</tr>"
              )

          dashboard = f"""<!doctype html>
          <html>
          <head>
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Atlas Opportunity Hunter</title>
            <style>
              body {{
                font-family: system-ui;
                max-width: 1000px;
                margin: auto;
                padding: 20px;
              }}

              table {{
                width: 100%;
                border-collapse: collapse;
              }}

              th, td {{
                border: 1px solid #ccc;
                padding: 8px;
                text-align: left;
              }}

              .warning {{
                background: #fff3cd;
                padding: 12px;
                border-radius: 8px;
              }}
            </style>
          </head>
          <body>
            <h1>Atlas Opportunity Hunter</h1>
            <p>Owner: Mazen Farkouh</p>
            <p>Last scan: {generated_at}</p>

            <p class="warning">
              Atlas candidates are not payment-verified.
              Every opportunity requires manual verification
              before work begins.
            </p>

            <p>
              Aggregator pages rejected: {rejected_aggregators} |
              Pursue: {counts['PURSUE']} |
              Priority Review: {counts['PRIORITY REVIEW']} |
              Watchlist: {counts['WATCHLIST']} |
              Reject: {counts['REJECT']}
            </p>

            <h2>Top 10 Paid Candidates Requiring Manual Verification</h2>

            <table>
              <tr>
                <th>Decision</th>
                <th>Score</th>
                <th>Stated Reward</th>
                <th>Opportunity</th>
              </tr>
              {rows}
            </table>
          </body>
          </html>
          """

          Path("docs/index.html").write_text(
              dashboard,
              encoding="utf-8",
          )

          print(
              f"Atlas checked {len(issues)} issues; "
              f"rejected {rejected_aggregators} aggregator pages; "
              f"found {len(results)} paid candidates requiring manual verification; "
              f"{counts['PURSUE']} pursue; "
              f"{counts['PRIORITY REVIEW']} priority review; "
              f"{counts['WATCHLIST']} watchlist."
          )

          for item in top_results:
              print(
                  f"{item['decision']} | "
                  f"Score {item['score']} | "
                  f"${item['reward']:.2f} stated reward | "
                  f"{item['title']}"
              )
          PY

      - name: Save Atlas results
        run: |
          git config user.name "Atlas Opportunity Hunter"
          git config user.email "atlas-bot@users.noreply.github.com"
          git add data/opportunities.json docs/index.html

          if git diff --cached --quiet
          then
            echo "No result changes to save."
          else
            git commit -m "Atlas improved opportunity scan"
            git push
          fi
