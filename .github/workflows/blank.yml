name: Atlas Opportunity Hunter

on:
  workflow_dispatch:
  schedule:
    - cron: "7,22,37,52 * * * *"

permissions:
  contents: write

jobs:
  hunt:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Download repository
        uses: actions/checkout@v4

      - name: Scan for opportunities
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python <<'PY'
          import json
          import os
          import re
          import urllib.parse
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path
          from html import escape

          token = os.environ["GITHUB_TOKEN"]

          queries = [
              'is:issue is:open bounty in:title,body',
              'is:issue is:open reward in:title,body',
              'is:issue is:open label:bounty',
              'is:issue is:open label:reward',
          ]

          preferred = [
              "test", "tests", "documentation", "docs", "bug", "fix",
              "typescript", "javascript", "python", "workflow", "ci"
          ]

          blocked = [
              "phishing", "malware", "ransomware", "steal credentials",
              "unauthorized access", "spam", "fake account", "ddos"
          ]

          def github_request(url):
              request = urllib.request.Request(
                  url,
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                      "User-Agent": "Atlas-Opportunity-Hunter"
                  }
              )
              with urllib.request.urlopen(request, timeout=30) as response:
                  return json.loads(response.read().decode())

          def reward_amount(text):
              patterns = [
                  r"/bounty\s*\$([0-9][0-9,]*(?:\.\d{1,2})?)",
                  r"\$([0-9][0-9,]*(?:\.\d{1,2})?)\s*(?:bounty|reward)",
                  r"(?:bounty|reward)\s*(?:of|:)?\s*\$([0-9][0-9,]*(?:\.\d{1,2})?)"
              ]

              for pattern in patterns:
                  match = re.search(pattern, text, re.I)
                  if match:
                      return float(match.group(1).replace(",", ""))

              return 0.0

          opportunities = {}

          for query in queries:
              encoded = urllib.parse.quote(query)

              try:
                  data = github_request(
                      f"https://api.github.com/search/issues"
                      f"?q={encoded}&sort=created&order=desc&per_page=50"
                  )
              except Exception as error:
                  print(f"Search failed: {error}")
                  continue

              for issue in data.get("items", []):
                  if "pull_request" in issue:
                      continue

                  title = issue.get("title") or ""
                  body = issue.get("body") or ""
                  url = issue.get("html_url") or ""

                  if not url:
                      continue

                  text = f"{title}\n{body}".lower()

                  if any(term in text for term in blocked):
                      continue

                  reward = reward_amount(text)
                  score = 0
                  reasons = []

                  if reward >= 250:
                      score += 25
                      reasons.append("Strong reward")
                  elif reward >= 100:
                      score += 20
                      reasons.append("Good reward")
                  elif reward >= 25:
                      score += 15
                      reasons.append("Useful first-mission reward")
                  elif reward >= 5:
                      score += 8
                      reasons.append("Reward passes minimum")
                  else:
                      reasons.append("Reward not clearly verified")

                  matched = sorted({
                      word for word in preferred if word in text
                  })

                  if matched:
                      score += min(25, len(matched) * 4)
                      reasons.append(
                          "Preferred work: " + ", ".join(matched)
                      )

                  created = issue.get("created_at") or ""

                  if created:
                      try:
                          created_time = datetime.fromisoformat(
                              created.replace("Z", "+00:00")
                          )
                          age_days = (
                              datetime.now(timezone.utc) - created_time
                          ).total_seconds() / 86400

                          if age_days <= 1:
                              score += 20
                              reasons.append("Posted within 24 hours")
                          elif age_days <= 7:
                              score += 12
                              reasons.append("Fresh opportunity")
                          elif age_days <= 30:
                              score += 5
                              reasons.append("Recently posted")
                          elif age_days > 180:
                              score -= 10
                              reasons.append("May be stale")
                      except ValueError:
                          pass

                  if len(body.strip()) >= 100:
                      score += 8
                      reasons.append("Requirements contain useful detail")
                  else:
                      score -= 8
                      reasons.append("Description may be too vague")

                  comments = int(issue.get("comments") or 0)

                  if comments == 0:
                      score += 12
                      reasons.append("No visible discussion yet")
                  elif comments <= 3:
                      score += 5
                      reasons.append("Low visible discussion")
                  elif comments >= 15:
                      score -= 15
                      reasons.append("Likely crowded")

                  score = max(0, min(100, score))

                  if score >= 55

    decision = "PURSUE"

elif score >= 35:

    decision = "REVIEW"

else:

    decision = "REJECT"

     

elif 

    

else:

    d
                    
                  
                      
                
                    

                  repository_url = issue.get("repository_url") or ""
                  repository = repository_url.split("/repos/")[-1]

                  opportunities[url] = {
                      "title": title,
                      "url": url,
                      "repository": repository,
                      "reward": reward,
                      "score": score,
                      "decision": decision,
                      "comments": comments,
                      "created": created,
                      "reasons": reasons,
                      "description": body[:700]
                  }

          results = sorted(
              opportunities.values(),
              key=lambda item: (item["score"], item["reward"]),
              reverse=True
          )

          pursue = sum(item["decision"] == "PURSUE" for item in results)
          review = sum(item["decision"] == "REVIEW" for item in results)
          rejected = sum(item["decision"] == "REJECT" for item in results)

          cards = []

          for item in results:
              reasons = "".join(
                  f"<li>{escape(reason)}</li>"
                  for reason in item["reasons"]
              )

              cards.append(f"""
              <article class="card {item['decision'].lower()}">
                <div class="top">
                  <strong>{item['decision']}</strong>
                  <span>Score {item['score']}</span>
                </div>

                <h3>
                  <a href="{escape(item['url'])}" target="_blank">
                    {escape(item['title'])}
                  </a>
                </h3>

                <p class="meta">
                  {escape(item['repository'])}
                  · Reward ${item['reward']:,.2f}
                  · Comments {item['comments']}
                </p>

                <p>{escape(item['description'])}</p>
                <ul>{reasons}</ul>
              </article>
              """)

          now = datetime.now(timezone.utc).strftime(
              "%Y-%m-%d %H:%M UTC"
          )

          dashboard = f"""
          <!doctype html>
          <html>
          <head>
            <meta charset="utf-8">
            <meta name="viewport"
                  content="width=device-width, initial-scale=1">

            <title>Atlas Opportunity Hunter</title>

            <style>
              body {{
                font-family: system-ui, sans-serif;
                background: #0b1020;
                color: #eef2ff;
                max-width: 1050px;
                margin: auto;
                padding: 22px;
              }}

              .stats {{
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 10px;
                margin: 22px 0;
              }}

              .stat, .card {{
                background: #141c33;
                border: 1px solid #2b375b;
                border-radius: 14px;
                padding: 15px;
                margin: 12px 0;
              }}

              .stat strong {{
                display: block;
                font-size: 26px;
              }}

              .pursue {{
                border-left: 6px solid #31c48d;
              }}

              .review {{
                border-left: 6px solid #f4b740;
              }}

              .reject {{
                border-left: 6px solid #ef5b5b;
                opacity: .75;
              }}

              .top {{
                display: flex;
                justify-content: space-between;
              }}

              .meta {{
                color: #aab4d6;
              }}

              a {{
                color: #8ec5ff;
              }}

              @media (max-width: 650px) {{
                .stats {{
                  grid-template-columns: 1fr 1fr;
                }}
              }}
            </style>
          </head>

          <body>
            <h1>Atlas Opportunity Hunter</h1>

            <p>
              Owner: Mazen Farkouh<br>
              Level 2 Analyst<br>
              Last scan: {now}
            </p>

            <div class="stats">
              <div class="stat">
                <strong>{len(results)}</strong>
                Found
              </div>

              <div class="stat">
                <strong>{pursue}</strong>
                Pursue
              </div>

              <div class="stat">
                <strong>{review}</strong>
                Review
              </div>

              <div class="stat">
                <strong>{rejected}</strong>
                Rejected
              </div>
            </div>

            {''.join(cards) if cards else '<p>No opportunities found.</p>'}

            <hr>

            <small>
              Atlas searches public opportunities only.
              It does not claim work, submit code, access financial
              accounts, or take external actions without approval.
            </small>
          </body>
          </html>
          """

          Path("docs").mkdir(exist_ok=True)
          Path("data").mkdir(exist_ok=True)

          Path("docs/index.html").write_text(
              dashboard,
              encoding="utf-8"
          )

          Path("data/opportunities.json").write_text(
              json.dumps(
                  {
                      "owner": "Mazen Farkouh",
                      "generated_at": now,
                      "opportunities": results
                  },
                  indent=2
              ),
              encoding="utf-8"
          )

          print(
              f"Atlas found {len(results)} opportunities; "
              f"{pursue} marked PURSUE."
          )
          PY

      - name: Save Atlas results
        run: |
          git config user.name "Atlas Opportunity Hunter"
          git config user.email "atlas-bot@users.noreply.github.com"

          git add docs/index.html data/opportunities.json

          if git diff --cached --quiet
          then
            echo "No changes to save."
          else
            git commit -m "Atlas opportunity scan"
            git push
          fi
